# ---------------------------------------------------------------
# HA Display 7" — Guition JC1060P470 (ESP32-P4, MIPI DSI)
# Screens: Energie | Verlichting | Media
# ---------------------------------------------------------------

substitutions:
  spotify_entity: media_player.spotify_tomkortekaas
  spotify_position_entity: sensor.spotify_huidige_positie
  spotify_source_fallback: "Keuken Amp"
  doorbell_active_entity: input_boolean.ha_display_deurbel_actief

globals:
  - id: album_art_loaded_url
    type: std::string
    initial_value: '""'
  - id: album_art_pending_url
    type: std::string
    initial_value: '""'
  - id: ha_base_url_detected
    type: std::string
    initial_value: '"http://homeassistant.local:8123"'
  - id: album_art_retry_count
    type: int
    initial_value: '0'
  - id: immich_art_loaded_url
    type: std::string
    initial_value: '""'
  - id: immich_art_retry_count
    type: int
    initial_value: '0'
  - id: immich_page_active
    type: bool
    initial_value: 'false'
  - id: immich_overlay_countdown
    type: int
    restore_value: no
    initial_value: '0'
  - id: review_info_visible
    type: bool
    initial_value: 'false'
  - id: review_nav_countdown
    type: int
    restore_value: no
    initial_value: '0'
  - id: doorbell_page_active
    type: bool
    initial_value: 'false'
  - id: doorbell_art_retry_count
    type: int
    initial_value: '0'
  - id: radar_frame_index
    type: int
    initial_value: '0'
  - id: radar_art_retry_count
    type: int
    initial_value: '0'
  - id: radar_last_frame_label
    type: std::string
    initial_value: '"radar laden"'
  - id: agenda_light_theme
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: ah_current_recipe_id
    type: std::string
    initial_value: '""'
  - id: ah_current_step
    type: int
    initial_value: '0'
  - id: ah_total_steps
    type: int
    initial_value: '1'
  - id: ah_recipe_page_active
    type: bool
    initial_value: 'false'

external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espcontrol
      ref: main
    components: [artwork_image]
    refresh: never

esphome:
  name: ha-display-7
  friendly_name: "HA Display 7\""
  min_version: 2026.3.0

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_HOSTED_USE_MEMPOOL: "n"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"

psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG

api:
  reboot_timeout: 5min
  on_client_connected:
    - lambda: |-
        if (client_info.find("Home Assistant") == std::string::npos) return;
        std::string host = client_address;
        if (host.rfind("::ffff:", 0) == 0) host = host.substr(7);
        size_t p = host.find(':');
        if (p != std::string::npos) host = host.substr(0, p);
        id(ha_base_url_detected) = "http://" + host + ":8123";
        ESP_LOGI("api", "HA base URL auto-detected: %s", id(ha_base_url_detected).c_str());

ota:
  - platform: esphome

http_request:
  timeout: 10s
  verify_ssl: false

update:
  - platform: esp32_hosted
    name: ESP-Hosted Firmware
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 15min
  ap:
    ssid: "HA Display 7 Fallback"
    password: "ha-display-7"

captive_portal:

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz

i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

button:
  - platform: restart
    name: "Restart"
    id: btn_restart

output:
  - id: gpio_backlight_pwm
    platform: ledc
    pin: GPIO23
    frequency: 20000Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    address: 0x5D
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: true

display:
  - platform: mipi_dsi
    model: JC1060P470
    id: my_display
    update_interval: never
    reset_pin: GPIO5
    auto_clear_enabled: false

