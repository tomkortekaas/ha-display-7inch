    # ===========================================================
    # PAGINA 6: IMMICH
    # ===========================================================
    - id: page_immich
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:
        - obj:
            x: 0
            y: 0
            width: 1024
            height: 600
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollable: false
            widgets:
              - image:
                  id: img_immich_photo
                  align: CENTER
                  width: 1024
                  height: 600
                  src: immich_art
              - obj:
                  id: immich_placeholder
                  align: CENTER
                  width: 1
                  height: 1
                  radius: 0
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
              # Onzichtbare tik-detector — hele scherm, achterste laag
              # Aanraken toont controls voor 30 seconden
              - button:
                  x: 0
                  y: 0
                  width: 1024
                  height: 600
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  outline_width: 0
                  shadow_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  pressed:
                    bg_color: 0x000000
                    bg_opa: 0%
                    border_width: 0
                    outline_width: 0
                    shadow_width: 0
                  focused:
                    bg_color: 0x000000
                    bg_opa: 0%
                    border_width: 0
                    outline_width: 0
                    shadow_width: 0
                  checked:
                    bg_color: 0x000000
                    bg_opa: 0%
                    border_width: 0
                    outline_width: 0
                    shadow_width: 0
                  on_click:
                    - lambda: 'id(immich_overlay_countdown) = 30;'
                    - lvgl.widget.show: immich_controls
                    - lvgl.widget.show: nav_rail_container

              # Klok — altijd zichtbaar linksboven
              - label:
                  id: lbl_immich_clock
                  x: 24
                  y: 20
                  text_font: font_roboto_36
                  text_color: 0xFFFFFF
                  text: "--:--"

              # Jaar — altijd zichtbaar linksonder, eerste regel
              - label:
                  id: lbl_immich_date
                  x: 24
                  y: 490
                  width: 300
                  text_font: font_roboto_36
                  text_color: 0xFFFFFF
                  text: ""

              # Plaats + land — altijd zichtbaar linksonder, tweede regel
              - label:
                  id: lbl_immich_place
                  x: 24
                  y: 536
                  width: 620
                  text_font: font_roboto_28
                  text_color: 0xFFFFFF
                  long_mode: DOT
                  text: ""

              # Verborgen album label (voor compat met script)
              - label:
                  id: lbl_immich_album
                  x: -2000
                  y: 0
                  width: 1
                  height: 1
                  text: ""

              # Controls overlay — verborgen tot aanraking (30s timeout)
              - obj:
                  id: immich_controls
                  x: 0
                  y: 0
                  width: 1024
                  height: 600
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  radius: 0
                  scrollable: false
                  hidden: true
                  widgets:
                    # Midden — zoom knop (onzichtbaar tikgebied)
                    - button:
                        x: 220
                        y: 96
                        width: 584
                        height: 392
                        bg_color: 0x000000
                        bg_opa: 0%
                        border_width: 0
                        outline_width: 0
                        shadow_width: 0
                        radius: 0
                        pad_all: 0
                        scrollable: false
                        pressed:
                          bg_color: 0x000000
                          bg_opa: 0%
                          border_width: 0
                          outline_width: 0
                          shadow_width: 0
                        focused:
                          bg_color: 0x000000
                          bg_opa: 0%
                          border_width: 0
                          outline_width: 0
                          shadow_width: 0
                        checked:
                          bg_color: 0x000000
                          bg_opa: 0%
                          border_width: 0
                          outline_width: 0
                          shadow_width: 0
                        on_click:
                          - lambda: 'id(immich_overlay_countdown) = 30;'
                          - homeassistant.action:
                              action: shell_command.immich_photo_zoom
                    # Links — vorige foto
                    - button:
                        x: 8
                        y: 222
                        width: 88
                        height: 140
                        bg_color: 0x101010
                        bg_opa: 45%
                        border_width: 0
                        radius: 20
                        pad_all: 0
                        scrollable: false
                        on_click:
                          - lambda: 'id(immich_overlay_countdown) = 30;'
                          - homeassistant.action:
                              action: shell_command.immich_photo_prev
                        widgets:
                          - label:
                              align: CENTER
                              text_font: font_icon_28
                              text_color: 0xFFFFFF
                              text: "\U000F04AE"
                    # Rechts — volgende foto
                    - button:
                        x: 928
                        y: 222
                        width: 88
                        height: 140
                        bg_color: 0x101010
                        bg_opa: 45%
                        border_width: 0
                        radius: 20
                        pad_all: 0
                        scrollable: false
