            id(lbl_agenda_future_d3_date)
          };
          lv_obj_t *future_day_labels[3] = {
            id(lbl_agenda_future_d1_day), id(lbl_agenda_future_d2_day),
            id(lbl_agenda_future_d3_day)
          };
          lv_obj_t *future_count_labels[3] = {
