            x: 88
            y: 56
            width: 936
            height: 544
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 16
            scrollable: false
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: START
              flex_align_cross: START
            widgets:
              # LINKS — Album art placeholder (296px)
              - obj:
                  width: 296
                  height: 512
                  bg_color: 0x101010
                  bg_opa: COVER
                  radius: 18
                  border_width: 0
                  widgets:
                    - obj:
                        align: TOP_MID
                        y: 20
                        width: 256
                        height: 256
                        bg_color: 0x202020
                        bg_opa: COVER
                        radius: 14
                        border_width: 0
                        widgets:
                          - image:
                              id: img_album
                              src: album_art
                              align: CENTER
