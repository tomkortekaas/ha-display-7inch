binary_sensor:
  - platform: homeassistant
    id: ha_balans_connection
    entity_id: binary_sensor.balans_batterij_connection
    internal: true
  - platform: homeassistant
    id: display_actief
    entity_id: input_boolean.ha_display_7_actief
    internal: true
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: display_actief
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: 90%
            else:
              - light.turn_off:
                  id: display_backlight

artwork_image:
  - id: album_art
    url: "http://homeassistant.local:8123/api/media_player_proxy/${spotify_entity}"
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 256x256
    allow_insecure_local_urls: true
    update_interval: never
    on_download_finished:
      - script.execute: album_art_apply
    on_error:
      - script.execute: album_art_retry
  - id: immich_art
    url: "http://homeassistant.local:8123/local/immich/current.jpg"
