# ---------------------------------------------------------------
# Tijd
# ---------------------------------------------------------------
time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    timezone: Europe/Amsterdam
    on_time:
      # Nachtelijke reboot om 03:00 — ruimt zombie API-verbindingen op
      - seconds: 0
        minutes: 0
        hours: 3
        then:
          - button.press: btn_restart

