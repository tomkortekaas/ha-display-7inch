script:
  - id: album_art_load
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(album_art_pending_url).empty();'
          then:
            - if:
                condition:
                  lambda: |-
                    return id(album_art_pending_url) == id(album_art_loaded_url);
                then:
                  - lvgl.widget.show: img_album
                  - lvgl.widget.hide: lbl_album_fallback
                else:
                  - lvgl.widget.hide: img_album
                  - lvgl.widget.show: lbl_album_fallback
                  - artwork_image.set_url:
                      id: album_art
                      url: !lambda 'return id(album_art_pending_url);'

  - id: album_art_apply
    mode: restart
    then:
      - lambda: |-
          id(album_art_loaded_url) = std::string(id(album_art)->get_url());
          id(album_art_retry_count) = 0;
      - lvgl.image.update:
          id: img_album
          src: album_art
      - lvgl.widget.show: img_album
      - lvgl.widget.hide: lbl_album_fallback

  - id: album_art_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(album_art_retry_count) < 3;'
          then:
            - lambda: 'id(album_art_retry_count)++;'
            - delay: !lambda |-
                static const uint32_t d[] = {500, 2000, 5000};
                int i = id(album_art_retry_count) - 1;
                if (i < 0) i = 0;
                if (i > 2) i = 2;
                return d[i];
            - artwork_image.set_url:
                id: album_art
                url: !lambda 'return id(album_art_pending_url);'

  - id: immich_photo_load
    mode: restart
    then:
      - lambda: |-
          std::string rel = id(immich_url).state;
          if (rel.empty() || rel == "unknown" || rel == "unavailable") return;
          std::string url = (rel.rfind("http", 0) == 0) ? rel : id(ha_base_url_detected) + rel;
          if (url == id(immich_art_loaded_url)) return;
          id(immich_art_loaded_url) = url;
          id(immich_art_retry_count) = 0;
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""
      - artwork_image.set_url:
          id: immich_art
          url: !lambda 'return id(immich_art_loaded_url);'

  - id: immich_photo_apply
    mode: restart
    then:
      - lvgl.image.update:
          id: img_immich_photo
          src: immich_art
      - lvgl.widget.hide: immich_placeholder
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""

  - id: immich_photo_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(immich_art_retry_count) < 2;'
          then:
            - lambda: 'id(immich_art_retry_count)++;'
            - delay: 2s
            - artwork_image.set_url:
                id: immich_art
                url: !lambda 'return id(immich_art_loaded_url);'
          else:
            - lvgl.label.update:
                id: lbl_immich_status
                text: ""

  - id: doorbell_show
    mode: restart
    then:
      - lambda: |-
          id(doorbell_page_active) = true;
          id(immich_page_active) = false;
          id(immich_overlay_countdown) = 0;
          id(doorbell_art_retry_count) = 0;
      - lvgl.widget.show: nav_rail_container
      - lvgl.widget.show: top_status_bar
      - lvgl.page.show: page_doorbell
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "snapshot laden..."
      - script.execute: doorbell_snapshot_load

  - id: doorbell_hide
    mode: restart
    then:
      - lambda: 'id(doorbell_page_active) = false;'
      - lvgl.page.show: page_energy

  - id: doorbell_snapshot_load
    mode: restart
    then:
      - artwork_image.set_url:
          id: doorbell_art
          url: !lambda |-
            char bust[24];
            snprintf(bust, sizeof(bust), "%lu", (unsigned long) millis());
            return id(ha_base_url_detected) + "/local/ha-display-doorbell.jpg?v=" + std::string(bust);

  - id: doorbell_snapshot_apply
    mode: restart
    then:
      - lambda: 'id(doorbell_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_doorbell_snapshot
          src: doorbell_art
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "live snapshot"

  - id: doorbell_snapshot_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(doorbell_page_active) && id(doorbell_art_retry_count) < 2;'
          then:
            - lambda: 'id(doorbell_art_retry_count)++;'
            - delay: 750ms
            - script.execute: doorbell_snapshot_load
          else:
            - lvgl.label.update:
                id: lbl_doorbell_status
                text: "geen snapshot"

  - id: radar_frame_load
    mode: restart
    then:
      - lambda: |-
          int frame = id(radar_frame_index);
          if (frame < 0) frame = 0;
          if (frame > 8) frame = 8;
          int minutes = frame * 15;
          char label[24];
          if (minutes == 0) {
            snprintf(label, sizeof(label), "radar nu");
          } else {
            snprintf(label, sizeof(label), "radar +%d min", minutes);
          }
          id(radar_last_frame_label) = std::string(label);
          lv_label_set_text(id(lbl_radar_frame), id(radar_last_frame_label).c_str());
          lv_bar_set_value(id(bar_radar_progress), frame, LV_ANIM_OFF);
      - artwork_image.set_url:
          id: radar_art
          url: !lambda |-
            int frame = id(radar_frame_index);
            if (frame < 0) frame = 0;
            if (frame > 8) frame = 8;
            char path[96];
            snprintf(path, sizeof(path), "/local/ha-display-radar/radar_%d.jpg?v=%lu", frame, (unsigned long) millis());
            return id(ha_base_url_detected) + std::string(path);

  - id: radar_frame_apply
    mode: restart
    then:
      - lambda: 'id(radar_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_buienradar
          src: radar_art
      - lvgl.label.update:
          id: lbl_radar_frame
          text: !lambda 'return id(radar_last_frame_label);'

  - id: radar_frame_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(radar_art_retry_count) < 2;'
          then:
            - lambda: 'id(radar_art_retry_count)++;'
            - delay: 750ms
            - script.execute: radar_frame_load
          else:
            - lvgl.label.update:
                id: lbl_radar_frame
                text: "radar offline"

# ---------------------------------------------------------------
# Interval updates — NOOIT on_value gebruiken voor LVGL
# ---------------------------------------------------------------
interval:
  # Immich overlay timeout — telt af van 30 naar 0, verbergt dan controls + nav
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(immich_overlay_countdown) > 0;'
          then:
            - lambda: 'id(immich_overlay_countdown)--;'
            - if:
                condition:
                  lambda: 'return id(immich_overlay_countdown) == 0 && id(immich_page_active);'
                then:
                  - lvgl.widget.hide: immich_controls
                  - lvgl.widget.hide: nav_rail_container
                  - lvgl.widget.show: lbl_immich_clock
                  - lvgl.widget.show: lbl_immich_date
                  - lvgl.widget.show: lbl_immich_place

  # Deurbelpagina — korte snapshot-loop zolang Home Assistant de helper actief houdt
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(doorbell_active).state == "on";'
          then:
            - if:
                condition:
                  lambda: 'return !id(doorbell_page_active);'
                then:
                  - script.execute: doorbell_show
                else:
                  - script.execute: doorbell_snapshot_load
          else:
            - if:
                condition:
                  lambda: 'return id(doorbell_page_active);'
                then:
                  - script.execute: doorbell_hide

  # Clock, datum, sensor labels — elke 3s
  - interval: 3s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("\xe2\x80\x94");
            const char* days[] = {"zo","ma","di","wo","do","vr","za"};
            const char* months[] = {"jan","feb","mrt","apr","mei","jun",
                                    "jul","aug","sep","okt","nov","dec"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s %d %s",
              days[t.day_of_week % 7],
              t.day_of_month,
              months[(t.month - 1) % 12]);
            return std::string(buf);

      # Status bar — vermogen chip
      - lvgl.label.update:
          id: lbl_power_status
          text: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return std::string("-- W");
            char buf[12];
            snprintf(buf, sizeof(buf), "%.0f W", v * 1000.0f);
            return std::string(buf);

      # Verbruik arc + label
      - lvgl.arc.update:
          id: arc_verbruik
          value: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return 0;
            return (int)std::min(v * 1000.0f, 6000.0f);
      - lvgl.label.update:
          id: lbl_verbruik_w
          text: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return std::string("--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f", v * 1000.0f);
            return std::string(buf);

      # Solar arc + label
      - lvgl.arc.update:
          id: arc_solar
          value: !lambda |-
            float v = id(ha_productie).state;
            if (isnan(v)) return 0;
            return (int)std::min(v * 1000.0f, 5000.0f);
      - lvgl.label.update:
          id: lbl_solar_w
          text: !lambda |-
            float v = id(ha_productie).state;
            if (isnan(v)) return std::string("--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f", v * 1000.0f);
            return std::string(buf);

      # Gas arc + label
      - lvgl.arc.update:
          id: arc_gas
          value: !lambda |-
            float v = id(ha_gas).state;
            if (isnan(v)) return 0;
            return (int)std::min(v * 100.0f, 300.0f);
      - lvgl.label.update:
          id: lbl_gas_mh
          text: !lambda |-
            float v = id(ha_gas).state;
            if (isnan(v)) return std::string("--");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.3f", v);
            return std::string(buf);

      # Energie linker kolom
      - lvgl.label.update:
          id: lbl_verbruik_kw
          text: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return std::string("-- kW verbruik");
            char buf[20];
            snprintf(buf, sizeof(buf), "%.3f kW verbruik", v);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_productie_kw
          text: !lambda |-
            float v = id(ha_productie).state;
            if (isnan(v)) return std::string("-- kW productie");
            char buf[20];
            snprintf(buf, sizeof(buf), "%.3f kW productie", v);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_kosten_vandaag
          text: !lambda |-
            float v = id(ha_kosten_vandaag).state;
            if (isnan(v)) return std::string("--  vandaag");
            char buf[24];
            snprintf(buf, sizeof(buf), "%.2f \xe2\x82\xac  vandaag", v);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_kosten_maand
          text: !lambda |-
            float v = id(ha_kosten_maand).state;
            if (isnan(v)) return std::string("--  deze maand");
            char buf[24];
            snprintf(buf, sizeof(buf), "%.2f \xe2\x82\xac  deze maand", v);
            return std::string(buf);

      # Statusbalk buiten temp + HA dot
      - lvgl.label.update:
          id: lbl_buiten_temp
          text: !lambda |-
            float v = id(wx_temp).state;
            if (isnan(v)) return std::string("--\xc2\xb0");
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f\xc2\xb0", v);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_ha_dot
          text_color: !lambda |-
            return api::global_api_server->is_connected() ? lv_color_hex(0x2EE36A) : lv_color_hex(0xFF2A7A);

      # Rechter kolom bars
      - lvgl.label.update:
          id: lbl_cost_groot
          text: !lambda |-
            float v = id(ha_kosten_vandaag).state;
            if (isnan(v)) return std::string("-- \xe2\x82\xac");
            char buf[12];
            snprintf(buf, sizeof(buf), "%.2f \xe2\x82\xac", v);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_kosten
          value: !lambda |-
            float v = id(ha_kosten_vandaag).state;
            if (isnan(v)) return 0;
            return (int)std::min(std::max(v / 20.0f * 100.0f, 0.0f), 100.0f);
      - lvgl.label.update:
          id: lbl_vb_rechts
          text: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return std::string("-- kW");
            char buf[12];
            snprintf(buf, sizeof(buf), "%.3f kW", v);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_verbruik
          value: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return 0;
            return (int)std::min(v / 6.0f * 100.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_prod_rechts
          text: !lambda |-
            float v = id(ha_productie).state;
            if (isnan(v)) return std::string("-- kW");
            char buf[12];
            snprintf(buf, sizeof(buf), "%.3f kW", v);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_productie
          value: !lambda |-
            float v = id(ha_productie).state;
            if (isnan(v)) return 0;
            return (int)std::min(v / 5.0f * 100.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_binnen_temp
          text: !lambda |-
            float v = id(ha_binnen_temp).state;
            if (isnan(v)) return std::string("--\xc2\xb0\x43");
            char buf[8];
            snprintf(buf, sizeof(buf), "%.1f\xc2\xb0\x43", v);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_temp
          value: !lambda |-
            float v = id(ha_binnen_temp).state;
            if (isnan(v)) return 0;
            return (int)std::min(std::max((v - 10.0f) / 20.0f * 100.0f, 0.0f), 100.0f);

      # Media labels + voortgang + volume
      - lvgl.label.update:
          id: lbl_track_titel
          text: !lambda |-
            std::string s = id(media_title).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: lbl_track_artiest
          text: !lambda |-
            std::string s = id(media_artist).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: lbl_media_source
          text: !lambda |-
            std::string s = id(media_source).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("${spotify_source_fallback}");
            return s;
      - lvgl.label.update:
          id: lbl_play_icoon
          text: !lambda |-
            return id(media_state).state == "playing"
              ? std::string("\U000F03E4") : std::string("\U000F040A");
      - lvgl.bar.update:
          id: bar_media_progress
          value: !lambda |-
            float pos = id(media_positie).state;
            float dur = id(media_duur).state;
            if (isnan(pos) || isnan(dur) || dur <= 0) return 0;
            return (int)std::min((pos / dur) * 100.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_elapsed
          text: !lambda |-
            float pos = id(media_positie).state;
            if (isnan(pos)) return std::string("0:00");
            int m = (int)pos / 60;
            int s = (int)pos % 60;
            char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", m, s);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_remaining
          text: !lambda |-
            float pos = id(media_positie).state;
            float dur = id(media_duur).state;
            if (isnan(pos) || isnan(dur)) return std::string("0:00");
            float rem = dur - pos;
            if (rem < 0) rem = 0;
            int m = (int)rem / 60;
            int s = (int)rem % 60;
            char buf[8];
            snprintf(buf, sizeof(buf), "-%d:%02d", m, s);
            return std::string(buf);
      - lvgl.slider.update:
          id: slider_volume
          value: !lambda |-
            float v = id(media_volume).state;
            if (isnan(v)) return 50;
            return (int)(v * 100.0f);

      # Weer labels
      - lambda: |-
          auto icon_for = [](const std::string &c) -> const char* {
            if (c.find("pour") != std::string::npos || c.find("lightning") != std::string::npos) return "\U000F0596";
            if (c.find("rain") != std::string::npos || c.find("hail") != std::string::npos) return "\U000F0597";
            if (c.find("partly") != std::string::npos) return "\U000F0595";
            if (c.find("cloud") != std::string::npos || c.find("fog") != std::string::npos) return "\U000F0590";
            return "\U000F0599";
          };
          auto color_for = [](const std::string &c) -> lv_color_t {
            if (c.find("rain") != std::string::npos || c.find("pour") != std::string::npos) return lv_color_hex(0x34D0FF);
            if (c.find("cloud") != std::string::npos || c.find("fog") != std::string::npos) return lv_color_hex(0xA0A0A0);
            return lv_color_hex(0xFFD84A);
          };
          auto label_for = [](std::string c) -> std::string {
            if (c == "clear-night") return "heldere nacht";
            if (c == "cloudy") return "bewolkt";
            if (c == "fog") return "mist";
            if (c == "hail") return "hagel";
            if (c == "lightning") return "onweer";
            if (c == "lightning-rainy") return "onweer en regen";
            if (c == "partlycloudy") return "half bewolkt";
            if (c == "pouring") return "zware regen";
            if (c == "rainy") return "regen";
            if (c == "snowy") return "sneeuw";
            if (c == "sunny") return "zonnig";
            if (c == "windy") return "winderig";
            if (c.empty() || c == "unknown" || c == "unavailable") return "--";
            return c;
          };
          auto temp_color = [](float t) -> lv_color_t {
            float x = (t + 5.0f) / 40.0f;
            if (x < 0) x = 0;
            if (x > 1) x = 1;
            uint8_t r = (uint8_t)(0x34 + x * (0xF5 - 0x34));
            uint8_t g = (uint8_t)(0xD0 + x * (0xB4 - 0xD0));
            uint8_t b = (uint8_t)(0xFF + x * (0x4A - 0xFF));
            return lv_color_make(r, g, b);
          };
          auto set_forecast = [&](lv_obj_t *icon, lv_obj_t *cond, lv_obj_t *temp, lv_obj_t *wind, lv_obj_t *bar,
                                  const std::string &c, float lo, float hi, float w, float range_min, float range_span) {
            char buf[48];
            lv_label_set_text(icon, icon_for(c));
            lv_obj_set_style_text_color(icon, color_for(c), LV_PART_MAIN);
            lv_label_set_text(cond, label_for(c).c_str());
            if (isnan(lo) || isnan(hi)) {
              lv_label_set_text(temp, "laden");
              lv_label_set_text(wind, "verwachting laden");
              lv_bar_set_start_value(bar, 0, LV_ANIM_OFF);
              lv_bar_set_value(bar, 0, LV_ANIM_OFF);
            } else {
              snprintf(buf, sizeof(buf), "%.0f\xc2\xb0 / %.0f\xc2\xb0", lo, hi);
              lv_label_set_text(temp, buf);
              int sv = (int)((lo - range_min) / range_span * 100.0f);
              int vv = (int)((hi - range_min) / range_span * 100.0f);
              if (sv < 0) sv = 0;
              if (vv > 100) vv = 100;
              if (vv <= sv) vv = sv + 2;
              if (vv > 100) vv = 100;
              lv_bar_set_start_value(bar, sv, LV_ANIM_OFF);
              lv_bar_set_value(bar, vv, LV_ANIM_OFF);
              lv_obj_set_style_bg_color(bar, temp_color(lo), LV_PART_INDICATOR);
              lv_obj_set_style_bg_grad_color(bar, temp_color(hi), LV_PART_INDICATOR);
              lv_obj_set_style_bg_grad_dir(bar, LV_GRAD_DIR_HOR, LV_PART_INDICATOR);
            }
            if (!isnan(w)) {
              snprintf(buf, sizeof(buf), "%.0f km/u", w);
              lv_label_set_text(wind, buf);
            }
          };

          char buf[96];
          std::string cnow = id(wx_cond_now).state;
          lv_label_set_text(id(lbl_wx_now_icon), icon_for(cnow));
          lv_obj_set_style_text_color(id(lbl_wx_now_icon), color_for(cnow), LV_PART_MAIN);
          lv_label_set_text(id(lbl_wx_now_cond), label_for(cnow).c_str());
          if (isnan(id(wx_temp).state)) {
            lv_label_set_text(id(lbl_wx_now_temp), "--");
          } else {
            snprintf(buf, sizeof(buf), "%.1f\xc2\xb0\x43", id(wx_temp).state);
            lv_label_set_text(id(lbl_wx_now_temp), buf);
          }
          if (isnan(id(wx_wind).state)) {
            lv_label_set_text(id(lbl_wx_wind), "--");
          } else {
            snprintf(buf, sizeof(buf), "%.0f km/u %s", id(wx_wind).state, id(wx_wind_dir).state.c_str());
            lv_label_set_text(id(lbl_wx_wind), buf);
          }
          if (isnan(id(wx_uv).state)) {
            lv_label_set_text(id(lbl_wx_uv), "--");
            lv_bar_set_value(id(bar_wx_uv), 0, LV_ANIM_OFF);
          } else {
            snprintf(buf, sizeof(buf), "%.0f", id(wx_uv).state);
            lv_label_set_text(id(lbl_wx_uv), buf);
            lv_bar_set_value(id(bar_wx_uv), (int)std::min(std::max(id(wx_uv).state, 0.0f), 11.0f), LV_ANIM_OFF);
          }
          std::string rain = id(wx_rain_cap).state;
          if (rain.empty() || rain == "unknown" || rain == "unavailable") rain = "regen --";
          lv_label_set_text(id(lbl_wx_rain), rain.c_str());
          snprintf(buf, sizeof(buf), "op %s  onder %s", id(wx_sunrise).state.c_str(), id(wx_sunset).state.c_str());
          lv_label_set_text(id(lbl_wx_sun), buf);
          if (!isnan(id(wx_sun_pct).state)) {
            lv_bar_set_value(id(bar_wx_sun), (int)std::min(std::max(id(wx_sun_pct).state, 0.0f), 100.0f), LV_ANIM_OFF);
          }

          auto t = id(ha_time).now();
          if (t.is_valid()) {
            const char* days[] = {"zo","ma","di","wo","do","vr","za"};
            lv_label_set_text(id(lbl_wx_d0_day), "Nu");
            lv_label_set_text(id(lbl_wx_d1_day), days[(t.day_of_week + 1) % 7]);
            lv_label_set_text(id(lbl_wx_d2_day), days[(t.day_of_week + 2) % 7]);
            lv_label_set_text(id(lbl_wx_d3_day), days[(t.day_of_week + 3) % 7]);
            lv_label_set_text(id(lbl_wx_d4_day), days[(t.day_of_week + 4) % 7]);
          }
          float lows[5] = {id(wx_d0_lo).state, id(wx_d1_lo).state, id(wx_d2_lo).state, id(wx_d3_lo).state, id(wx_d4_lo).state};
          float highs[5] = {id(wx_d0_hi).state, id(wx_d1_hi).state, id(wx_d2_hi).state, id(wx_d3_hi).state, id(wx_d4_hi).state};
          float range_min = 99.0f;
          float range_max = -99.0f;
          for (int i = 0; i < 5; i++) {
            if (!isnan(lows[i]) && lows[i] < range_min) range_min = lows[i];
            if (!isnan(highs[i]) && highs[i] > range_max) range_max = highs[i];
          }
          if (range_max < range_min) {
            range_min = 0.0f;
            range_max = 1.0f;
          }
          float range_span = range_max - range_min;
          if (range_span < 1.0f) range_span = 1.0f;

          set_forecast(id(lbl_wx_d0_icon), id(lbl_wx_d0_cond), id(lbl_wx_d0_temp), id(lbl_wx_d0_wind), id(bar_wx_d0_range),
                       id(wx_d0_cond).state, id(wx_d0_lo).state, id(wx_d0_hi).state, id(wx_d0_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d1_icon), id(lbl_wx_d1_cond), id(lbl_wx_d1_temp), id(lbl_wx_d1_wind), id(bar_wx_d1_range),
                       id(wx_d1_cond).state, id(wx_d1_lo).state, id(wx_d1_hi).state, id(wx_d1_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d2_icon), id(lbl_wx_d2_cond), id(lbl_wx_d2_temp), id(lbl_wx_d2_wind), id(bar_wx_d2_range),
                       id(wx_d2_cond).state, id(wx_d2_lo).state, id(wx_d2_hi).state, id(wx_d2_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d3_icon), id(lbl_wx_d3_cond), id(lbl_wx_d3_temp), id(lbl_wx_d3_wind), id(bar_wx_d3_range),
                       id(wx_d3_cond).state, id(wx_d3_lo).state, id(wx_d3_hi).state, id(wx_d3_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d4_icon), id(lbl_wx_d4_cond), id(lbl_wx_d4_temp), id(lbl_wx_d4_wind), id(bar_wx_d4_range),
                       id(wx_d4_cond).state, id(wx_d4_lo).state, id(wx_d4_hi).state, id(wx_d4_wind).state, range_min, range_span);

          auto clean_text = [](std::string s, const char *fallback) -> std::string {
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "None") return std::string(fallback);
            return s;
          };
          std::string taken_at = clean_text(id(immich_camera_taken_at).state, "");
          // Plaatsnaam voor de overlay (altijd de echte plaatsnaam, geen filename)
          std::string place = clean_text(id(immich_place).state, "");
          // Jaar extraheren uit immich_date of taken_at
          std::string year = "";
          std::string header_date = clean_text(id(immich_date).state, "");
          for (size_t i = 0; i + 3 < header_date.size(); i++) {
            bool four_digits = true;
            for (size_t j = 0; j < 4; j++) {
              char c = header_date[i + j];
              if (c < '0' || c > '9') four_digits = false;
            }
            if (four_digits) year = header_date.substr(i, 4);
          }
          if (year.empty() && taken_at.size() >= 4) year = taken_at.substr(0, 4);
          // Header in status bar (als immich actief)
          if (id(immich_page_active)) {
            std::string header = place;
            if (!year.empty()) header += (!header.empty() ? " · " : "") + year;
            lv_label_set_text(id(lbl_immich_header), header.c_str());
          } else {
            lv_label_set_text(id(lbl_immich_header), "");
          }
          // Overlay labels altijd bijwerken (ongeacht actieve pagina)
          lv_label_set_text(id(lbl_immich_place), place.c_str());
          lv_label_set_text(id(lbl_immich_date), year.c_str());
          lv_label_set_text(id(lbl_immich_album), clean_text(id(immich_album_txt).state, "random assets").c_str());
          std::string immich_status = clean_text(id(immich_status_text).state, "");
          bool show_immich_toast = id(immich_page_active) && !immich_status.empty() && immich_status != "Immich foto actief";
          lv_label_set_text(id(lbl_immich_status), show_immich_toast ? immich_status.c_str() : "");
          lv_obj_set_style_bg_opa(id(immich_toast), show_immich_toast ? LV_OPA_70 : LV_OPA_TRANSP, LV_PART_MAIN);
          // Klok altijd bijwerken
          if (t.is_valid()) {
            char ibuf[6];
            snprintf(ibuf, sizeof(ibuf), "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(lbl_immich_clock), ibuf);
          }

      # Licht swatches + sliders
      - lvgl.obj.update:
          id: swatch_woonkamer
          bg_color: !lambda |-
            return id(light_woonkamer_st).state == "on" ? lv_color_hex(0x2EE36A) : lv_color_hex(0x3a3a3a);
      - lvgl.slider.update:
