    entity_id: camera.immich_picture_immich_picture_slideshow_random_assets
    attribute: taken_at
    internal: true
  - platform: homeassistant
    id: doorbell_active
    entity_id: ${doorbell_active_entity}
    internal: true

artwork_image:
  - id: album_art
    url: "http://homeassistant.local:8123/api/media_player_proxy/${spotify_entity}"
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 256x256
    allow_insecure_local_urls: true
    update_interval: never
    on_download_finished:
      - script.execute: album_art_apply
    on_error:
      - script.execute: album_art_retry
  - id: immich_art
    url: "http://homeassistant.local:8123/local/immich/current.jpg"
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 1024x600
    resize_mode: FIT
    allow_insecure_local_urls: true
    update_interval: never
    on_download_finished:
      - script.execute: immich_photo_apply
    on_error:
      - script.execute: immich_photo_retry
  - id: doorbell_art
    url: "http://homeassistant.local:8123/local/ha-display-doorbell.jpg"
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 936x526
    resize_mode: FIT
    allow_insecure_local_urls: true
    update_interval: never
    on_download_finished:
      - script.execute: doorbell_snapshot_apply
    on_error:
      - script.execute: doorbell_snapshot_retry
  - id: radar_art
    url: "http://homeassistant.local:8123/local/ha-display-radar/radar_0.jpg"
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 268x402
    resize_mode: FIT
    buffer_size: 65536
    allow_insecure_local_urls: true
    update_interval: never
    on_download_finished:
      - script.execute: radar_frame_apply
    on_error:
      - script.execute: radar_frame_retry

# ---------------------------------------------------------------
# LVGL
# ---------------------------------------------------------------
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  byte_order: little_endian
  bg_color: 0x000000
  bg_opa: COVER
  text_font: font_roboto_16
  theme:
    button:
      bg_color: 0x1A1A1A
      bg_opa: COVER
      text_color: 0xFFFFFF
      border_width: 0
      outline_width: 0
      shadow_width: 0
      scroll_on_focus: false
      pressed:
        bg_color: 0x282828
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0
      focused:
        bg_color: 0x1A1A1A
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0
      checked:
        bg_color: 0x12301C
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0

  # Nav rail + status bar — altijd zichtbaar bovenop alles
  top_layer:
    widgets:
      # Nav rail (links, 88×600)
      - obj:
          id: nav_rail_container
          x: 0
          y: 0
          width: 88
          height: 600
          bg_color: 0x050505
          bg_opa: COVER
          border_width: 0
          pad_all: 0
          widgets:
            # Logo — 44×44 afgerond accentvlak
            - obj:
                align: TOP_MID
                y: 12
                width: 44
                height: 44
                radius: 10
                bg_color: 0x2EE36A
                bg_opa: COVER
                border_width: 0
                widgets:
                  - label:
                      align: CENTER
                      text_font: font_roboto_28
                      text_color: 0xFFFFFF
                      text: "H"
            # Energie — actief (accentstrip links)
            - obj:
                x: 0
                y: 72
                width: 88
                height: 64
                bg_color: 0x101010
                bg_opa: COVER
                border_width: 0
                pad_all: 0
                widgets:
                  - obj:
                      id: nav_strip_energie
                      x: 0
                      y: 4
                      width: 3
                      height: 56
                      bg_color: 0x2EE36A
                      bg_opa: COVER
                      border_width: 0
                  - button:
                      id: nav_energie
                      x: 16
                      y: 4
                      width: 56
                      height: 56
                      radius: 10
                      bg_color: 0x202020
                      bg_opa: COVER
                      on_click:
                        then:
                          - lvgl.page.show: page_energy
                          - lambda: 'id(immich_page_active) = false; id(immich_overlay_countdown) = 0;'
                          - lvgl.widget.show: nav_rail_container
                          - lvgl.widget.show: top_status_bar
                          - lvgl.obj.update:
                              id: nav_strip_energie
                              bg_color: 0x2EE36A
                          - lvgl.obj.update:
                              id: nav_energie
                              bg_color: 0x202020
                          - lvgl.obj.update:
                              id: nav_strip_lichten
                              bg_color: 0x050505
                          - lvgl.obj.update:
                              id: nav_lichten
                              bg_color: 0x1a1a1a
                          - lvgl.obj.update:
                              id: nav_strip_media
                              bg_color: 0x050505
                          - lvgl.obj.update:
                              id: nav_media
                              bg_color: 0x1a1a1a
                          - lvgl.obj.update:
                              id: nav_strip_weather
                              bg_color: 0x050505
                          - lvgl.obj.update:
                              id: nav_weather
                              bg_color: 0x1a1a1a
                          - lvgl.obj.update:
                              id: nav_strip_immich
                              bg_color: 0x050505
                          - lvgl.obj.update:
                              id: nav_immich
                              bg_color: 0x1a1a1a
                      widgets:
                        - label:
                            align: CENTER
                            text_font: font_roboto_16
                            text_color: 0x2EE36A
                            text: "E"
            # Lichten — inactief
            - obj:
                x: 0
                y: 148
                width: 88
                height: 64
                bg_color: 0x050505
                bg_opa: COVER
                border_width: 0
                pad_all: 0
                widgets:
                  - obj:
                      id: nav_strip_lichten
                      x: 0
                      y: 4
                      width: 3
                      height: 56
                      bg_color: 0x050505
                      bg_opa: COVER
                      border_width: 0
                  - button:
                      id: nav_lichten
                      x: 16
                      y: 4
                      width: 56
                      height: 56
                      radius: 10
                      bg_color: 0x1a1a1a
                      bg_opa: COVER
