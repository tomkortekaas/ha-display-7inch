                        width: 200
                        height: 52
                        radius: 14
                        bg_color: 0x2A2A2A
                        bg_opa: COVER
                        border_width: 0
                        on_click:
                          - lvgl.widget.hide: immich_delete_dialog
                        widgets:
                          - label:
                              align: CENTER
                              text_font: font_roboto_20
                              text_color: 0xAAAAAA
