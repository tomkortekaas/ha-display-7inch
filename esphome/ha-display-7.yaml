            id(agenda_future_d3_date_badge)
          };
          lv_obj_t *future_scrolls[3] = {
            id(agenda_future_d1_scroll), id(agenda_future_d2_scroll), id(agenda_future_d3_scroll)
          };
          lv_obj_t *future_date_labels[3] = {
