script:
  - id: album_art_load
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(album_art_pending_url).empty();'
          then:
            - if:
                condition:
                  lambda: |-
                    return id(album_art_pending_url) == id(album_art_loaded_url);
                then:
                  - lvgl.widget.show: img_album
                  - lvgl.widget.hide: lbl_album_fallback
                else:
                  - lvgl.widget.hide: img_album
                  - lvgl.widget.show: lbl_album_fallback
                  - artwork_image.set_url:
                      id: album_art
                      url: !lambda 'return id(album_art_pending_url);'

  - id: album_art_apply
    mode: restart
    then:
      - lambda: |-
          id(album_art_loaded_url) = std::string(id(album_art)->get_url());
          id(album_art_retry_count) = 0;
      - lvgl.image.update:
          id: img_album
          src: album_art
      - lvgl.widget.show: img_album
      - lvgl.widget.hide: lbl_album_fallback

  - id: album_art_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(album_art_retry_count) < 3;'
          then:
            - lambda: 'id(album_art_retry_count)++;'
            - delay: !lambda |-
                static const uint32_t d[] = {500, 2000, 5000};
                int i = id(album_art_retry_count) - 1;
                if (i < 0) i = 0;
                if (i > 2) i = 2;
                return d[i];
            - artwork_image.set_url:
                id: album_art
                url: !lambda 'return id(album_art_pending_url);'

  - id: immich_photo_load
    mode: restart
    then:
      - lambda: |-
          std::string rel = id(immich_url).state;
          if (rel.empty() || rel == "unknown" || rel == "unavailable") return;
          std::string url = (rel.rfind("http", 0) == 0) ? rel : id(ha_base_url_detected) + rel;
          if (url == id(immich_art_loaded_url)) return;
          id(immich_art_loaded_url) = url;
          id(immich_art_retry_count) = 0;
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""
      - artwork_image.set_url:
          id: immich_art
          url: !lambda 'return id(immich_art_loaded_url);'

  - id: immich_photo_apply
    mode: restart
    then:
      - lvgl.image.update:
          id: img_immich_photo
          src: immich_art
      - lvgl.widget.hide: immich_placeholder
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""

  - id: immich_photo_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(immich_art_retry_count) < 2;'
          then:
            - lambda: 'id(immich_art_retry_count)++;'
            - delay: 2s
            - artwork_image.set_url:
                id: immich_art
                url: !lambda 'return id(immich_art_loaded_url);'
          else:
            - lvgl.label.update:
                id: lbl_immich_status
                text: ""

  - id: doorbell_show
    mode: restart
    then:
      - lambda: |-
          id(doorbell_page_active) = true;
          id(immich_page_active) = false;
          id(immich_overlay_countdown) = 0;
          id(doorbell_art_retry_count) = 0;
      - lvgl.widget.show: nav_rail_container
      - lvgl.widget.show: top_status_bar
      - lvgl.page.show: page_doorbell
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "snapshot laden..."
      - script.execute: doorbell_snapshot_load

  - id: doorbell_hide
    mode: restart
    then:
      - lambda: 'id(doorbell_page_active) = false;'
      - lvgl.page.show: page_energy

  - id: doorbell_snapshot_load
    mode: restart
    then:
      - artwork_image.set_url:
          id: doorbell_art
          url: !lambda |-
            char bust[24];
            snprintf(bust, sizeof(bust), "%lu", (unsigned long) millis());
            return id(ha_base_url_detected) + "/local/ha-display-doorbell.jpg?v=" + std::string(bust);

  - id: doorbell_snapshot_apply
    mode: restart
    then:
      - lambda: 'id(doorbell_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_doorbell_snapshot
          src: doorbell_art
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "live snapshot"

  - id: doorbell_snapshot_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(doorbell_page_active) && id(doorbell_art_retry_count) < 2;'
          then:
            - lambda: 'id(doorbell_art_retry_count)++;'
            - delay: 750ms
            - script.execute: doorbell_snapshot_load
          else:
            - lvgl.label.update:
                id: lbl_doorbell_status
                text: "geen snapshot"

  - id: radar_frame_load
    mode: restart
    then:
      - lambda: |-
          int frame = id(radar_frame_index);
          if (frame < 0) frame = 0;
          if (frame > 8) frame = 8;
          int minutes = frame * 15;
          char label[24];
          if (minutes == 0) {
            snprintf(label, sizeof(label), "radar nu");
          } else {
            snprintf(label, sizeof(label), "radar +%d min", minutes);
          }
          id(radar_last_frame_label) = std::string(label);
          lv_label_set_text(id(lbl_radar_frame), id(radar_last_frame_label).c_str());
          lv_bar_set_value(id(bar_radar_progress), frame, LV_ANIM_OFF);
      - artwork_image.set_url:
          id: radar_art
          url: !lambda |-
            int frame = id(radar_frame_index);
            if (frame < 0) frame = 0;
            if (frame > 8) frame = 8;
            char path[96];
            snprintf(path, sizeof(path), "/local/ha-display-radar/radar_%d.jpg?v=%lu", frame, (unsigned long) millis());
            return id(ha_base_url_detected) + std::string(path);

  - id: radar_frame_apply
    mode: restart
    then:
      - lambda: 'id(radar_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_buienradar
          src: radar_art
      - lvgl.label.update:
          id: lbl_radar_frame
          text: !lambda 'return id(radar_last_frame_label);'

  - id: radar_frame_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(radar_art_retry_count) < 2;'
          then:
            - lambda: 'id(radar_art_retry_count)++;'
            - delay: 750ms
            - script.execute: radar_frame_load
          else:
            - lvgl.label.update:
                id: lbl_radar_frame
                text: "radar offline"

# ---------------------------------------------------------------
# Interval updates — NOOIT on_value gebruiken voor LVGL
# ---------------------------------------------------------------
interval:
  # Immich overlay timeout — telt af van 30 naar 0, verbergt dan controls + nav
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(immich_overlay_countdown) > 0;'
          then:
            - lambda: 'id(immich_overlay_countdown)--;'
            - if:
                condition:
                  lambda: 'return id(immich_overlay_countdown) == 0 && id(immich_page_active);'
                then:
                  - lvgl.widget.hide: immich_controls
                  - lvgl.widget.hide: nav_rail_container
      - if:
          condition:
            lambda: 'return id(review_nav_countdown) > 0;'
          then:
            - lambda: 'id(review_nav_countdown)--;'
            - if:
                condition:
                  lambda: 'return id(review_nav_countdown) == 0;'
                then:
                  - lvgl.widget.show: nav_rail_container
                  - lvgl.widget.show: top_status_bar

  # Review badge + voortgang label — update elke 30s
  - interval: 30s
    then:
      - lvgl.label.update:
          id: lbl_review_badge
          text: !lambda |-
            auto s = id(ha_review_resterend).state;
            if (s.empty()) return std::string("0");
            int v = atoi(s.c_str());
            return str_sprintf("%d", v < 0 ? 0 : v);
      - lvgl.label.update:
          id: lbl_review_voortgang
          text: !lambda |-
            auto s = id(ha_review_voortgang).state;
            return s.empty() ? std::string("") : s;

  # Deurbelpagina — korte snapshot-loop zolang Home Assistant de helper actief houdt
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(doorbell_active).state == "on";'
          then:
            - if:
                condition:
                  lambda: 'return !id(doorbell_page_active);'
                then:
                  - script.execute: doorbell_show
                else:
                  - script.execute: doorbell_snapshot_load
          else:
            - if:
                condition:
                  lambda: 'return id(doorbell_page_active);'
                then:
                  - script.execute: doorbell_hide

  # Clock, datum, sensor labels — elke 3s
  - interval: 3s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("\xe2\x80\x94");
            const char* days[] = {"zo","ma","di","wo","do","vr","za"};
            const char* months[] = {"jan","feb","mrt","apr","mei","jun",
                                    "jul","aug","sep","okt","nov","dec"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s %d %s",
              days[t.day_of_week % 7],
              t.day_of_month,
              months[(t.month - 1) % 12]);
            return std::string(buf);

      # Agenda week blocks
      - lambda: |-
          auto clean_agenda = [](std::string s) -> std::string {
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "None") return std::string("");
            return s;
          };
          auto set_text = [&](lv_obj_t *label, const std::string &value, const char *fallback) {
            std::string out = clean_agenda(value);
            if (out.empty()) out = fallback;
            lv_label_set_text(label, out.c_str());
          };
          auto minutes_from = [](const std::string &s) -> int {
            if (s.size() < 5 || s[2] != ':') return -1;
            if (!isdigit(s[0]) || !isdigit(s[1]) || !isdigit(s[3]) || !isdigit(s[4])) return -1;
            return ((s[0] - '0') * 10 + (s[1] - '0')) * 60 + ((s[3] - '0') * 10 + (s[4] - '0'));
          };
          auto update_block = [&](lv_obj_t *box, lv_obj_t *label, const std::string &raw, int day, int slot, int &last_bottom) {
            std::string s = clean_agenda(raw);
            if (s.empty()) { lv_obj_add_flag(box, LV_OBJ_FLAG_HIDDEN); return; }
            int x = 60 + day * 125;
            int y = 98;
            int h = 32;
            int mins = minutes_from(s);
            if (s.rfind("hele dag", 0) == 0) {
              y = 92 + slot * 4;
              h = 28;
            } else if (mins >= 0) {
              if (mins < 480) mins = 480;
              if (mins > 1200) mins = 1200;
              y = 98 + ((mins - 480) * 408) / 720;
              if (y < last_bottom + 2) y = last_bottom + 2;
              if (y > 468) y = 468;
            } else {
              y = 98 + slot * 36;
            }
            last_bottom = y + h;
            lv_obj_set_pos(box, x, y);
            lv_obj_set_size(box, 114, h);
            lv_label_set_text(label, s.c_str());
            lv_obj_clear_flag(box, LV_OBJ_FLAG_HIDDEN);
          };
          set_text(id(lbl_agenda_d0_title), id(agenda_d0_title).state, "--");
          set_text(id(lbl_agenda_d0_date), id(agenda_d0_date).state, "--");
          int agenda_d0_bottom = 92;
          update_block(id(agenda_d0_block_1), id(lbl_agenda_d0_block_1), id(agenda_d0_event_1).state, 0, 0, agenda_d0_bottom);
          update_block(id(agenda_d0_block_2), id(lbl_agenda_d0_block_2), id(agenda_d0_event_2).state, 0, 1, agenda_d0_bottom);
          update_block(id(agenda_d0_block_3), id(lbl_agenda_d0_block_3), id(agenda_d0_event_3).state, 0, 2, agenda_d0_bottom);
          update_block(id(agenda_d0_block_4), id(lbl_agenda_d0_block_4), id(agenda_d0_event_4).state, 0, 3, agenda_d0_bottom);
          update_block(id(agenda_d0_block_5), id(lbl_agenda_d0_block_5), id(agenda_d0_event_5).state, 0, 4, agenda_d0_bottom);
          update_block(id(agenda_d0_block_6), id(lbl_agenda_d0_block_6), id(agenda_d0_event_6).state, 0, 5, agenda_d0_bottom);
          update_block(id(agenda_d0_block_7), id(lbl_agenda_d0_block_7), id(agenda_d0_event_7).state, 0, 6, agenda_d0_bottom);
          update_block(id(agenda_d0_block_8), id(lbl_agenda_d0_block_8), id(agenda_d0_event_8).state, 0, 7, agenda_d0_bottom);
          set_text(id(lbl_agenda_d0_more), id(agenda_d0_more).state, "");

          set_text(id(lbl_agenda_d1_title), id(agenda_d1_title).state, "--");
          set_text(id(lbl_agenda_d1_date), id(agenda_d1_date).state, "--");
          int agenda_d1_bottom = 92;
          update_block(id(agenda_d1_block_1), id(lbl_agenda_d1_block_1), id(agenda_d1_event_1).state, 1, 0, agenda_d1_bottom);
          update_block(id(agenda_d1_block_2), id(lbl_agenda_d1_block_2), id(agenda_d1_event_2).state, 1, 1, agenda_d1_bottom);
          update_block(id(agenda_d1_block_3), id(lbl_agenda_d1_block_3), id(agenda_d1_event_3).state, 1, 2, agenda_d1_bottom);
          update_block(id(agenda_d1_block_4), id(lbl_agenda_d1_block_4), id(agenda_d1_event_4).state, 1, 3, agenda_d1_bottom);
          update_block(id(agenda_d1_block_5), id(lbl_agenda_d1_block_5), id(agenda_d1_event_5).state, 1, 4, agenda_d1_bottom);
