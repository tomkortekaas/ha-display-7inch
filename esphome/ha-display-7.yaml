          update_block(id(agenda_d3_block_2), id(lbl_agenda_d3_block_2), id(agenda_d3_event_2).state, 3, 1, agenda_d3_bottom);
          update_block(id(agenda_d3_block_3), id(lbl_agenda_d3_block_3), id(agenda_d3_event_3).state, 3, 2, agenda_d3_bottom);
          update_block(id(agenda_d3_block_4), id(lbl_agenda_d3_block_4), id(agenda_d3_event_4).state, 3, 3, agenda_d3_bottom);
