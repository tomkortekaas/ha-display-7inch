# ---------------------------------------------------------------
# HA Display 7" — Guition JC1060P470 (ESP32-P4, MIPI DSI)
# Screens: Energie | Verlichting | Media
# ---------------------------------------------------------------

substitutions:
  spotify_entity: media_player.spotify_tomkortekaas
  keuken_amp_entity: media_player.keuken_amp
  spotify_position_entity: sensor.spotify_huidige_positie
  spotify_source_fallback: "Keuken Amp"
  doorbell_active_entity: input_boolean.ha_display_deurbel_actief

globals:
  - id: album_art_loaded_url
    type: std::string
    initial_value: '""'
  - id: album_art_pending_url
    type: std::string
    initial_value: '""'
  - id: ha_base_url_detected
    type: std::string
    initial_value: '"http://homeassistant.local:8123"'
  - id: album_art_retry_count
    type: int
    initial_value: '0'
  - id: immich_art_loaded_url
    type: std::string
    initial_value: '""'
  - id: immich_art_retry_count
    type: int
    initial_value: '0'
  - id: immich_page_active
    type: bool
    initial_value: 'false'
  - id: immich_overlay_countdown
    type: int
    restore_value: no
    initial_value: '0'
  - id: review_info_visible
    type: bool
    initial_value: 'false'
  - id: review_nav_countdown
    type: int
    restore_value: no
    initial_value: '0'
  - id: doorbell_page_active
    type: bool
    initial_value: 'false'
  - id: weather_page_active
    type: bool
    initial_value: 'false'
  - id: spotify_drawer_open
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: doorbell_art_retry_count
    type: int
    initial_value: '0'
  - id: radar_frame_index
    type: int
    initial_value: '0'
  - id: radar_art_retry_count
    type: int
    initial_value: '0'
  - id: radar_last_frame_label
    type: std::string
    initial_value: '"radar laden"'
  - id: energy_flow_phase
    type: int
    restore_value: no
    initial_value: '0'
  - id: energy_pv_max_seen
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: energy_grid_max_seen
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: energy_house_max_seen
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: energy_battery_max_seen
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: nav_overlay_countdown
    type: int
    restore_value: no
    initial_value: '0'
  - id: agenda_light_theme
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: ah_current_recipe_id
    type: std::string
    initial_value: '""'
  - id: ah_current_step
    type: int
    initial_value: '0'
  - id: ah_total_steps
    type: int
    # artwork_image exposes geen responseheaders; de API cyclust veilig
    # door het werkelijke aantal stappen.
    initial_value: '100'
  - id: ah_recipe_page_active
    type: bool
    initial_value: 'false'
  - id: ah_recipes_dirty
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: touch_swipe_tracking
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: touch_swipe_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_swipe_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_swipe_last_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_swipe_last_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: keuken_amp_spotify_auto_shown
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: keuken_amp_media_auto_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: current_display_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: last_page_before_media
    type: int
    restore_value: no
    initial_value: '0'

external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espcontrol
      ref: main
    components: [artwork_image]
    refresh: never

esphome:
  name: ha-display-7
  friendly_name: "HA Display 7\""
  min_version: 2026.3.0

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_HOSTED_USE_MEMPOOL: "n"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"

psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG

api:
  reboot_timeout: 5min
  on_client_connected:
    - lambda: |-
        if (client_info.find("Home Assistant") == std::string::npos) return;
        std::string host = client_address;
        if (host.rfind("::ffff:", 0) == 0) host = host.substr(7);
        size_t p = host.find(':');
        if (p != std::string::npos) host = host.substr(0, p);
        id(ha_base_url_detected) = "http://" + host + ":8123";
        ESP_LOGI("api", "HA base URL auto-detected: %s", id(ha_base_url_detected).c_str());

ota:
  - platform: esphome

http_request:
  timeout: 10s
  verify_ssl: false

update:
  - platform: esp32_hosted
    name: ESP-Hosted Firmware
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 15min
  ap:
    ssid: "HA Display 7 Fallback"
    password: "ha-display-7"

captive_portal:

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz

i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

button:
  - platform: restart
    name: "Restart"
    id: btn_restart

output:
  - id: gpio_backlight_pwm
    platform: ledc
    pin: GPIO23
    frequency: 20000Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    address: 0x5D
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - lambda: |-
          id(touch_swipe_tracking) = true;
          id(touch_swipe_start_x) = touch.x;
          id(touch_swipe_start_y) = touch.y;
          id(touch_swipe_last_x) = touch.x;
          id(touch_swipe_last_y) = touch.y;
    on_update:
      - lambda: |-
          if (!id(touch_swipe_tracking) || touches.empty()) return;
          id(touch_swipe_last_x) = touches[0].x;
          id(touch_swipe_last_y) = touches[0].y;
    on_release:
      - lambda: |-
          if (!id(touch_swipe_tracking)) return;
          id(touch_swipe_tracking) = false;
          const int dx = id(touch_swipe_last_x) - id(touch_swipe_start_x);
          const int dy = id(touch_swipe_last_y) - id(touch_swipe_start_y);
          const int abs_dx = std::abs(dx);
          const int abs_dy = std::abs(dy);
          const bool overlay_visible =
            !lv_obj_has_flag(id(nav_rail_container), LV_OBJ_FLAG_HIDDEN) ||
            !lv_obj_has_flag(id(top_status_bar), LV_OBJ_FLAG_HIDDEN);
          const bool from_left_edge = id(touch_swipe_start_x) <= 120;
          const bool from_nav_zone = id(touch_swipe_start_x) <= 260;
          const bool from_top_edge = id(touch_swipe_start_y) <= 80;
          const bool from_top_zone = id(touch_swipe_start_y) <= 160;
          const bool from_right_edge = id(touch_swipe_start_x) >= 904;
          const bool horizontal_swipe = std::abs(dx) >= 90 && std::abs(dx) > std::abs(dy) * 2;
          const bool swipe_left = dx <= -90;
          const bool swipe_right = dx >= 90;
          if (horizontal_swipe && from_right_edge && swipe_left) {
            const bool spotify_drawer_allowed =
              !id(doorbell_page_active) &&
              !id(immich_page_active) &&
              !id(ah_recipe_page_active) &&
              (id(current_display_page) == 0 ||
               id(current_display_page) == 1 ||
               id(current_display_page) == 3);
            if (spotify_drawer_allowed) {
              id(spotify_drawer_open_script).execute();
              return;
            }
          }
          if (horizontal_swipe && id(spotify_drawer_open) && from_left_edge && swipe_right) {
            id(spotify_drawer_close_script).execute();
            return;
          }
          if (abs_dx >= 55 && abs_dx > abs_dy) {
            if (dx > 0 && from_left_edge) id(nav_overlay_show).execute();
            else if (dx < 0 && overlay_visible && from_nav_zone) id(nav_overlay_hide).execute();
            return;
          }
          if (abs_dy >= 55 && abs_dy > abs_dx) {
            if (dy > 0 && from_top_edge) id(nav_overlay_show).execute();
            else if (dy < 0 && overlay_visible && from_top_zone) id(nav_overlay_hide).execute();
          }

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: true

display:
  - platform: mipi_dsi
    model: JC1060P470
    id: my_display
    update_interval: never
    reset_pin: GPIO5
    auto_clear_enabled: false

