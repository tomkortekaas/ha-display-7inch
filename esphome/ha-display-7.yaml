        - obj:
            x: 88
            y: 56
            width: 936
            height: 544
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 16
            scrollable: false
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: START
              flex_align_cross: START
            widgets:
              # LINKS — Album art placeholder (296px)
              - obj:
                  width: 296
                  height: 512
                  bg_color: 0x101010
                  bg_opa: COVER
                  radius: 18
                  border_width: 0
                  widgets:
                    - obj:
                        align: TOP_MID
                        y: 20
                        width: 256
                        height: 256
                        bg_color: 0x202020
                        bg_opa: COVER
                        radius: 14
                        border_width: 0
                        widgets:
                          - image:
                              id: img_album
                              src: album_art
                              align: CENTER
                              width: 256
                              height: 256
                          - label:
                              id: lbl_album_fallback
                              align: CENTER
                              text_font: font_icon_48
                              text_color: 0x2EE36A
                              text: "\U000F075E"
                    - label:
                        align: BOTTOM_MID
                        y: -60
                        text_font: font_roboto_16
                        text_color: 0xA0A0A0
                        text: "Spotify speelt op"
                    - label:
                        id: lbl_media_source
                        align: BOTTOM_MID
                        y: -36
                        text_font: font_roboto_16
                        text_color: 0xFFFFFF
                        text: "${spotify_source_fallback}"
                    - label:
                        align: BOTTOM_MID
                        y: -14
                        text_font: font_roboto_12
                        text_color: 0x666666
                        text: "${spotify_entity}"

              # RECHTS — Track info + transport (608px)
              - obj:
                  width: 608
                  height: 512
                  bg_color: 0x101010
                  bg_opa: COVER
                  radius: 18
                  border_width: 0
                  pad_all: 28
                  scrollable: false
                  widgets:
                    - label:
                        id: lbl_track_titel
                        x: 0
                        y: 0
                        width: 552
                        text_font: font_roboto_36
                        text_color: 0xFFFFFF
                        long_mode: SCROLL_CIRCULAR
                        text: "—"
                    - label:
                        id: lbl_track_artiest
                        x: 0
                        y: 52
                        width: 552
                        text_font: font_roboto_20
                        text_color: 0xA0A0A0
                        text: "—"
                    # Voortgangsbalk
                    - bar:
                        id: bar_media_progress
                        x: 0
                        y: 100
                        width: 552
                        height: 6
                        radius: 3
                        min_value: 0
                        max_value: 100
                        value: 0
                        bg_color: 0x202020
                        bg_opa: COVER
                        indicator:
                          bg_color: 0x2EE36A
                          bg_opa: COVER
                    - label:
                        id: lbl_elapsed
                        x: 0
                        y: 114
                        text_font: font_roboto_12
                        text_color: 0x666666
                        text: "0:00"
                    - label:
                        id: lbl_remaining
                        align: TOP_RIGHT
                        y: 114
                        text_font: font_roboto_12
                        text_color: 0x666666
                        text: "0:00"
                    # Transport row
                    - obj:
                        x: 0
                        y: 160
                        width: 552
                        height: 88
                        bg_color: 0x101010
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_column: 16
                        widgets:
                          # Shuffle
                          - button:
                              width: 48
                              height: 48
                              radius: 24
                              bg_color: 0x1a1a1a
                              bg_opa: COVER
                              on_click:
                                - homeassistant.action:
                                    action: media_player.shuffle_set
                                    data:
                                      entity_id: ${spotify_entity}
                                    data_template:
                                      shuffle: "{{ sh }}"
                                    variables:
                                      sh: !lambda |-
                                        auto s = id(media_shuffle).state;
                                        bool on = (s == "on" || s == "On" || s == "true" || s == "True" || s == "1");
                                        return on ? std::string("false") : std::string("true");
                              widgets:
                                - label:
                                    align: CENTER
                                    text_font: font_icon_28
                                    text_color: 0xA0A0A0
                                    text: "\U000F049D"
                          # Vorige
                          - button:
                              width: 56
                              height: 56
                              radius: 28
                              bg_color: 0x1a1a1a
                              bg_opa: COVER
                              on_click:
                                - homeassistant.action:
                                    action: media_player.media_previous_track
                                    data:
                                      entity_id: ${spotify_entity}
                              widgets:
                                - label:
                                    align: CENTER
                                    text_font: font_icon_28
                                    text_color: 0xFFFFFF
                                    text: "\U000F04AE"
                          # Play/Pause (groot wit)
                          - button:
                              id: btn_play_pause
                              width: 80
                              height: 80
                              radius: 40
                              bg_color: 0xFFFFFF
                              bg_opa: COVER
                              on_click:
                                - homeassistant.action:
                                    action: media_player.media_play_pause
                                    data:
                                      entity_id: ${spotify_entity}
                              widgets:
                                - label:
                                    id: lbl_play_icoon
                                    align: CENTER
                                    text_font: font_icon_28
                                    text_color: 0x000000
                                    text: "\U000F040A"
                          # Volgende
                          - button:
                              width: 56
                              height: 56
                              radius: 28
                              bg_color: 0x1a1a1a
                              bg_opa: COVER
                              on_click:
                                - homeassistant.action:
                                    action: media_player.media_next_track
                                    data:
                                      entity_id: ${spotify_entity}
                              widgets:
                                - label:
                                    align: CENTER
                                    text_font: font_icon_28
                                    text_color: 0xFFFFFF
                                    text: "\U000F04AD"
                          # Repeat
                          - button:
                              width: 48
                              height: 48
                              radius: 24
                              bg_color: 0x1a1a1a
                              bg_opa: COVER
                              on_click:
                                - homeassistant.action:
                                    action: media_player.repeat_set
                                    data:
                                      entity_id: ${spotify_entity}
                                    data_template:
                                      repeat: "{{ rp }}"
                                    variables:
                                      rp: !lambda 'return id(media_repeat).state == std::string("off") ? "all" : "off";'
                              widgets:
                                - label:
                                    align: CENTER
                                    text_font: font_icon_28
                                    text_color: 0xA0A0A0
                                    text: "\U000F0456"
                    # Volume slider
                    - label:
                        x: 0
                        y: 278
                        text_font: font_roboto_16
                        text_color: 0xA0A0A0
                        text: "VOLUME"
                    - slider:
                        id: slider_volume
                        x: 0
                        y: 306
                        width: 552
                        height: 8
                        min_value: 0
                        max_value: 100
                        value: 50
                        bg_color: 0x202020
                        bg_opa: COVER
                        indicator:
                          bg_color: 0x2EE36A
                          bg_opa: COVER
                        knob:
                          bg_color: 0xFFFFFF
                          bg_opa: COVER
                        on_release:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data:
                                entity_id: ${spotify_entity}
                              data_template:
                                volume_level: "{{ vol }}"
                              variables:
                                vol: !lambda 'return lv_slider_get_value(id(slider_volume)) / 100.0;'

