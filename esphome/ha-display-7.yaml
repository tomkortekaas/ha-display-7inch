  - id: weather_compact_for_spotify_script
    mode: restart
    then:
      - lvgl.widget.hide: weather_sun_card
      - lvgl.widget.hide: wx_rb6
      - lvgl.widget.hide: wx_rb7
      - lvgl.widget.hide: wx_rb8
      - lvgl.widget.hide: wx_rb9
      - lvgl.widget.hide: wx_rb10
      - lvgl.widget.hide: wx_rb11
      - lvgl.obj.update:
          id: weather_forecast_container
          x: 386
          width: 310
      - lvgl.obj.update:
          id: weather_forecast_list
          width: 310

  - id: weather_restore_normal_layout_script
    mode: restart
    then:
      - lvgl.widget.show: weather_sun_card
      - lvgl.widget.show: wx_rb6
      - lvgl.widget.show: wx_rb7
      - lvgl.widget.show: wx_rb8
      - lvgl.widget.show: wx_rb9
      - lvgl.widget.show: wx_rb10
      - lvgl.widget.show: wx_rb11
      - lvgl.obj.update:
          id: weather_forecast_container
          x: 386
          width: 618
      - lvgl.obj.update:
          id: weather_forecast_list
          width: 618

  - id: media_show_for_keuken_amp_spotify
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              std::string state = id(keuken_amp_state).state;
              std::string content_id = id(keuken_amp_media_content_id).state;
              return state == "playing" && content_id.rfind("spotify:", 0) == 0 && !id(keuken_amp_spotify_auto_shown);
          then:
            - lambda: |-
                id(last_page_before_media) = id(current_display_page);
                id(current_display_page) = 2;
                id(spotify_drawer_open) = false;
                id(keuken_amp_spotify_auto_shown) = true;
                id(keuken_amp_media_auto_active) = true;
                ESP_LOGI("media", "Keuken Amp Spotify playback detected; showing media page, previous page %d", id(last_page_before_media));
            - homeassistant.action:
                action: input_boolean.turn_on
                data:
                  entity_id: input_boolean.ha_display_7_actief
            - light.turn_on:
                id: display_backlight
                brightness: 90%
            - script.execute: spotify_drawer_close_script
            - lvgl.widget.show: nav_rail_container
            - lvgl.widget.show: top_status_bar
            - lvgl.page.show: page_media

  - id: media_restore_after_keuken_amp_stop
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(keuken_amp_media_auto_active) && id(keuken_amp_state).state != "playing";
          then:
            - lambda: |-
                ESP_LOGI("media", "Keuken Amp playback stopped; restoring page %d", id(last_page_before_media));
                id(keuken_amp_media_auto_active) = false;
                id(keuken_amp_spotify_auto_shown) = false;
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 0;'
                then:
                  - lvgl.page.show: page_energy
                  - lambda: 'id(current_display_page) = 0; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.show: nav_rail_container
                  - lvgl.widget.show: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 1;'
                then:
                  - lvgl.page.show: page_lights
                  - lambda: 'id(current_display_page) = 1; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.show: nav_rail_container
                  - lvgl.widget.show: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 2;'
                then:
                  - lvgl.page.show: page_media
                  - lambda: 'id(current_display_page) = 2; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.show: nav_rail_container
                  - lvgl.widget.show: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 3;'
                then:
                  - lvgl.page.show: page_weather
                  - lambda: 'id(current_display_page) = 3; id(immich_page_active) = false; id(weather_page_active) = true; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.hide: nav_rail_container
                  - lvgl.widget.hide: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 4;'
                then:
                  - lvgl.page.show: page_agenda
                  - lambda: 'id(current_display_page) = 4; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.show: nav_rail_container
                  - lvgl.widget.show: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 5;'
                then:
                  - lvgl.page.show: page_immich
                  - lambda: 'id(current_display_page) = 5; id(immich_page_active) = true; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                  - lvgl.widget.hide: nav_rail_container
                  - lvgl.widget.hide: top_status_bar
            - if:
                condition:
                  lambda: 'return id(last_page_before_media) == 6;'
                then:
                  - lvgl.page.show: page_recepten
                  - lambda: 'id(current_display_page) = 6; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = true; id(nav_overlay_countdown) = 0;'
                  - lvgl.widget.hide: nav_rail_container
                  - lvgl.widget.hide: top_status_bar

  - id: left_nav_show
    mode: restart
    then:
      - lambda: 'id(nav_overlay_countdown) = 30;'
      - lvgl.widget.show: nav_rail_container

  - id: left_nav_hide
    mode: restart
    then:
      - lambda: 'id(nav_overlay_countdown) = 0;'
      - lvgl.widget.hide: nav_rail_container

  - id: top_bar_show
    mode: restart
    then:
      - lambda: 'id(nav_overlay_countdown) = 30;'
      - lvgl.widget.show: top_status_bar

  - id: top_bar_hide
    mode: restart
    then:
      - lambda: 'id(nav_overlay_countdown) = 0;'
      - lvgl.widget.hide: top_status_bar

  - id: nav_overlay_show
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(spotify_drawer_open);'
          then:
            - script.execute: spotify_drawer_close_script
          else:
            - lambda: |-
                if (id(immich_page_active)) {
                  id(immich_overlay_countdown) = 30;
                }
            - script.execute: left_nav_show
            - script.execute: top_bar_show
            - if:
                condition:
                  lambda: 'return id(immich_page_active);'
                then:
                  - lvgl.widget.show: immich_controls

  - id: nav_overlay_hide
    mode: restart
    then:
      - lambda: |-
          id(immich_overlay_countdown) = 0;
      - script.execute: left_nav_hide
      - script.execute: top_bar_hide
      - if:
          condition:
            lambda: 'return id(immich_page_active);'
          then:
            - lvgl.widget.hide: immich_controls

  - id: album_art_load
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(album_art_pending_url).empty();'
          then:
            - if:
                condition:
                  lambda: |-
                    return id(album_art_pending_url) == id(album_art_loaded_url);
                then:
                  - lvgl.widget.show: img_album
                  - lvgl.widget.hide: lbl_album_fallback
                else:
                  - lvgl.widget.hide: img_album
                  - lvgl.widget.show: lbl_album_fallback
                  - artwork_image.set_url:
                      id: album_art
                      url: !lambda 'return id(album_art_pending_url);'

  - id: album_art_apply
    mode: restart
    then:
      - lambda: |-
          id(album_art_loaded_url) = std::string(id(album_art)->get_url());
          id(album_art_retry_count) = 0;
      - lvgl.image.update:
          id: img_album
          src: album_art
      - lvgl.image.update:
          id: spotify_drawer_album
          src: album_art
      - lvgl.widget.show: img_album
      - lvgl.widget.hide: lbl_album_fallback

  - id: album_art_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(album_art_retry_count) < 3;'
          then:
            - lambda: 'id(album_art_retry_count)++;'
            - delay: !lambda |-
                static const uint32_t d[] = {500, 2000, 5000};
                int i = id(album_art_retry_count) - 1;
                if (i < 0) i = 0;
                if (i > 2) i = 2;
                return d[i];
            - artwork_image.set_url:
                id: album_art
                url: !lambda 'return id(album_art_pending_url);'

  - id: immich_photo_load
    mode: restart
    then:
      - lambda: |-
          std::string rel = id(immich_url).state;
          if (rel.empty() || rel == "unknown" || rel == "unavailable") return;
          std::string url = (rel.rfind("http", 0) == 0) ? rel : id(ha_base_url_detected) + rel;
          if (url == id(immich_art_loaded_url)) return;
          id(immich_art_loaded_url) = url;
          id(immich_art_retry_count) = 0;
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""
      - artwork_image.set_url:
          id: immich_art
          url: !lambda 'return id(immich_art_loaded_url);'

  - id: immich_photo_apply
    mode: restart
    then:
      - lvgl.image.update:
          id: img_immich_photo
          src: immich_art
      - lvgl.widget.hide: immich_placeholder
      - lvgl.label.update:
          id: lbl_immich_status
          text: ""

  - id: immich_photo_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(immich_art_retry_count) < 2;'
          then:
            - lambda: 'id(immich_art_retry_count)++;'
            - delay: 2s
            - artwork_image.set_url:
                id: immich_art
                url: !lambda 'return id(immich_art_loaded_url);'
          else:
            - lvgl.label.update:
                id: lbl_immich_status
                text: ""

  - id: doorbell_show
    mode: restart
    then:
      - lambda: |-
          id(doorbell_page_active) = true;
          id(spotify_drawer_open) = false;
          id(immich_page_active) = false;
          id(weather_page_active) = false;
          id(immich_overlay_countdown) = 0;
          id(doorbell_art_retry_count) = 0;
      - script.execute: spotify_drawer_close_script
      - lvgl.widget.hide: nav_rail_container
      - lvgl.widget.hide: top_status_bar
      - lvgl.page.show: page_doorbell
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "snapshot laden..."
      - script.execute: doorbell_snapshot_load

  - id: doorbell_hide
    mode: restart
    then:
      - lambda: 'id(doorbell_page_active) = false; id(weather_page_active) = false;'
      - lvgl.page.show: page_energy

  - id: doorbell_snapshot_load
    mode: restart
    then:
      - artwork_image.set_url:
          id: doorbell_art
          url: !lambda |-
            char bust[24];
            snprintf(bust, sizeof(bust), "%lu", (unsigned long) millis());
            return id(ha_base_url_detected) + "/local/ha-display-doorbell.jpg?v=" + std::string(bust);

  - id: doorbell_snapshot_apply
    mode: restart
    then:
      - lambda: 'id(doorbell_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_doorbell_snapshot
          src: doorbell_art
      - lvgl.label.update:
          id: lbl_doorbell_status
          text: "live snapshot"

  - id: doorbell_snapshot_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(doorbell_page_active) && id(doorbell_art_retry_count) < 2;'
          then:
            - lambda: 'id(doorbell_art_retry_count)++;'
            - delay: 750ms
            - script.execute: doorbell_snapshot_load
          else:
            - lvgl.label.update:
                id: lbl_doorbell_status
                text: "geen snapshot"

  - id: radar_frame_load
    mode: restart
    then:
      - lambda: |-
          int frame = id(radar_frame_index);
          if (frame < 0) frame = 0;
          if (frame > 8) frame = 8;
          int minutes = frame * 15;
          char label[24];
          if (minutes == 0) {
            snprintf(label, sizeof(label), "radar nu");
          } else {
            snprintf(label, sizeof(label), "radar +%d min", minutes);
          }
          id(radar_last_frame_label) = std::string(label);
          lv_label_set_text(id(lbl_radar_frame), id(radar_last_frame_label).c_str());
          lv_bar_set_value(id(bar_radar_progress), frame, LV_ANIM_OFF);
      - artwork_image.set_url:
          id: radar_art
          url: !lambda |-
            int frame = id(radar_frame_index);
            if (frame < 0) frame = 0;
            if (frame > 8) frame = 8;
            char path[96];
            snprintf(path, sizeof(path), "/local/ha-display-radar/radar_%d.jpg?v=%lu", frame, (unsigned long) millis());
            return id(ha_base_url_detected) + std::string(path);

  - id: radar_frame_apply
    mode: restart
    then:
      - lambda: 'id(radar_art_retry_count) = 0;'
      - lvgl.image.update:
          id: img_buienradar
          src: radar_art
      - lvgl.label.update:
          id: lbl_radar_frame
          text: !lambda 'return id(radar_last_frame_label);'

  - id: radar_frame_retry
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(radar_art_retry_count) < 2;'
          then:
            - lambda: 'id(radar_art_retry_count)++;'
            - delay: 750ms
            - script.execute: radar_frame_load
          else:
            - lvgl.label.update:
                id: lbl_radar_frame
                text: "radar offline"

  - id: recipe_load_current
    then:
      - artwork_image.set_url:
          id: recipe_header_art
          url: !lambda |
            std::string url = "http://192.168.1.237:3002/api/ah/recipe/";
            url += id(ah_current_recipe_id);
            url += "/image?mode=header";
            return url;
      - artwork_image.set_url:
          id: recipe_ingredients_art
          url: !lambda |
            std::string url = "http://192.168.1.237:3002/api/ah/recipe/";
            url += id(ah_current_recipe_id);
            url += "/image?mode=ingredients";
            return url;
      - artwork_image.set_url:
          id: recipe_steps_art
          url: !lambda |
            std::string url = "http://192.168.1.237:3002/api/ah/recipe/";
            url += id(ah_current_recipe_id);
            url += "/image?mode=steps";
            return url;
      - component.update: recipe_header_art
      - component.update: recipe_ingredients_art
      - component.update: recipe_steps_art

# ---------------------------------------------------------------
# Interval updates — NOOIT on_value gebruiken voor LVGL
# ---------------------------------------------------------------
interval:
  # AH receptenlijst — batch tekstupdates zodat HA sensor-bursts niet 48 losse LVGL redraws doen.
  - interval: 1s
    then:
      - lambda: |-
          if (!id(ah_recipes_dirty)) return;
          id(ah_recipes_dirty) = false;
          auto set_recipe_text = [](lv_obj_t *title, lv_obj_t *meta, const std::string &title_text, const std::string &meta_text) {
            lv_label_set_text(title, title_text.c_str());
            lv_label_set_text(meta, meta_text.c_str());
          };
          set_recipe_text(id(lbl_recept_1_title), id(lbl_recept_1_meta), id(ha_recept_1_title).state, id(ha_recept_1_meta).state);
