  - platform: homeassistant
    id: ha_recipe_tab
    entity_id: input_select.ah_recipe_tab
    internal: true
    on_value:
      - if:
          condition:
            lambda: |-
              return id(ha_recipe_tab).state == "Favorieten";
          then:
            - lvgl.obj.update:
                id: btn_recipe_tab_cart
                bg_color: 0x15151F
                border_color: 0x28283A
            - lvgl.obj.update:
                id: btn_recipe_tab_favorites
                bg_color: 0xFF9020
                border_color: 0xFF9020
          else:
            - lvgl.obj.update:
                id: btn_recipe_tab_cart
                bg_color: 0xFF9020
                border_color: 0xFF9020
            - lvgl.obj.update:
                id: btn_recipe_tab_favorites
                bg_color: 0x15151F
                border_color: 0x28283A

  # AH Recepten — per-slot sensoren (24 recepten × title + id + meta + image)
  - platform: homeassistant
    id: ha_recept_1_title
    entity_id: sensor.ah_recept_1_title
    internal: true
    on_value:
      - lambda: 'id(ah_recipes_dirty) = true;'
  - platform: homeassistant
    id: ha_recept_1_id
    entity_id: sensor.ah_recept_1_id
    internal: true
  - platform: homeassistant
    id: ha_recept_1_meta
    entity_id: sensor.ah_recept_1_meta
    internal: true
    on_value:
      - lambda: 'id(ah_recipes_dirty) = true;'
  - platform: homeassistant
    id: ha_recept_1_image
    entity_id: sensor.ah_recept_1_image
    internal: true
    on_value:
      - if:
          condition:
            lambda: |-
              std::string url = id(ha_recept_1_image).state.c_str();
              return !url.empty() && url != "unknown" && url != "unavailable";
          then:
            - artwork_image.set_url:
                id: recipe_thumb_1
                url: !lambda 'return id(ha_recept_1_image).state.c_str();'
            - component.update: recipe_thumb_1

