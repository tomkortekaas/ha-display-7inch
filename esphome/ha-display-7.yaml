# ---------------------------------------------------------------
# Text sensors — Media + Lichten
# ---------------------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: media_title
    entity_id: ${spotify_entity}
    attribute: media_title
    internal: true
    on_value:
      - lambda: 'id(album_art_pending_url).clear();'
  - platform: homeassistant
    id: media_artist
    entity_id: ${spotify_entity}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_state
    entity_id: ${spotify_entity}
    internal: true
  - platform: homeassistant
    id: media_source
    entity_id: ${spotify_entity}
    attribute: source
    internal: true
  - platform: homeassistant
    id: media_shuffle
    entity_id: ${spotify_entity}
    attribute: shuffle
    internal: true
  - platform: homeassistant
    id: media_repeat
    entity_id: ${spotify_entity}
    attribute: repeat
    internal: true
  - platform: homeassistant
    id: media_album_art_local
    entity_id: ${spotify_entity}
    attribute: entity_picture_local
    internal: true
    on_value:
      - lambda: |-
          if (x.empty()) return;
          std::string url = (x.rfind("http", 0) == 0) ? x : id(ha_base_url_detected) + x;
          id(album_art_pending_url) = url;
      - script.execute: album_art_load
  - platform: homeassistant
    id: media_album_art_remote
    entity_id: ${spotify_entity}
    attribute: entity_picture
    internal: true
    on_value:
      - lambda: |-
          if (x.empty() || !id(album_art_pending_url).empty()) return;
          std::string url = (x.rfind("http", 0) == 0) ? x : id(ha_base_url_detected) + x;
          id(album_art_pending_url) = url;
      - script.execute: album_art_load
  - platform: homeassistant
    id: light_woonkamer_st
    entity_id: light.woonkamer
    internal: true
  - platform: homeassistant
    id: light_keuken_st
    entity_id: light.keuken
    internal: true
  - platform: homeassistant
    id: light_eettafel_st
    entity_id: light.eettafel
    internal: true
  - platform: homeassistant
    id: light_hal_st
    entity_id: light.hal
    internal: true
  - platform: homeassistant
    id: light_veranda_st
    entity_id: light.veranda
    internal: true
  - platform: homeassistant
    id: light_kantoor_st
    entity_id: light.kantoor
    internal: true
  - platform: homeassistant
    id: wx_cond_now
    entity_id: weather.forecast_thuis
    internal: true
  - platform: homeassistant
    id: wx_wind_dir
    entity_id: sensor.weerstation_windrichting
    internal: true
  - { platform: homeassistant, id: wx_d0_cond, entity_id: sensor.weerscherm_d0_cond, internal: true }
  - { platform: homeassistant, id: wx_d1_cond, entity_id: sensor.weerscherm_d1_cond, internal: true }
  - { platform: homeassistant, id: wx_d2_cond, entity_id: sensor.weerscherm_d2_cond, internal: true }
  - { platform: homeassistant, id: wx_d3_cond, entity_id: sensor.weerscherm_d3_cond, internal: true }
  - { platform: homeassistant, id: wx_d4_cond, entity_id: sensor.weerscherm_d4_cond, internal: true }
  - { platform: homeassistant, id: wx_rain_cap, entity_id: sensor.weerscherm_regen_caption, internal: true }
  - { platform: homeassistant, id: wx_sunrise, entity_id: sensor.weerscherm_zon_op, internal: true }
  - { platform: homeassistant, id: wx_sunset, entity_id: sensor.weerscherm_zon_onder, internal: true }
  - { platform: homeassistant, id: wx_sun_cap, entity_id: sensor.weerscherm_daglicht_caption, internal: true }
  - platform: homeassistant
