  # Balans energie — waarden, statussen en routekleuren
  - interval: 2s
    then:
      - lambda: |-
          auto trim_text = [](std::string s) -> std::string {
            while (!s.empty() && isspace((unsigned char) s.front())) s.erase(s.begin());
            while (!s.empty() && isspace((unsigned char) s.back())) s.pop_back();
            return s;
          };
          auto normalize_text = [](std::string s) -> std::string {
            while (!s.empty() && isspace((unsigned char) s.front())) s.erase(s.begin());
            while (!s.empty() && isspace((unsigned char) s.back())) s.pop_back();
            for (auto &c : s) c = tolower((unsigned char) c);
            return s;
          };
          auto valid_text = [&](const std::string &s) {
            std::string normalized = normalize_text(s);
            return !normalized.empty() && normalized != "unknown" && normalized != "unavailable" && normalized != "none";
          };
          auto power_text = [](float watts) -> std::string {
            if (isnan(watts)) return std::string("--");
            float abs_watts = fabsf(watts);
            char buf[16];
            if (abs_watts < 1000.0f) snprintf(buf, sizeof(buf), "%.0f W", abs_watts);
            else snprintf(buf, sizeof(buf), "%.1f kW", abs_watts / 1000.0f);
            return std::string(buf);
          };
          auto set_route = [](lv_obj_t *h, lv_obj_t *middle, lv_obj_t *v, lv_color_t color, bool active) {
            lv_color_t route_color = active ? color : lv_color_hex(0x303030);
            lv_obj_set_style_bg_color(h, route_color, LV_PART_MAIN);
            lv_obj_set_style_bg_color(middle, route_color, LV_PART_MAIN);
            lv_obj_set_style_bg_color(v, route_color, LV_PART_MAIN);
          };
          auto set_dot_visible = [](lv_obj_t *dot, bool visible) {
            if (visible) lv_obj_clear_flag(dot, LV_OBJ_FLAG_HIDDEN);
            else lv_obj_add_flag(dot, LV_OBJ_FLAG_HIDDEN);
          };
          auto pct_of_max = [](float watts, float max_seen) -> int {
            if (isnan(watts) || isnan(max_seen) || max_seen < 1.0f) return 0;
            float pct = (fabsf(watts) / max_seen) * 100.0f;
            if (pct < 0.0f) pct = 0.0f;
            if (pct > 100.0f) pct = 100.0f;
            return (int)(pct + 0.5f);
          };

          const float threshold = 50.0f;
          float pv_zolder_w = id(ha_pv_zolder_power).state;
          float pv_solis_w = id(ha_pv_solis_power).state;
          float pv_w = NAN;
          if (!isnan(pv_zolder_w) || !isnan(pv_solis_w)) {
            pv_w = (isnan(pv_zolder_w) ? 0.0f : pv_zolder_w) + (isnan(pv_solis_w) ? 0.0f : pv_solis_w);
          }
          float grid_w = id(ha_balans_grid_power).state;
          float house_w = id(ha_balans_load_power).state;
          float battery_w = id(ha_balans_battery_power).state;
          float soc = id(ha_balans_soc).state;
          float house_display_w = NAN;
          if (!isnan(house_w) || !isnan(pv_w)) {
            house_display_w = (isnan(house_w) ? 0.0f : house_w) + ((!isnan(pv_w) && pv_w > 0.0f) ? pv_w : 0.0f);
          }

          std::string pv_value = power_text(pv_w);
          std::string grid_value = power_text(grid_w);
          std::string house_value = power_text(house_display_w);
          std::string battery_value = power_text(battery_w);
          lv_label_set_text(id(lbl_energy_pv_value), pv_value.c_str());
          lv_label_set_text(id(lbl_energy_grid_value), grid_value.c_str());
          lv_label_set_text(id(lbl_energy_house_value), house_value.c_str());
          lv_label_set_text(id(lbl_energy_battery_value), battery_value.c_str());

          const char *grid_state = "--";
          if (!isnan(grid_w)) {
            if (grid_w > threshold) grid_state = "IMPORT";
            else if (grid_w < -threshold) grid_state = "EXPORT";
            else grid_state = "NET ROND 0";
          }
          lv_label_set_text(id(lbl_energy_grid_state), grid_state);

          const char *house_state = "--";
          if (!isnan(house_display_w)) {
            if (house_display_w > threshold) house_state = "VERBRUIK";
            else if (house_display_w < -threshold) house_state = "HUIS NAAR BALANS";
            else house_state = "GEEN VERBRUIK";
          }
          lv_label_set_text(id(lbl_energy_house_state), house_state);

          std::string raw_battery_state = id(ha_balans_battery_state).state;
          std::string battery_state = normalize_text(raw_battery_state);
          bool battery_state_known = battery_state == "charging" || battery_state == "discharging" || battery_state == "idle";
          const char *battery_state_label = "--";
          if (!isnan(battery_w)) {
            if (battery_w < -threshold) battery_state_label = "LADEN";
            else if (battery_w > threshold) battery_state_label = "ONTLADEN";
            else battery_state_label = "STAND-BY";
          } else if (battery_state_known) {
            if (battery_state == "charging") battery_state_label = "LADEN";
            else if (battery_state == "discharging") battery_state_label = "ONTLADEN";
            else battery_state_label = "STAND-BY";
          }
          lv_label_set_text(id(lbl_energy_battery_state), battery_state_label);

          char soc_buf[16];
          if (isnan(soc)) snprintf(soc_buf, sizeof(soc_buf), "-- SOC");
          else snprintf(soc_buf, sizeof(soc_buf), "%.0f%% SOC", soc);
          lv_label_set_text(id(lbl_energy_battery_soc), soc_buf);

          float pv_meter_w = (!isnan(pv_w) && pv_w > 0.0f) ? pv_w : 0.0f;
          float grid_meter_w = isnan(grid_w) ? 0.0f : fabsf(grid_w);
          float house_meter_w = (!isnan(house_display_w) && house_display_w > 0.0f) ? house_display_w : 0.0f;
          float battery_meter_w = isnan(battery_w) ? 0.0f : fabsf(battery_w);

          if (isnan(id(energy_pv_max_seen)) || id(energy_pv_max_seen) < 1.0f) id(energy_pv_max_seen) = 1.0f;
          if (isnan(id(energy_grid_max_seen)) || id(energy_grid_max_seen) < 1.0f) id(energy_grid_max_seen) = 1.0f;
          if (isnan(id(energy_house_max_seen)) || id(energy_house_max_seen) < 1.0f) id(energy_house_max_seen) = 1.0f;
          if (isnan(id(energy_battery_max_seen)) || id(energy_battery_max_seen) < 1.0f) id(energy_battery_max_seen) = 1.0f;

          if (pv_meter_w > id(energy_pv_max_seen)) id(energy_pv_max_seen) = pv_meter_w;
          if (grid_meter_w > id(energy_grid_max_seen)) id(energy_grid_max_seen) = grid_meter_w;
          if (house_meter_w > id(energy_house_max_seen)) id(energy_house_max_seen) = house_meter_w;
          if (battery_meter_w > id(energy_battery_max_seen)) id(energy_battery_max_seen) = battery_meter_w;

          lv_arc_set_value(id(arc_energy_pv), pct_of_max(pv_meter_w, id(energy_pv_max_seen)));
          lv_arc_set_value(id(arc_energy_grid), pct_of_max(grid_meter_w, id(energy_grid_max_seen)));
          lv_arc_set_value(id(arc_energy_house), pct_of_max(house_meter_w, id(energy_house_max_seen)));
          lv_arc_set_value(id(arc_energy_battery), pct_of_max(battery_meter_w, id(energy_battery_max_seen)));

          bool pv_active = !isnan(pv_w) && pv_w > threshold;
          bool grid_active = !isnan(grid_w) && fabsf(grid_w) > threshold;
          bool house_active = !isnan(house_w) && fabsf(house_w) > threshold;
          bool battery_active = !isnan(battery_w) && fabsf(battery_w) > threshold;

          set_route(id(route_pv_h), id(route_pv_curve), id(route_pv_v), lv_color_hex(0xFFAD3B), pv_active);
          set_route(id(route_grid_h), id(route_grid_curve), id(route_grid_v), lv_color_hex(0x2F9BFF), grid_active);
          set_route(id(route_house_h), id(route_house_curve), id(route_house_v), lv_color_hex(0x2EE36A), house_active);
          set_route(id(route_battery_h), id(route_battery_curve), id(route_battery_v), lv_color_hex(0xFF3B30), battery_active);
          set_dot_visible(id(dot_energy_pv), pv_active);
          set_dot_visible(id(dot_energy_pv_2), pv_active);
          set_dot_visible(id(dot_energy_pv_3), pv_active);
          set_dot_visible(id(dot_energy_grid), grid_active);
          set_dot_visible(id(dot_energy_grid_2), grid_active);
          set_dot_visible(id(dot_energy_grid_3), grid_active);
          set_dot_visible(id(dot_energy_house), house_active);
          set_dot_visible(id(dot_energy_house_2), house_active);
          set_dot_visible(id(dot_energy_house_3), house_active);
          set_dot_visible(id(dot_energy_battery), battery_active);
          set_dot_visible(id(dot_energy_battery_2), battery_active);
          set_dot_visible(id(dot_energy_battery_3), battery_active);

          std::string device_state = id(ha_balans_device_state).state;
          std::string device_state_trimmed = trim_text(device_state);
          std::string device_state_normalized = normalize_text(device_state);
          std::string device_label = "OMVORMER · ONBEKEND";
          if (device_state_normalized == "normal") device_label = "OMVORMER · ACTIEF";
          else if (valid_text(device_state)) device_label = device_state_trimmed;
          lv_label_set_text(id(lbl_energy_core_state), device_label.c_str());

          float price = id(ha_stroomprijs).state;
          float today = id(ha_kosten_vandaag).state;
          float month = id(ha_kosten_maand).state;
          float gas = id(ha_gas).state;
          float inside_temp = id(ha_binnen_temp).state;
          float inverter_temp = id(ha_balans_inverter_temp).state;
          float hyundai_ev_battery = id(ha_hyundai_ev_battery).state;
          char buf[32];
          if (isnan(price)) lv_label_set_text(id(lbl_energy_price), "--");
          else {
            snprintf(buf, sizeof(buf), "\xe2\x82\xac%.3f", price);
            lv_label_set_text(id(lbl_energy_price), buf);
          }
          if (isnan(today)) lv_label_set_text(id(lbl_energy_cost_today), "--");
          else {
            snprintf(buf, sizeof(buf), "\xe2\x82\xac %.2f", today);
            lv_label_set_text(id(lbl_energy_cost_today), buf);
          }
          if (isnan(month)) lv_label_set_text(id(lbl_energy_cost_month), "MAAND --");
          else {
            snprintf(buf, sizeof(buf), "MAAND \xe2\x82\xac %.2f", month);
            lv_label_set_text(id(lbl_energy_cost_month), buf);
          }
          if (isnan(gas)) lv_label_set_text(id(lbl_energy_gas), "--");
          else {
            snprintf(buf, sizeof(buf), "%.2f m3", gas);
            lv_label_set_text(id(lbl_energy_gas), buf);
          }
          if (isnan(inside_temp)) lv_label_set_text(id(lbl_energy_inside_temp), "--");
          else {
            snprintf(buf, sizeof(buf), "%.1f\xc2\xb0" "C", inside_temp);
            lv_label_set_text(id(lbl_energy_inside_temp), buf);
          }
          if (isnan(inverter_temp)) lv_label_set_text(id(lbl_energy_inverter_temp), "--");
          else {
            snprintf(buf, sizeof(buf), "%.1f\xc2\xb0" "C", inverter_temp);
            lv_label_set_text(id(lbl_energy_inverter_temp), buf);
          }
          if (isnan(hyundai_ev_battery)) lv_label_set_text(id(lbl_energy_hyundai_battery), "--");
          else {
            snprintf(buf, sizeof(buf), "%.0f%%", hyundai_ev_battery);
            lv_label_set_text(id(lbl_energy_hyundai_battery), buf);
          }

  # Balans energie — flowdots op de brede route-centerlines
  - interval: 125ms
    then:
      - lambda: |-
          id(energy_flow_phase) = (id(energy_flow_phase) + 1) % 24;
          int p = id(energy_flow_phase);
          auto normalize_text = [](std::string s) -> std::string {
            while (!s.empty() && isspace((unsigned char) s.front())) s.erase(s.begin());
            while (!s.empty() && isspace((unsigned char) s.back())) s.pop_back();
            for (auto &c : s) c = tolower((unsigned char) c);
            return s;
          };
          auto wrap = [](int value) -> int {
            value %= 24;
            if (value < 0) value += 24;
            return value;
          };
          auto place = [](lv_obj_t *dot, const int pts[24][2], int index) {
            lv_obj_set_pos(dot, pts[index][0], pts[index][1]);
          };
          static const int pv_pts[24][2] = {
            {204,205},{204,207},{204,208},{204,210},{204,211},{204,213},
            {204,214},{204,216},{204,217},{204,219},{204,220},{204,222},
            {204,223},{204,225},{204,226},{204,228},{204,229},{204,231},
            {204,232},{204,234},{204,235},{204,237},{204,238},{204,240}
          };
          static const int grid_pts[24][2] = {
            {679,150},{666,150},{653,150},{640,150},{627,150},{614,150},
            {601,150},{588,150},{575,150},{562,150},{549,150},{538,150},
            {529,150},{529,154},{529,158},{529,162},{529,166},{529,170},
            {529,174},{529,178},{529,182},{526,183},{522,183},{517,183}
          };
          static const int house_pts[24][2] = {
            {298,279},{310,279},{322,279},{334,279},{346,279},{358,279},
            {370,279},{382,279},{394,279},{404,279},{413,279},{413,275},
            {413,271},{413,267},{413,263},{413,259},{413,255},{417,252},
            {421,249},{422,249},{423,249},{424,249},{425,249},{426,249}
          };
          static const int battery_pts[24][2] = {
            {679,279},{666,279},{653,279},{640,279},{627,279},{614,279},
            {601,279},{588,279},{575,279},{562,279},{549,279},{538,279},
            {529,279},{529,275},{529,271},{529,267},{529,263},{529,259},
            {529,255},{529,253},{529,251},{529,250},{529,249},{529,248}
          };

          const float threshold = 50.0f;
          float grid_w = id(ha_balans_grid_power).state;
          float house_w = id(ha_balans_load_power).state;
          float battery_w = id(ha_balans_battery_power).state;
          std::string raw_battery_state = id(ha_balans_battery_state).state;
          std::string battery_state = normalize_text(raw_battery_state);
          bool battery_state_known = battery_state == "charging" || battery_state == "discharging" || battery_state == "idle";
          bool battery_is_charging = false;
          if (!isnan(battery_w)) battery_is_charging = battery_w < -threshold;
          else if (battery_state_known) battery_is_charging = battery_state == "charging";

          int pv_index = p;
          int grid_index = (!isnan(grid_w) && grid_w < -threshold) ? 23 - p : p;
          int house_index = (!isnan(house_w) && house_w > threshold) ? 23 - p : p;
          int battery_index = battery_is_charging ? 23 - p : p;

          place(id(dot_energy_pv), pv_pts, wrap(pv_index));
          place(id(dot_energy_pv_2), pv_pts, wrap(pv_index - 8));
          place(id(dot_energy_pv_3), pv_pts, wrap(pv_index - 16));
          place(id(dot_energy_grid), grid_pts, wrap(grid_index));
          place(id(dot_energy_grid_2), grid_pts, wrap(grid_index - 8));
          place(id(dot_energy_grid_3), grid_pts, wrap(grid_index - 16));
          place(id(dot_energy_house), house_pts, wrap(house_index));
          place(id(dot_energy_house_2), house_pts, wrap(house_index - 8));
          place(id(dot_energy_house_3), house_pts, wrap(house_index - 16));
          place(id(dot_energy_battery), battery_pts, wrap(battery_index));
          place(id(dot_energy_battery_2), battery_pts, wrap(battery_index - 8));
          place(id(dot_energy_battery_3), battery_pts, wrap(battery_index - 16));

  # Buienradar loop — 9 frames van nu t/m +120 min, 15 minuten per stap.
  - interval: 3s
    then:
      - if:
          condition:
            lambda: 'return id(weather_page_active);'
          then:
            - lambda: |-
                id(radar_frame_index)++;
                if (id(radar_frame_index) > 8) id(radar_frame_index) = 0;
            - script.execute: radar_frame_load
