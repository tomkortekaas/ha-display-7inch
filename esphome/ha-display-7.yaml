          update_future_day(
            id(agenda_d3_title).state, id(agenda_d3_date).state, id(agenda_d3_count).state,
            future_d3_events, id(lbl_agenda_future_d3_date), id(lbl_agenda_future_d3_day),
            id(lbl_agenda_future_d3_count), future_d3_slots, future_d3_accents,
            future_d3_times, future_d3_titles, id(lbl_agenda_future_d3_empty));

          // Agenda-thema: alleen het agenda-canvas wisselt; de omliggende interface blijft zwart.
          bool light = id(agenda_light_theme);
          lv_color_t surface = lv_color_hex(light ? 0xF5F5F7 : 0x08080A);
          lv_color_t card = lv_color_hex(light ? 0xFFFFFF : 0x131418);
          lv_color_t primary = lv_color_hex(light ? 0x1C1C1E : 0xFFFFFF);
          lv_color_t secondary = lv_color_hex(light ? 0x6E6E73 : 0x6B6E76);
          lv_color_t divider = lv_color_hex(light ? 0xD7D7DC : 0x2A2B30);
          lv_color_t red = lv_color_hex(0xFF3B30);

          lv_obj_set_style_bg_color(id(agenda_focus_sidebar), surface, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_panel_divider), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_future_divider_1), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_future_divider_2), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_panel_divider), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_future_divider_1), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_future_divider_2), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);

          lv_obj_set_style_text_color(id(lbl_agenda_heading), light ? red : primary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_heading), primary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_date), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_now), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_empty), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_more), secondary, LV_PART_MAIN);

          lv_obj_set_style_bg_color(id(agenda_theme_button), light ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x17181C), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(agenda_theme_button), light ? divider : lv_color_hex(0x3A3B40), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_theme_button), red, LV_PART_MAIN);
          lv_label_set_text(id(lbl_agenda_theme_button), light ? "DONKER" : "LICHT");

          for (int i = 0; i < 5; i++) {
            lv_obj_set_style_bg_color(today_cards[i], card, LV_PART_MAIN);
            lv_obj_set_style_border_color(today_cards[i], divider, LV_PART_MAIN);
            lv_obj_set_style_border_opa(today_cards[i], light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);
            lv_obj_set_style_text_color(today_time_labels[i], secondary, LV_PART_MAIN);
            lv_obj_set_style_text_color(today_title_labels[i], primary, LV_PART_MAIN);
          }

          lv_obj_t *future_date_badges[3] = {
            id(agenda_future_d1_date_badge), id(agenda_future_d2_date_badge),
            id(agenda_future_d3_date_badge)
          };
          lv_obj_t *future_scrolls[3] = {
            id(agenda_future_d1_scroll), id(agenda_future_d2_scroll), id(agenda_future_d3_scroll)
          };
          lv_obj_t *future_date_labels[3] = {
            id(lbl_agenda_future_d1_date), id(lbl_agenda_future_d2_date),
            id(lbl_agenda_future_d3_date)
          };
          lv_obj_t *future_day_labels[3] = {
            id(lbl_agenda_future_d1_day), id(lbl_agenda_future_d2_day),
            id(lbl_agenda_future_d3_day)
          };
          lv_obj_t *future_count_labels[3] = {
            id(lbl_agenda_future_d1_count), id(lbl_agenda_future_d2_count),
            id(lbl_agenda_future_d3_count)
          };
          lv_obj_t *future_empty_labels[3] = {
            id(lbl_agenda_future_d1_empty), id(lbl_agenda_future_d2_empty),
            id(lbl_agenda_future_d3_empty)
          };
          lv_obj_t **future_time_groups[3] = {
            future_d1_times, future_d2_times, future_d3_times
          };
          lv_obj_t **future_title_groups[3] = {
            future_d1_titles, future_d2_titles, future_d3_titles
          };
          for (int day = 0; day < 3; day++) {
            lv_obj_set_style_bg_color(future_date_badges[day], light ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xFFFFFF), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(future_date_badges[day], light ? LV_OPA_COVER : LV_OPA_10, LV_PART_MAIN);
            lv_obj_set_style_border_color(future_date_badges[day], divider, LV_PART_MAIN);
            lv_obj_set_style_text_color(future_date_labels[day], light ? red : lv_color_hex(0xBFC2C8), LV_PART_MAIN);
            lv_obj_set_style_text_color(future_day_labels[day], light ? lv_color_hex(0x55555C) : lv_color_hex(0x7D8088), LV_PART_MAIN);
            lv_obj_set_style_text_color(future_count_labels[day], secondary, LV_PART_MAIN);
            lv_obj_set_style_text_color(future_empty_labels[day], secondary, LV_PART_MAIN);
            lv_obj_set_style_bg_color(future_scrolls[day], light ? red : lv_color_hex(0x5E6067), LV_PART_SCROLLBAR);
            for (int i = 0; i < 8; i++) {
              lv_obj_set_style_text_color(future_time_groups[day][i], secondary, LV_PART_MAIN);
              lv_obj_set_style_text_color(future_title_groups[day][i], light ? lv_color_hex(0x2C2C2E) : lv_color_hex(0xCFD1D5), LV_PART_MAIN);
            }
          }

      # Status bar — vermogen chip
      - lvgl.label.update:
          id: lbl_power_status
          text: !lambda |-
            float v = id(ha_verbruik).state;
            if (isnan(v)) return std::string("-- W");
            char buf[12];
            snprintf(buf, sizeof(buf), "%.0f W", v * 1000.0f);
            return std::string(buf);

      # Statusbalk buiten temp + HA dot
      - lvgl.label.update:
          id: lbl_buiten_temp
          text: !lambda |-
            float v = id(wx_temp).state;
            if (isnan(v)) return std::string("--\xc2\xb0");
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f\xc2\xb0", v);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_ha_dot
          text_color: !lambda |-
            return api::global_api_server->is_connected() ? lv_color_hex(0x2EE36A) : lv_color_hex(0xFF2A7A);

      # Media labels + voortgang + volume
      - lvgl.label.update:
          id: lbl_track_titel
          text: !lambda |-
            std::string s = id(media_title).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: spotify_drawer_title
          text: !lambda |-
            std::string s = id(media_title).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: lbl_track_artiest
          text: !lambda |-
            std::string s = id(media_artist).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: spotify_drawer_artist
          text: !lambda |-
            std::string s = id(media_artist).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("\xe2\x80\x94");
            return s;
      - lvgl.label.update:
          id: lbl_media_source
          text: !lambda |-
            std::string s = id(media_source).state;
            if (s.empty() || s == "None" || s == "none")
              return std::string("${spotify_source_fallback}");
            return s;
      - lvgl.label.update:
          id: lbl_play_icoon
          text: !lambda |-
            return id(media_state).state == "playing"
              ? std::string("\U000F03E4") : std::string("\U000F040A");
      - lvgl.label.update:
          id: spotify_drawer_play_icon
          text: !lambda |-
            return id(media_state).state == "playing"
              ? std::string("\U000F03E4") : std::string("\U000F040A");
      - lvgl.bar.update:
          id: bar_media_progress
          value: !lambda |-
            float pos = id(media_positie).state;
            float dur = id(media_duur).state;
            if (isnan(pos) || isnan(dur) || dur <= 0) return 0;
            return (int)std::min((pos / dur) * 100.0f, 100.0f);
      - lvgl.bar.update:
          id: spotify_drawer_progress
          value: !lambda |-
            float pos = id(media_positie).state;
            float dur = id(media_duur).state;
            if (isnan(pos) || isnan(dur) || dur <= 0) return 0;
            return (int)std::min((pos / dur) * 100.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_elapsed
          text: !lambda |-
            float pos = id(media_positie).state;
            if (isnan(pos)) return std::string("0:00");
            int m = (int)pos / 60;
            int s = (int)pos % 60;
            char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", m, s);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_remaining
          text: !lambda |-
            float pos = id(media_positie).state;
            float dur = id(media_duur).state;
            if (isnan(pos) || isnan(dur)) return std::string("0:00");
            float rem = dur - pos;
            if (rem < 0) rem = 0;
            int m = (int)rem / 60;
            int s = (int)rem % 60;
            char buf[8];
            snprintf(buf, sizeof(buf), "-%d:%02d", m, s);
            return std::string(buf);
      - lvgl.slider.update:
          id: slider_volume
          value: !lambda |-
            float v = id(media_volume).state;
            if (isnan(v)) return 50;
            return (int)(v * 100.0f);
      - lvgl.slider.update:
          id: spotify_drawer_volume
          value: !lambda |-
            float v = id(media_volume).state;
            if (isnan(v)) return 50;
            return (int)(v * 100.0f);

      # Weer labels
      - lambda: |-
          auto icon_for = [](const std::string &c) -> const char* {
            if (c.find("pour") != std::string::npos || c.find("lightning") != std::string::npos) return "\U000F0596";
            if (c.find("rain") != std::string::npos || c.find("hail") != std::string::npos) return "\U000F0597";
            if (c.find("partly") != std::string::npos) return "\U000F0595";
            if (c.find("cloud") != std::string::npos || c.find("fog") != std::string::npos) return "\U000F0590";
            return "\U000F0599";
          };
          auto color_for = [](const std::string &c) -> lv_color_t {
            if (c.find("rain") != std::string::npos || c.find("pour") != std::string::npos) return lv_color_hex(0x34D0FF);
            if (c.find("cloud") != std::string::npos || c.find("fog") != std::string::npos) return lv_color_hex(0xA0A0A0);
            return lv_color_hex(0xFFD84A);
          };
          auto label_for = [](std::string c) -> std::string {
            if (c == "clear-night") return "heldere nacht";
            if (c == "cloudy") return "bewolkt";
            if (c == "fog") return "mist";
            if (c == "hail") return "hagel";
            if (c == "lightning") return "onweer";
            if (c == "lightning-rainy") return "onweer en regen";
            if (c == "partlycloudy") return "half bewolkt";
            if (c == "pouring") return "zware regen";
            if (c == "rainy") return "regen";
            if (c == "snowy") return "sneeuw";
            if (c == "sunny") return "zonnig";
            if (c == "windy") return "winderig";
            if (c.empty() || c == "unknown" || c == "unavailable") return "--";
            return c;
          };
          auto temp_color = [](float t) -> lv_color_t {
            float x = (t + 5.0f) / 40.0f;
            if (x < 0) x = 0;
            if (x > 1) x = 1;
            uint8_t r = (uint8_t)(0x34 + x * (0xF5 - 0x34));
            uint8_t g = (uint8_t)(0xD0 + x * (0xB4 - 0xD0));
            uint8_t b = (uint8_t)(0xFF + x * (0x4A - 0xFF));
            return lv_color_make(r, g, b);
          };
          auto set_forecast = [&](lv_obj_t *icon, lv_obj_t *cond, lv_obj_t *temp, lv_obj_t *wind, lv_obj_t *bar,
                                  const std::string &c, float lo, float hi, float w, float range_min, float range_span) {
            char buf[48];
            lv_label_set_text(icon, icon_for(c));
            lv_obj_set_style_text_color(icon, color_for(c), LV_PART_MAIN);
            lv_label_set_text(cond, label_for(c).c_str());
            if (isnan(lo) || isnan(hi)) {
              lv_label_set_text(temp, "laden");
              lv_label_set_text(wind, "verwachting laden");
              lv_bar_set_start_value(bar, 0, LV_ANIM_OFF);
              lv_bar_set_value(bar, 0, LV_ANIM_OFF);
            } else {
              snprintf(buf, sizeof(buf), "%.0f\xc2\xb0 / %.0f\xc2\xb0", lo, hi);
              lv_label_set_text(temp, buf);
              int sv = (int)((lo - range_min) / range_span * 100.0f);
              int vv = (int)((hi - range_min) / range_span * 100.0f);
              if (sv < 0) sv = 0;
              if (vv > 100) vv = 100;
              if (vv <= sv) vv = sv + 2;
              if (vv > 100) vv = 100;
              lv_bar_set_start_value(bar, sv, LV_ANIM_OFF);
              lv_bar_set_value(bar, vv, LV_ANIM_OFF);
              lv_obj_set_style_bg_color(bar, temp_color(lo), LV_PART_INDICATOR);
              lv_obj_set_style_bg_grad_color(bar, temp_color(hi), LV_PART_INDICATOR);
              lv_obj_set_style_bg_grad_dir(bar, LV_GRAD_DIR_HOR, LV_PART_INDICATOR);
            }
            if (!isnan(w)) {
              snprintf(buf, sizeof(buf), "%.0f km/u", w);
              lv_label_set_text(wind, buf);
            }
          };

          char buf[96];
          std::string cnow = id(wx_cond_now).state;
          lv_label_set_text(id(lbl_wx_now_icon), icon_for(cnow));
          lv_obj_set_style_text_color(id(lbl_wx_now_icon), color_for(cnow), LV_PART_MAIN);
          lv_label_set_text(id(lbl_wx_now_cond), label_for(cnow).c_str());
          if (isnan(id(wx_temp).state)) {
            lv_label_set_text(id(lbl_wx_now_temp), "--");
          } else {
            snprintf(buf, sizeof(buf), "%.0f\xc2\xb0", id(wx_temp).state);
            lv_label_set_text(id(lbl_wx_now_temp), buf);
          }
          if (isnan(id(wx_wind).state)) {
            lv_label_set_text(id(lbl_wx_wind), "--");
          } else {
            snprintf(buf, sizeof(buf), "%.0f km/u %s", id(wx_wind).state, id(wx_wind_dir).state.c_str());
            lv_label_set_text(id(lbl_wx_wind), buf);
          }
          if (isnan(id(wx_uv).state)) {
            lv_label_set_text(id(lbl_wx_uv), "--");
            lv_bar_set_value(id(bar_wx_uv), 0, LV_ANIM_OFF);
          } else {
            snprintf(buf, sizeof(buf), "%.0f", id(wx_uv).state);
            lv_label_set_text(id(lbl_wx_uv), buf);
            lv_bar_set_value(id(bar_wx_uv), (int)std::min(std::max(id(wx_uv).state, 0.0f), 11.0f), LV_ANIM_OFF);
          }
          std::string rain = id(wx_rain_cap).state;
          if (rain.empty() || rain == "unknown" || rain == "unavailable") rain = "regen --";
          lv_label_set_text(id(lbl_wx_rain), rain.c_str());
          {
            std::string s = id(wx_rain_pts).state;
            lv_obj_t* rbars[12] = {
              id(wx_rb0), id(wx_rb1), id(wx_rb2), id(wx_rb3), id(wx_rb4), id(wx_rb5),
              id(wx_rb6), id(wx_rb7), id(wx_rb8), id(wx_rb9), id(wx_rb10), id(wx_rb11)
            };
            int idx = 0;
            size_t pos = 0;
            while (idx < 12 && pos != std::string::npos) {
              size_t comma = s.find(',', pos);
              std::string tok = (comma == std::string::npos) ? s.substr(pos) : s.substr(pos, comma - pos);
              int v = tok.empty() ? 0 : atoi(tok.c_str());
              if (v < 0) v = 0;
              if (v > 100) v = 100;
              lv_bar_set_value(rbars[idx], v, LV_ANIM_OFF);
              idx++;
              pos = (comma == std::string::npos) ? std::string::npos : comma + 1;
            }
            while (idx < 12) {
              lv_bar_set_value(rbars[idx], 0, LV_ANIM_OFF);
              idx++;
            }
          }
          snprintf(buf, sizeof(buf), "op %s  onder %s", id(wx_sunrise).state.c_str(), id(wx_sunset).state.c_str());
          lv_label_set_text(id(lbl_wx_sun), buf);
          std::string sun_cap = id(wx_sun_cap).state;
          if (sun_cap.empty() || sun_cap == "unknown" || sun_cap == "unavailable") sun_cap = "daglicht";
          lv_label_set_text(id(lbl_wx_sun_caption), sun_cap.c_str());
          if (!isnan(id(wx_sun_pct).state)) {
            lv_arc_set_value(id(bar_wx_sun), (int)std::min(std::max(id(wx_sun_pct).state, 0.0f), 100.0f));
          }

          auto t = id(ha_time).now();
          if (t.is_valid()) {
            const char* days[] = {"zo","ma","di","wo","do","vr","za"};
            lv_label_set_text(id(lbl_wx_d0_day), "Nu");
            lv_label_set_text(id(lbl_wx_d1_day), days[(t.day_of_week + 1) % 7]);
            lv_label_set_text(id(lbl_wx_d2_day), days[(t.day_of_week + 2) % 7]);
            lv_label_set_text(id(lbl_wx_d3_day), days[(t.day_of_week + 3) % 7]);
            lv_label_set_text(id(lbl_wx_d4_day), days[(t.day_of_week + 4) % 7]);
          }
          float lows[5] = {id(wx_d0_lo).state, id(wx_d1_lo).state, id(wx_d2_lo).state, id(wx_d3_lo).state, id(wx_d4_lo).state};
          float highs[5] = {id(wx_d0_hi).state, id(wx_d1_hi).state, id(wx_d2_hi).state, id(wx_d3_hi).state, id(wx_d4_hi).state};
          float range_min = 99.0f;
          float range_max = -99.0f;
          for (int i = 0; i < 5; i++) {
            if (!isnan(lows[i]) && lows[i] < range_min) range_min = lows[i];
            if (!isnan(highs[i]) && highs[i] > range_max) range_max = highs[i];
          }
          if (range_max < range_min) {
            range_min = 0.0f;
            range_max = 1.0f;
          }
          float range_span = range_max - range_min;
          if (range_span < 1.0f) range_span = 1.0f;

          set_forecast(id(lbl_wx_d0_icon), id(lbl_wx_d0_cond), id(lbl_wx_d0_temp), id(lbl_wx_d0_wind), id(bar_wx_d0_range),
                       id(wx_d0_cond).state, id(wx_d0_lo).state, id(wx_d0_hi).state, id(wx_d0_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d1_icon), id(lbl_wx_d1_cond), id(lbl_wx_d1_temp), id(lbl_wx_d1_wind), id(bar_wx_d1_range),
                       id(wx_d1_cond).state, id(wx_d1_lo).state, id(wx_d1_hi).state, id(wx_d1_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d2_icon), id(lbl_wx_d2_cond), id(lbl_wx_d2_temp), id(lbl_wx_d2_wind), id(bar_wx_d2_range),
                       id(wx_d2_cond).state, id(wx_d2_lo).state, id(wx_d2_hi).state, id(wx_d2_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d3_icon), id(lbl_wx_d3_cond), id(lbl_wx_d3_temp), id(lbl_wx_d3_wind), id(bar_wx_d3_range),
                       id(wx_d3_cond).state, id(wx_d3_lo).state, id(wx_d3_hi).state, id(wx_d3_wind).state, range_min, range_span);
          set_forecast(id(lbl_wx_d4_icon), id(lbl_wx_d4_cond), id(lbl_wx_d4_temp), id(lbl_wx_d4_wind), id(bar_wx_d4_range),
                       id(wx_d4_cond).state, id(wx_d4_lo).state, id(wx_d4_hi).state, id(wx_d4_wind).state, range_min, range_span);

          auto clean_text = [](std::string s, const char *fallback) -> std::string {
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "None") return std::string(fallback);
            return s;
          };
          std::string taken_at = clean_text(id(immich_camera_taken_at).state, "");
          // Plaatsnaam: "Stad, Provincie, Land" → "Stad, Land" (provincie weggooien)
          std::string place_raw = clean_text(id(immich_place).state, "");
          std::string place = place_raw;
          {
            // Tel komma's; bij 2 komma's → verwijder het middelste deel
            std::vector<size_t> commas;
            for (size_t ci = 0; ci < place_raw.size(); ci++)
              if (place_raw[ci] == ',') commas.push_back(ci);
            if (commas.size() >= 2) {
              // stad = voor eerste komma, land = na laatste komma
              std::string stad = place_raw.substr(0, commas[0]);
              std::string land = place_raw.substr(commas.back() + 1);
              // trim leading space van land
              while (!land.empty() && land[0] == ' ') land = land.substr(1);
              place = stad + ", " + land;
            }
          }
          // Jaar extraheren uit immich_date of taken_at
          std::string year = "";
          std::string header_date = clean_text(id(immich_date).state, "");
          for (size_t i = 0; i + 3 < header_date.size(); i++) {
            bool four_digits = true;
            for (size_t j = 0; j < 4; j++) {
              char c = header_date[i + j];
              if (c < '0' || c > '9') four_digits = false;
            }
            if (four_digits) year = header_date.substr(i, 4);
          }
          if (year.empty() && taken_at.size() >= 4) year = taken_at.substr(0, 4);
          // Header in status bar (als immich actief)
          if (id(immich_page_active)) {
            std::string header = place;
            if (!year.empty()) header += (!header.empty() ? " · " : "") + year;
            lv_label_set_text(id(lbl_immich_header), header.c_str());
          } else {
            lv_label_set_text(id(lbl_immich_header), "");
          }
          // Overlay labels altijd bijwerken (ongeacht actieve pagina)
          lv_label_set_text(id(lbl_immich_place), place.c_str());
          lv_label_set_text(id(lbl_immich_date), year.c_str());
          lv_label_set_text(id(lbl_immich_album), clean_text(id(immich_album_txt).state, "random assets").c_str());
          std::string immich_status = clean_text(id(immich_status_text).state, "");
          bool show_immich_toast = id(immich_page_active) && !immich_status.empty() && immich_status != "Immich foto actief" && immich_status != "Prullenbak bevestiging verlopen";
          lv_label_set_text(id(lbl_immich_status), show_immich_toast ? immich_status.c_str() : "");
          lv_obj_set_style_bg_opa(id(immich_toast), show_immich_toast ? LV_OPA_70 : LV_OPA_TRANSP, LV_PART_MAIN);
          // Klok altijd bijwerken
          if (t.is_valid()) {
            char ibuf[6];
            snprintf(ibuf, sizeof(ibuf), "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(lbl_immich_clock), ibuf);
          }

