# ---------------------------------------------------------------
# LVGL
# ---------------------------------------------------------------
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  byte_order: little_endian
  bg_color: 0x000000
  bg_opa: COVER
  text_font: font_roboto_16
  theme:
    button:
      bg_color: 0x1A1A1A
      bg_opa: COVER
      text_color: 0xFFFFFF
      border_width: 0
      outline_width: 0
      shadow_width: 0
      scroll_on_focus: false
      pressed:
        bg_color: 0x282828
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0
      focused:
        bg_color: 0x1A1A1A
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0
      checked:
        bg_color: 0x12301C
        bg_opa: COVER
        border_width: 0
        outline_width: 0
        shadow_width: 0

  # Nav rail + status bar — altijd zichtbaar bovenop alles
  top_layer:
    widgets:
      # Nav rail (links, 88×600)
      - obj:
          id: nav_rail_container
          x: 0
          y: 0
          width: 88
          height: 600
          hidden: true
          bg_color: 0x050505
          bg_opa: COVER
          border_width: 0
          pad_all: 0
          widgets:
            # Logo — 44×44 afgerond accentvlak
            - obj:
                align: TOP_MID
                y: 12
                width: 44
                height: 44
                radius: 10
                bg_color: 0x2EE36A
                bg_opa: COVER
                border_width: 0
                widgets:
                  - label:
                      align: CENTER
                      text_font: font_roboto_28
                      text_color: 0xFFFFFF
                      text: "H"
            # Energie — actief (accentstrip links)
            - obj:
                x: 0
                y: 72
                width: 88
                height: 64
                bg_color: 0x101010
                bg_opa: COVER
                border_width: 0
                pad_all: 0
                widgets:
                  - obj:
                      id: nav_strip_energie
                      x: 0
                      y: 4
                      width: 3
                      height: 56
                      bg_color: 0x2EE36A
                      bg_opa: COVER
                      border_width: 0
                  - button:
                      id: nav_energie
                      x: 16
                      y: 4
                      width: 56
                      height: 56
                      radius: 10
                      bg_color: 0x202020
                      bg_opa: COVER
                      on_click:
                        then:
                          - lvgl.page.show: page_energy
                          - lambda: 'id(current_display_page) = 0; id(keuken_amp_media_auto_active) = false; id(immich_page_active) = false; id(weather_page_active) = false; id(immich_overlay_countdown) = 0; id(ah_recipe_page_active) = false;'
                          - lvgl.widget.show: nav_rail_container
                          - lvgl.widget.show: top_status_bar
                          - lvgl.obj.update:
                              id: nav_strip_energie
                              bg_color: 0x2EE36A
                          - lvgl.obj.update:
                              id: nav_energie
                              bg_color: 0x202020
                          - lvgl.obj.update:
                              id: nav_strip_lichten
                              bg_color: 0x050505
                          - lvgl.obj.update:
                              id: nav_lichten
                              bg_color: 0x1a1a1a
                          - lvgl.obj.update:
                              id: nav_strip_media
