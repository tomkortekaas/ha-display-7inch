            lv_obj_set_style_text_color(future_day_labels[day], light ? lv_color_hex(0x55555C) : lv_color_hex(0x7D8088), LV_PART_MAIN);
            lv_obj_set_style_text_color(future_count_labels[day], secondary, LV_PART_MAIN);
            lv_obj_set_style_text_color(future_empty_labels[day], secondary, LV_PART_MAIN);
            lv_obj_set_style_bg_color(future_scrolls[day], light ? red : lv_color_hex(0x5E6067), LV_PART_SCROLLBAR);
            for (int i = 0; i < 8; i++) {
