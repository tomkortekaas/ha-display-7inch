  # Buienradar loop — 9 frames van nu t/m +120 min, 15 minuten per stap.
  - interval: 15s
    then:
      - lambda: |-
          id(radar_frame_index)++;
          if (id(radar_frame_index) > 8) id(radar_frame_index) = 0;
      - script.execute: radar_frame_load

  # Auto-dim backlight — elke minuut
  - interval: 60s
    then:
      - if:
          condition:
            lambda: |-
              auto t = id(ha_time).now();
              return t.is_valid() && (t.hour >= 22 || t.hour < 7);
          then:
            - light.turn_on:
                id: display_backlight
                brightness: 20%
          else:
            - light.turn_on:
                id: display_backlight
                brightness: 90%
