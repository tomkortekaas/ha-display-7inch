      # Agenda Focus + Sidebar — vult de zichtbare overlay uit de bestaande HA-sensoren.
      - lambda: |-
          struct AgendaEvent {
            std::string time;
            std::string title;
            std::string who;
            int minutes;
            lv_color_t color;
            bool valid;
            bool all_day;
          };

          auto clean = [](std::string s) -> std::string {
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "None") return "";
            while (!s.empty() && isspace((unsigned char) s.front())) s.erase(s.begin());
            while (!s.empty() && isspace((unsigned char) s.back())) s.pop_back();
            return s;
          };
          auto upper = [](std::string s) -> std::string {
            for (auto &c : s) c = toupper((unsigned char) c);
            return s;
          };
          auto count_from = [&](const std::string &raw) -> int {
            std::string s = clean(raw);
            int value = 0;
            bool found = false;
            for (char c : s) {
              if (isdigit((unsigned char) c)) {
                found = true;
                value = value * 10 + (c - '0');
              } else if (found) {
                break;
              }
            }
            return found ? value : 0;
          };
          auto parse_date = [&](const std::string &raw, int &day, int &month) {
            std::string s = clean(raw);
            day = 0;
            month = 0;
            if (s.size() >= 5 && isdigit(s[0]) && isdigit(s[1]) && s[2] == '-' &&
                isdigit(s[3]) && isdigit(s[4])) {
              day = (s[0] - '0') * 10 + (s[1] - '0');
              month = (s[3] - '0') * 10 + (s[4] - '0');
            }
          };
          auto parse_event = [&](const std::string &raw) -> AgendaEvent {
            AgendaEvent ev{"", "", "Familie", -1, lv_color_hex(0x96AAC3), false, false};
            std::string s = clean(raw);
            if (s.empty()) return ev;
            ev.valid = true;
            if (s.size() >= 5 && isdigit(s[0]) && isdigit(s[1]) && s[2] == ':' &&
                isdigit(s[3]) && isdigit(s[4])) {
              ev.time = s.substr(0, 5);
              ev.minutes = ((s[0] - '0') * 10 + (s[1] - '0')) * 60 +
                           ((s[3] - '0') * 10 + (s[4] - '0'));
              ev.title = clean(s.substr(5));
            } else if (s.rfind("hele dag", 0) == 0 || s.rfind("dag ", 0) == 0) {
              ev.time = "dag";
              ev.all_day = true;
              ev.title = clean(s.substr(s.rfind("hele dag", 0) == 0 ? 8 : 3));
            } else {
              ev.time = "";
              ev.title = s;
            }
            std::string hay = upper(ev.title);
            if (hay.find("PAPA") != std::string::npos) {
              ev.who = "Papa";
              ev.color = lv_color_hex(0x5A96EB);
            } else if (hay.find("MAMA") != std::string::npos) {
              ev.who = "Mama";
              ev.color = lv_color_hex(0xF5B45A);
            } else if (hay.find("EMMA") != std::string::npos) {
              ev.who = "Emma";
              ev.color = lv_color_hex(0x9678EB);
            } else if (hay.find("LOTTE") != std::string::npos) {
              ev.who = "Lotte";
              ev.color = lv_color_hex(0x4ADE80);
            }
            if (ev.title.empty()) ev.title = "Afspraak";
            return ev;
          };
          auto style_event = [](lv_obj_t *slot, lv_obj_t *accent, lv_obj_t *card,
                                lv_obj_t *chip, lv_obj_t *who_label,
                                const AgendaEvent &ev, bool past) {
            lv_obj_set_style_bg_color(accent, ev.color, LV_PART_MAIN);
            if (card != nullptr) {
              lv_obj_set_style_border_color(card, ev.color, LV_PART_MAIN);
              lv_obj_set_style_border_opa(card, LV_OPA_20, LV_PART_MAIN);
            }
            if (chip != nullptr) {
              lv_obj_set_style_bg_color(chip, ev.color, LV_PART_MAIN);
              lv_obj_set_style_bg_opa(chip, LV_OPA_20, LV_PART_MAIN);
            }
            if (who_label != nullptr) {
              lv_obj_set_style_text_color(who_label, ev.color, LV_PART_MAIN);
            }
            lv_obj_set_style_opa(slot, past ? LV_OPA_40 : LV_OPA_COVER, LV_PART_MAIN);
          };

          auto now = id(ha_time).now();
          int now_minutes = now.is_valid() ? now.hour * 60 + now.minute : -1;
          char clock_buf[8];
          if (now.is_valid()) snprintf(clock_buf, sizeof(clock_buf), "%02d:%02d", now.hour, now.minute);
          else snprintf(clock_buf, sizeof(clock_buf), "--:--");
          lv_label_set_text(id(lbl_agenda_clock), clock_buf);
          char now_buf[20];
          snprintf(now_buf, sizeof(now_buf), "NU · %s", clock_buf);
          lv_label_set_text(id(lbl_agenda_now), now_buf);

          const char *months[] = {"", "JANUARI", "FEBRUARI", "MAART", "APRIL", "MEI", "JUNI",
                                  "JULI", "AUGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DECEMBER"};
          const char *weekdays[] = {"ZO","MA","DI","WO","DO","VR","ZA"};
          int d0 = 0, m0 = 0, d1 = 0, m1 = 0, d2 = 0, m2 = 0, d3 = 0, m3 = 0;
          parse_date(id(agenda_d0_date).state, d0, m0);
          parse_date(id(agenda_d1_date).state, d1, m1);
          parse_date(id(agenda_d2_date).state, d2, m2);
          parse_date(id(agenda_d3_date).state, d3, m3);
          std::string day0_name = now.is_valid() ? std::string(weekdays[now.day_of_week % 7]) : "VANDAAG";
          std::string day3_name = upper(clean(id(agenda_d3_title).state));
          char range_buf[96];
          if (d0 > 0 && d3 > 0 && m0 > 0 && m3 > 0) {
            if (m0 == m3) {
              snprintf(range_buf, sizeof(range_buf), "%s %d – %s %d %s",
                       day0_name.c_str(), d0, day3_name.c_str(), d3, months[m3]);
            } else {
              snprintf(range_buf, sizeof(range_buf), "%s %d %s – %s %d %s",
                       day0_name.c_str(), d0, months[m0], day3_name.c_str(), d3, months[m3]);
            }
          } else {
            snprintf(range_buf, sizeof(range_buf), "KOMENDE VIER DAGEN");
          }
          lv_label_set_text(id(lbl_agenda_range), range_buf);
          char today_buf[48];
          if (d0 > 0 && m0 > 0) snprintf(today_buf, sizeof(today_buf), "%s %d %s", day0_name.c_str(), d0, months[m0]);
          else snprintf(today_buf, sizeof(today_buf), "VANDAAG");
          lv_label_set_text(id(lbl_agenda_today_date), today_buf);

          AgendaEvent today_events[5] = {
            parse_event(id(agenda_d0_event_1).state),
            parse_event(id(agenda_d0_event_2).state),
            parse_event(id(agenda_d0_event_3).state),
            parse_event(id(agenda_d0_event_4).state),
            parse_event(id(agenda_d0_event_5).state)
          };
          lv_obj_t *today_slots[5] = {
            id(agenda_today_slot_1), id(agenda_today_slot_2), id(agenda_today_slot_3),
            id(agenda_today_slot_4), id(agenda_today_slot_5)
          };
          lv_obj_t *today_accents[5] = {
            id(agenda_today_accent_1), id(agenda_today_accent_2), id(agenda_today_accent_3),
            id(agenda_today_accent_4), id(agenda_today_accent_5)
          };
          lv_obj_t *today_cards[5] = {
            id(agenda_today_card_1), id(agenda_today_card_2), id(agenda_today_card_3),
            id(agenda_today_card_4), id(agenda_today_card_5)
          };
          lv_obj_t *today_time_labels[5] = {
            id(lbl_agenda_today_time_1), id(lbl_agenda_today_time_2), id(lbl_agenda_today_time_3),
            id(lbl_agenda_today_time_4), id(lbl_agenda_today_time_5)
          };
          lv_obj_t *today_title_labels[5] = {
            id(lbl_agenda_today_title_1), id(lbl_agenda_today_title_2), id(lbl_agenda_today_title_3),
            id(lbl_agenda_today_title_4), id(lbl_agenda_today_title_5)
          };
          int visible_today = 0;
          int past_today = 0;
          for (int i = 0; i < 5; i++) {
            if (today_events[i].valid) {
              visible_today++;
              if (!today_events[i].all_day && today_events[i].minutes >= 0 &&
                  now_minutes >= 0 && today_events[i].minutes <= now_minutes) past_today++;
            }
          }
          bool show_now = past_today > 0 && past_today < visible_today;
          for (int i = 0; i < 5; i++) {
            if (!today_events[i].valid) {
              lv_obj_add_flag(today_slots[i], LV_OBJ_FLAG_HIDDEN);
              continue;
            }
            bool past = !today_events[i].all_day && today_events[i].minutes >= 0 &&
                        now_minutes >= 0 && today_events[i].minutes <= now_minutes;
            int y = 70 + i * 82 + ((show_now && i >= past_today) ? 18 : 0);
            lv_obj_set_y(today_slots[i], y);
            lv_label_set_text(today_time_labels[i], today_events[i].time.c_str());
            lv_label_set_text(today_title_labels[i], today_events[i].title.c_str());
            style_event(today_slots[i], today_accents[i], today_cards[i], nullptr,
                        nullptr, today_events[i], past);
            lv_obj_clear_flag(today_slots[i], LV_OBJ_FLAG_HIDDEN);
          }
          if (show_now) {
            lv_obj_set_y(id(agenda_now_indicator), 70 + past_today * 82 - 3);
            lv_obj_clear_flag(id(agenda_now_indicator), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(agenda_now_indicator), LV_OBJ_FLAG_HIDDEN);
          }
          if (visible_today == 0) lv_obj_clear_flag(id(lbl_agenda_today_empty), LV_OBJ_FLAG_HIDDEN);
          else lv_obj_add_flag(id(lbl_agenda_today_empty), LV_OBJ_FLAG_HIDDEN);
          int today_total = count_from(id(agenda_d0_count).state);
          int today_more = std::max(0, today_total - 5);
          char more_buf[24];
          snprintf(more_buf, sizeof(more_buf), today_more > 0 ? "+%d meer" : "", today_more);
          lv_label_set_text(id(lbl_agenda_today_more), more_buf);

          auto update_future_day = [&](const std::string &title_raw, const std::string &date_raw,
                                       const std::string &count_raw, const std::string event_raws[8],
                                       lv_obj_t *date_label, lv_obj_t *day_label, lv_obj_t *count_label,
                                       lv_obj_t *slots[8], lv_obj_t *accents[8], lv_obj_t *times[8],
                                       lv_obj_t *titles[8], lv_obj_t *empty_label) {
            int date_day = 0, date_month = 0;
            parse_date(date_raw, date_day, date_month);
            char date_buf[8];
            snprintf(date_buf, sizeof(date_buf), date_day > 0 ? "%d" : "--", date_day);
            lv_label_set_text(date_label, date_buf);
            std::string day_name = upper(clean(title_raw));
            lv_label_set_text(day_label, day_name.empty() ? "--" : day_name.c_str());
            int total = count_from(count_raw);
            char count_buf[32];
            if (total == 1) snprintf(count_buf, sizeof(count_buf), "1 AFSPRAAK");
            else if (total > 1) snprintf(count_buf, sizeof(count_buf), "%d AFSPRAKEN", total);
            else count_buf[0] = '\0';
            lv_label_set_text(count_label, count_buf);

            AgendaEvent evs[8] = {
              parse_event(event_raws[0]), parse_event(event_raws[1]),
              parse_event(event_raws[2]), parse_event(event_raws[3]),
              parse_event(event_raws[4]), parse_event(event_raws[5]),
              parse_event(event_raws[6]), parse_event(event_raws[7])
            };
            int visible = 0;
            for (int i = 0; i < 8; i++) {
              if (!evs[i].valid) {
                lv_obj_add_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
                continue;
              }
              lv_obj_set_y(slots[i], visible * 42);
              lv_label_set_text(times[i], evs[i].time.c_str());
              lv_label_set_text(titles[i], evs[i].title.c_str());
              style_event(slots[i], accents[i], nullptr, nullptr, nullptr, evs[i], false);
              lv_obj_clear_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
              visible++;
            }
            if (visible == 0) lv_obj_clear_flag(empty_label, LV_OBJ_FLAG_HIDDEN);
            else lv_obj_add_flag(empty_label, LV_OBJ_FLAG_HIDDEN);
          };

          std::string future_d1_events[8] = {
            id(agenda_d1_event_1).state, id(agenda_d1_event_2).state,
            id(agenda_d1_event_3).state, id(agenda_d1_event_4).state,
            id(agenda_d1_event_5).state, id(agenda_d1_event_6).state,
            id(agenda_d1_event_7).state, id(agenda_d1_event_8).state
          };
          lv_obj_t *future_d1_slots[8] = {
            id(agenda_future_d1_slot_1), id(agenda_future_d1_slot_2),
            id(agenda_future_d1_slot_3), id(agenda_future_d1_slot_4),
            id(agenda_future_d1_slot_5), id(agenda_future_d1_slot_6),
            id(agenda_future_d1_slot_7), id(agenda_future_d1_slot_8)
          };
          lv_obj_t *future_d1_accents[8] = {
            id(agenda_future_d1_accent_1), id(agenda_future_d1_accent_2),
            id(agenda_future_d1_accent_3), id(agenda_future_d1_accent_4),
            id(agenda_future_d1_accent_5), id(agenda_future_d1_accent_6),
            id(agenda_future_d1_accent_7), id(agenda_future_d1_accent_8)
          };
          lv_obj_t *future_d1_times[8] = {
            id(lbl_agenda_future_d1_time_1), id(lbl_agenda_future_d1_time_2),
            id(lbl_agenda_future_d1_time_3), id(lbl_agenda_future_d1_time_4),
            id(lbl_agenda_future_d1_time_5), id(lbl_agenda_future_d1_time_6),
            id(lbl_agenda_future_d1_time_7), id(lbl_agenda_future_d1_time_8)
          };
          lv_obj_t *future_d1_titles[8] = {
            id(lbl_agenda_future_d1_title_1), id(lbl_agenda_future_d1_title_2),
            id(lbl_agenda_future_d1_title_3), id(lbl_agenda_future_d1_title_4),
            id(lbl_agenda_future_d1_title_5), id(lbl_agenda_future_d1_title_6),
            id(lbl_agenda_future_d1_title_7), id(lbl_agenda_future_d1_title_8)
          };

          std::string future_d2_events[8] = {
            id(agenda_d2_event_1).state, id(agenda_d2_event_2).state,
            id(agenda_d2_event_3).state, id(agenda_d2_event_4).state,
            id(agenda_d2_event_5).state, id(agenda_d2_event_6).state,
            id(agenda_d2_event_7).state, id(agenda_d2_event_8).state
          };
          lv_obj_t *future_d2_slots[8] = {
            id(agenda_future_d2_slot_1), id(agenda_future_d2_slot_2),
            id(agenda_future_d2_slot_3), id(agenda_future_d2_slot_4),
            id(agenda_future_d2_slot_5), id(agenda_future_d2_slot_6),
            id(agenda_future_d2_slot_7), id(agenda_future_d2_slot_8)
          };
          lv_obj_t *future_d2_accents[8] = {
            id(agenda_future_d2_accent_1), id(agenda_future_d2_accent_2),
            id(agenda_future_d2_accent_3), id(agenda_future_d2_accent_4),
            id(agenda_future_d2_accent_5), id(agenda_future_d2_accent_6),
            id(agenda_future_d2_accent_7), id(agenda_future_d2_accent_8)
          };
          lv_obj_t *future_d2_times[8] = {
            id(lbl_agenda_future_d2_time_1), id(lbl_agenda_future_d2_time_2),
            id(lbl_agenda_future_d2_time_3), id(lbl_agenda_future_d2_time_4),
            id(lbl_agenda_future_d2_time_5), id(lbl_agenda_future_d2_time_6),
            id(lbl_agenda_future_d2_time_7), id(lbl_agenda_future_d2_time_8)
          };
          lv_obj_t *future_d2_titles[8] = {
            id(lbl_agenda_future_d2_title_1), id(lbl_agenda_future_d2_title_2),
            id(lbl_agenda_future_d2_title_3), id(lbl_agenda_future_d2_title_4),
            id(lbl_agenda_future_d2_title_5), id(lbl_agenda_future_d2_title_6),
            id(lbl_agenda_future_d2_title_7), id(lbl_agenda_future_d2_title_8)
          };

          std::string future_d3_events[8] = {
            id(agenda_d3_event_1).state, id(agenda_d3_event_2).state,
            id(agenda_d3_event_3).state, id(agenda_d3_event_4).state,
            id(agenda_d3_event_5).state, id(agenda_d3_event_6).state,
            id(agenda_d3_event_7).state, id(agenda_d3_event_8).state
          };
          lv_obj_t *future_d3_slots[8] = {
            id(agenda_future_d3_slot_1), id(agenda_future_d3_slot_2),
            id(agenda_future_d3_slot_3), id(agenda_future_d3_slot_4),
            id(agenda_future_d3_slot_5), id(agenda_future_d3_slot_6),
            id(agenda_future_d3_slot_7), id(agenda_future_d3_slot_8)
          };
          lv_obj_t *future_d3_accents[8] = {
            id(agenda_future_d3_accent_1), id(agenda_future_d3_accent_2),
            id(agenda_future_d3_accent_3), id(agenda_future_d3_accent_4),
            id(agenda_future_d3_accent_5), id(agenda_future_d3_accent_6),
            id(agenda_future_d3_accent_7), id(agenda_future_d3_accent_8)
          };
          lv_obj_t *future_d3_times[8] = {
            id(lbl_agenda_future_d3_time_1), id(lbl_agenda_future_d3_time_2),
            id(lbl_agenda_future_d3_time_3), id(lbl_agenda_future_d3_time_4),
            id(lbl_agenda_future_d3_time_5), id(lbl_agenda_future_d3_time_6),
            id(lbl_agenda_future_d3_time_7), id(lbl_agenda_future_d3_time_8)
          };
          lv_obj_t *future_d3_titles[8] = {
            id(lbl_agenda_future_d3_title_1), id(lbl_agenda_future_d3_title_2),
            id(lbl_agenda_future_d3_title_3), id(lbl_agenda_future_d3_title_4),
            id(lbl_agenda_future_d3_title_5), id(lbl_agenda_future_d3_title_6),
            id(lbl_agenda_future_d3_title_7), id(lbl_agenda_future_d3_title_8)
          };

          update_future_day(
            id(agenda_d1_title).state, id(agenda_d1_date).state, id(agenda_d1_count).state,
            future_d1_events, id(lbl_agenda_future_d1_date), id(lbl_agenda_future_d1_day),
            id(lbl_agenda_future_d1_count), future_d1_slots, future_d1_accents,
            future_d1_times, future_d1_titles, id(lbl_agenda_future_d1_empty));
          update_future_day(
            id(agenda_d2_title).state, id(agenda_d2_date).state, id(agenda_d2_count).state,
            future_d2_events, id(lbl_agenda_future_d2_date), id(lbl_agenda_future_d2_day),
            id(lbl_agenda_future_d2_count), future_d2_slots, future_d2_accents,
            future_d2_times, future_d2_titles, id(lbl_agenda_future_d2_empty));
          update_future_day(
            id(agenda_d3_title).state, id(agenda_d3_date).state, id(agenda_d3_count).state,
            future_d3_events, id(lbl_agenda_future_d3_date), id(lbl_agenda_future_d3_day),
            id(lbl_agenda_future_d3_count), future_d3_slots, future_d3_accents,
            future_d3_times, future_d3_titles, id(lbl_agenda_future_d3_empty));

          // Agenda-thema: alleen het agenda-canvas wisselt; de omliggende interface blijft zwart.
          bool light = id(agenda_light_theme);
          lv_color_t surface = lv_color_hex(light ? 0xF5F5F7 : 0x08080A);
          lv_color_t card = lv_color_hex(light ? 0xFFFFFF : 0x131418);
          lv_color_t primary = lv_color_hex(light ? 0x1C1C1E : 0xFFFFFF);
          lv_color_t secondary = lv_color_hex(light ? 0x6E6E73 : 0x6B6E76);
          lv_color_t divider = lv_color_hex(light ? 0xD7D7DC : 0x2A2B30);
          lv_color_t red = lv_color_hex(0xFF3B30);

          lv_obj_set_style_bg_color(id(agenda_focus_sidebar), surface, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_panel_divider), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_future_divider_1), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(agenda_future_divider_2), divider, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_panel_divider), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_future_divider_1), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(agenda_future_divider_2), light ? LV_OPA_COVER : LV_OPA_50, LV_PART_MAIN);

          lv_obj_set_style_text_color(id(lbl_agenda_heading), light ? red : primary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_heading), primary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_date), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_now), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_empty), secondary, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_today_more), secondary, LV_PART_MAIN);

          lv_obj_set_style_bg_color(id(agenda_theme_button), light ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x17181C), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(agenda_theme_button), light ? divider : lv_color_hex(0x3A3B40), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_agenda_theme_button), red, LV_PART_MAIN);
          lv_label_set_text(id(lbl_agenda_theme_button), light ? "DONKER" : "LICHT");

          for (int i = 0; i < 5; i++) {
