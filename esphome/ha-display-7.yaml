# ---------------------------------------------------------------
# Text sensors — Media + Lichten
# ---------------------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: media_title
    entity_id: ${keuken_amp_entity}
    attribute: media_title
    internal: true
    on_value:
      - lambda: 'id(album_art_pending_url).clear();'
  - platform: homeassistant
    id: media_artist
    entity_id: ${keuken_amp_entity}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_state
    entity_id: ${keuken_amp_entity}
    internal: true
  - platform: homeassistant
    id: keuken_amp_media_content_id
    entity_id: ${keuken_amp_entity}
    attribute: media_content_id
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return x.rfind("spotify:", 0) == 0;'
          then:
            - delay: 500ms
            - script.execute: media_show_for_keuken_amp_spotify
  - platform: homeassistant
    id: keuken_amp_state
    entity_id: ${keuken_amp_entity}
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return x != "playing";'
          then:
            - script.execute: media_restore_after_keuken_amp_stop
            - lambda: 'id(keuken_amp_spotify_auto_shown) = false;'
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - delay: 500ms
            - script.execute: media_show_for_keuken_amp_spotify
  - platform: homeassistant
    id: media_source
    entity_id: ${spotify_entity}
    attribute: source
    internal: true
  - platform: homeassistant
    id: media_shuffle
    entity_id: ${spotify_entity}
    attribute: shuffle
    internal: true
  - platform: homeassistant
    id: media_repeat
    entity_id: ${spotify_entity}
    attribute: repeat
    internal: true
  - platform: homeassistant
    id: ha_balans_battery_state
    entity_id: sensor.balans_batterij_status
    internal: true
  - platform: homeassistant
    id: ha_balans_device_state
    entity_id: sensor.balans_batterij_device_state
    internal: true
  - platform: homeassistant
    id: media_album_art_remote
    entity_id: ${keuken_amp_entity}
    attribute: entity_picture
    internal: true
    on_value:
      - lambda: |-
          if (x.empty()) return;
          std::string url = (x.rfind("http", 0) == 0) ? x : id(ha_base_url_detected) + x;
          id(album_art_pending_url) = url;
      - script.execute: album_art_load
  - platform: homeassistant
    id: media_album_art_local
    entity_id: ${keuken_amp_entity}
    attribute: entity_picture_local
    internal: true
    on_value:
      - lambda: |-
          if (x.empty() || !id(album_art_pending_url).empty()) return;
          std::string url = (x.rfind("http", 0) == 0) ? x : id(ha_base_url_detected) + x;
          id(album_art_pending_url) = url;
      - script.execute: album_art_load
