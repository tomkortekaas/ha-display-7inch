<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify — Guition 7″ 800×480</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --green:   oklch(0.74 0.16 152);
  --muted:   oklch(0.58 0.012 250);
  --bg:      #08080a;
  --surface: #131418;
  --surf2:   #1b1c21;
  --line:    rgba(255,255,255,.07);
  --line2:   rgba(255,255,255,.16);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #030304; }

/* ── shared screen shell ── */
.scr {
  width: 800px; height: 480px;
  background: var(--bg); color: #fff;
  font-family: "Montserrat", sans-serif;
  position: relative; overflow: hidden;
  user-select: none;
}

/* ── full-bleed gradient bg ── */
.vc-bg {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 11px),
    var(--g);
}
.ph-tag {
  font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: .3px;
  color: rgba(255,255,255,.55); background: rgba(0,0,0,.32);
  padding: 3px 7px; border-radius: 6px; white-space: nowrap;
}

/* ── eq bars ── */
.eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
.eq i { width: 3px; height: 40%; background: var(--green); border-radius: 1px; }
.eq[data-on="true"] i { animation: eq 900ms ease-in-out infinite; }
.eq i:nth-child(2) { animation-delay: .2s; }
.eq i:nth-child(3) { animation-delay: .4s; }
.eq i:nth-child(4) { animation-delay: .1s; }
@keyframes eq { 0%,100% { height: 30%; } 50% { height: 100%; } }

/* ── pills ── */
.vc-pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600; letter-spacing: .3px; color: #fff;
  background: rgba(0,0,0,.38); backdrop-filter: blur(8px);
  padding: 7px 13px; border-radius: 999px;
}
.vc-pill.ghost { color: rgba(255,255,255,.9); }

/* ══════════════════════════════════════════════════
   SCREEN 1 — PLAYER  (800×480, split layout)
══════════════════════════════════════════════════ */
.player-topbar {
  position: absolute; top: 0; left: 0; right: 0; height: 48px;
  padding: 0 24px; display: flex; align-items: center;
  justify-content: space-between; z-index: 4;
  background: linear-gradient(rgba(0,0,0,.52), transparent);
}

/* left panel: album art */
.player-left {
  position: absolute; left: 0; top: 0; bottom: 0; width: 360px;
  display: flex; align-items: center; justify-content: center;
  padding: 28px 20px 28px 32px;
}
.album-art {
  width: 280px; height: 280px; border-radius: 16px; flex-shrink: 0;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0 2px, transparent 2px 9px),
    linear-gradient(145deg, oklch(0.52 0.18 285), oklch(0.34 0.15 260) 55%, #050510);
  box-shadow: 0 20px 56px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.08);
  display: grid; place-items: center;
}

/* right panel: controls */
.player-right {
  position: absolute; left: 360px; right: 0; top: 0; bottom: 0;
  padding: 20px 36px 22px 18px;
  display: flex; flex-direction: column; justify-content: center; gap: 0;
}
.divider-v {
  position: absolute; left: 360px; top: 44px; bottom: 44px; width: 1px;
  background: linear-gradient(transparent, var(--line2) 30%, var(--line2) 70%, transparent);
  pointer-events: none;
}

.pr-meta { margin-bottom: 4px; }
.pr-title { font-size: 38px; font-weight: 800; letter-spacing: -1.2px; line-height: 1.03; }
.pr-artist { font-size: 15px; font-weight: 600; color: rgba(255,255,255,.62); margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pr-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.like-btn { border: none; background: transparent; cursor: pointer; padding: 4px; color: rgba(255,255,255,.6); flex-shrink: 0; margin-top: 4px; }
.like-btn.on { color: var(--green); }

.prog-wrap { margin-top: 18px; }
.prog-track { position: relative; height: 5px; border-radius: 2.5px; background: rgba(255,255,255,.22); cursor: pointer; }
.prog-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2.5px; background: #fff; }
.prog-knob { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); pointer-events: none; }
.prog-times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,.52); font-variant-numeric: tabular-nums; }

.transport { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
.tbtn { width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,.1); color: #fff; cursor: pointer; display: grid; place-items: center; transition: background .15s, color .15s; flex-shrink: 0; }
.tbtn:hover { background: rgba(255,255,255,.18); }
.tbtn.act { color: var(--green); }
.tplay { width: 62px; height: 62px; border-radius: 50%; border: none; background: var(--green); color: #07140d; cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
  box-shadow: 0 10px 28px color-mix(in oklch, var(--green) 42%, transparent); transition: transform .12s; }
.tplay:active { transform: scale(.93); }

.vol-row { display: flex; align-items: center; gap: 11px; margin-top: 15px; }
.vol-ic { color: rgba(255,255,255,.75); display: flex; flex-shrink: 0; }
.vol-track { position: relative; flex: 1; height: 5px; border-radius: 2.5px; background: rgba(255,255,255,.18); cursor: pointer; }
.vol-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2.5px; background: rgba(255,255,255,.85); }
.vol-knob { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); pointer-events: none; }
.vol-pct { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.48); width: 24px; text-align: right; font-variant-numeric: tabular-nums; }

/* ══════════════════════════════════════════════════
   SCREEN 2 — LYRICS
══════════════════════════════════════════════════ */
.lyr-fade {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background:
    linear-gradient(180deg, rgba(8,8,12,.96) 0%, rgba(8,8,12,0) 18%,
      rgba(8,8,12,0) 70%, rgba(8,8,12,.97) 100%),
    linear-gradient(rgba(8,8,12,.3), rgba(8,8,12,.3));
}
.lyr-top {
  position: absolute; top: 20px; left: 26px; right: 26px; z-index: 3;
  display: flex; align-items: center; justify-content: space-between;
}
.lyr-window {
  position: absolute; top: 58px; bottom: 54px; left: 0; right: 0; z-index: 2;
  overflow: hidden;
}
.lyr-track {
  position: absolute; left: 0; right: 0; top: 0;
  transition: transform .55s cubic-bezier(.22,.61,.36,1);
}
.lyr-line {
  height: 72px; display: flex; align-items: center; padding: 0 52px;
  font-size: 26px; font-weight: 700; letter-spacing: -.3px; line-height: 1.15;
  color: rgba(255,255,255,.28); transition: color .4s, transform .4s;
  transform-origin: left center; text-wrap: pretty;
}
.lyr-line.past { color: rgba(255,255,255,.2); }
.lyr-line.on { color: #fff; transform: scale(1.05); }
.lyr-foot {
  position: absolute; left: 26px; right: 26px; bottom: 16px; z-index: 3;
  display: flex; align-items: center; justify-content: space-between;
}
.lyr-meta { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lyr-song { color: #fff; font-weight: 700; }

/* ══════════════════════════════════════════════════
   SCREEN 3 — ARTIST FACTS
══════════════════════════════════════════════════ */
.fact-scrim {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, rgba(8,8,10,.42) 0%, rgba(8,8,10,.1) 30%, rgba(8,8,10,.7) 100%);
}
.fact-inner {
  position: absolute; inset: 0; z-index: 2;
  display: flex; gap: 0;
}
.fact-left {
  width: 220px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: flex-start;
  justify-content: center; padding: 28px 24px 28px 36px; gap: 0;
}
.fact-avatar {
  width: 96px; height: 96px; border-radius: 50%; flex-shrink: 0;
  background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.07) 0 2px, transparent 2px 9px),
    linear-gradient(150deg, #3a3c66, #1a1b2e);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
  display: grid; place-items: center; overflow: hidden;
}
.fact-name { font-size: 30px; font-weight: 800; letter-spacing: -.7px; margin-top: 16px; line-height: 1; }
.fact-sub { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 6px; letter-spacing: .2px; line-height: 1.6; }
.fact-sep {
  width: 1px; align-self: stretch; margin: 28px 0;
  background: linear-gradient(transparent, var(--line2) 25%, var(--line2) 75%, transparent);
  flex-shrink: 0;
}
.fact-right {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 28px 36px 24px 28px;
}
.fact-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  color: var(--green); margin-bottom: 18px;
}
.fact-text {
  font-size: 22px; font-weight: 700; line-height: 1.42;
  letter-spacing: -.3px; text-wrap: pretty; flex: 1;
  display: flex; align-items: center;
  animation: factIn .45s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes factIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.fact-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 20px; flex-shrink: 0;
}
.fdots { display: flex; gap: 6px; align-items: center; }
.fdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.24); transition: width .3s, background .3s; }
.fdot.on { width: 20px; border-radius: 4px; background: var(--green); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── helpers ── */
const fmt = (s) => Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0");
const LS = "spot_guition_state";
const load = () => { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch { return {}; } };

/* ── icons ── */
const ic = { fill:"none", stroke:"currentColor", strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round" };
const PlayIcon  = ({s=28}) => <svg width={s} height={s} viewBox="0 0 24 24"><path d="M7 4.5 19 12 7 19.5Z" fill="currentColor"/></svg>;
const PauseIcon = ({s=28}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.3"/><rect x="14" y="5" width="4" height="14" rx="1.3"/></svg>;
const NextIcon  = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M5 5 15 12 5 19Z"/><rect x="16" y="5" width="3" height="14" rx="1.2"/></svg>;
const PrevIcon  = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M19 5 9 12 19 19Z"/><rect x="5" y="5" width="3" height="14" rx="1.2"/></svg>;
const ShuffleIcon = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M3 6h4l10 12h4"/><path d="M3 18h4l3.5-4.2"/><path d="M14.5 8.2 17 6h4"/><path d="M18.5 3.5 21 6l-2.5 2.5"/><path d="M18.5 15.5 21 18l-2.5 2.5"/></svg>;
const RepeatIcon = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M6 7h10a3 3 0 013 3v1"/><path d="M18 4.5 20.5 7 18 9.5"/><path d="M18 17H8a3 3 0 01-3-3v-1"/><path d="M6 19.5 3.5 17 6 14.5"/></svg>;
const VolIcon   = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M4 9h3l4-3.5v13L7 15H4Z" fill="currentColor" stroke="none"/><path d="M15.5 9a4 4 0 010 6"/><path d="M18 6.5a7.5 7.5 0 010 11"/></svg>;
const DeviceIcon = ({s=15}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic}><rect x="4" y="3" width="16" height="18" rx="3"/><circle cx="12" cy="15" r="3.2"/><circle cx="12" cy="7" r="1" fill="currentColor"/></svg>;
const HeartIcon = ({s=22, filled=false}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic} fill={filled?"currentColor":"none"}><path d="M12 20C12 20 4 14.5 4 8.8A4.2 4.2 0 0112 6.4 4.2 4.2 0 0120 8.8C20 14.5 12 20 12 20Z"/></svg>;
const InfoIcon   = ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" {...ic}><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r=".5" fill="currentColor" stroke="none"/></svg>;
const Eq = ({on}) => <span className="eq" data-on={String(on)}><i/><i/><i/><i/></span>;

/* ══════════════════════════════════════════════════
   SCHERM 1 — PLAYER
══════════════════════════════════════════════════ */
function PlayerScreen() {
  const saved = load();
  const TOTAL = 218;
  const [playing, setPlaying] = useState(saved.playing !== undefined ? saved.playing : true);
  const [pos,     setPos]     = useState(saved.pos != null ? saved.pos : 74);
  const [vol,     setVol]     = useState(saved.vol != null ? saved.vol : 0.62);
  const [shuffle, setShuffle] = useState(saved.shuffle !== undefined ? saved.shuffle : true);
  const [repeat,  setRepeat]  = useState(saved.repeat || false);
  const [liked,   setLiked]   = useState(saved.liked !== undefined ? saved.liked : true);
  const barRef = useRef(null);
  const volRef = useRef(null);

  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => setPos(p => p >= TOTAL ? 0 : p + 1), 1000);
    return () => clearInterval(t);
  }, [playing]);

  useEffect(() => {
    localStorage.setItem(LS, JSON.stringify({ playing, pos, vol, shuffle, repeat, liked }));
  }, [playing, pos, vol, shuffle, repeat, liked]);

  const seek = e => {
    const r = barRef.current.getBoundingClientRect();
    setPos(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * TOTAL);
  };
  const setVolume = e => {
    const r = volRef.current.getBoundingClientRect();
    setVol(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)));
  };
  const pct = (pos / TOTAL) * 100;

  return (
    <div className="scr">
      {/* bg */}
      <div className="vc-bg" style={{"--g":"linear-gradient(160deg,oklch(0.58 0.15 285),oklch(0.42 0.13 255) 46%,#0a0b1a 92%)"}} />
      {/* top scrims */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,rgba(0,0,0,.3) 0%,transparent 45%)",pointerEvents:"none",zIndex:1}} />
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 22%,transparent 65%,rgba(0,0,0,.55) 100%)",pointerEvents:"none",zIndex:1}} />

      {/* topbar */}
      <div className="player-topbar" style={{zIndex:4}}>
        <span className="vc-pill"><DeviceIcon /> Woonkamer</span>
        <span className="vc-pill ghost"><Eq on={playing} /> nu afgespeeld</span>
      </div>

      {/* album art */}
      <div className="player-left" style={{zIndex:2}}>
        <div className="album-art">
          <span className="ph-tag">album art</span>
        </div>
      </div>

      {/* vertical rule */}
      <div className="divider-v" style={{zIndex:2}} />

      {/* controls */}
      <div className="player-right" style={{zIndex:2}}>
        <div className="pr-head">
          <div className="pr-meta" style={{minWidth:0,flex:1}}>
            <div className="pr-title">Midnight City</div>
            <div className="pr-artist">M83 · Hurry Up, We're Dreaming</div>
          </div>
          <button className={"like-btn" + (liked ? " on" : "")} onClick={() => setLiked(!liked)}>
            <HeartIcon filled={liked} />
          </button>
        </div>

        <div className="prog-wrap">
          <div className="prog-track" ref={barRef} onClick={seek}>
            <span className="prog-fill" style={{width: pct + "%"}} />
            <span className="prog-knob" style={{left: pct + "%"}} />
          </div>
          <div className="prog-times"><span>{fmt(pos)}</span><span>{fmt(TOTAL)}</span></div>
        </div>

        <div className="transport">
          <button className={"tbtn" + (shuffle ? " act":"")} onClick={() => setShuffle(!shuffle)}><ShuffleIcon /></button>
          <button className="tbtn" onClick={() => setPos(0)}><PrevIcon /></button>
          <button className="tplay" onClick={() => setPlaying(!playing)}>{playing ? <PauseIcon /> : <PlayIcon />}</button>
          <button className="tbtn" onClick={() => setPos(0)}><NextIcon /></button>
          <button className={"tbtn" + (repeat ? " act":"")}  onClick={() => setRepeat(!repeat)}><RepeatIcon /></button>
        </div>

        <div className="vol-row">
          <span className="vol-ic"><VolIcon /></span>
          <div className="vol-track" ref={volRef} onClick={setVolume}>
            <span className="vol-fill" style={{width: vol*100 + "%"}} />
            <span className="vol-knob" style={{left: vol*100 + "%"}} />
          </div>
          <span className="vol-pct">{Math.round(vol*100)}</span>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SCHERM 2 — SONGTEKST
══════════════════════════════════════════════════ */
const LYRICS = [
  { t:0,   x:"♪" },
  { t:12,  x:"Lichten over de snelweg, de stad ademt traag" },
  { t:22,  x:"We rijden door de nacht, geen reden om te stoppen" },
  { t:32,  x:"Jij draait het raampje open, de wind neemt het over" },
  { t:42,  x:"En alles wat we zochten ligt hier voor ons" },
  { t:53,  x:"Wakker, wakker — de morgen is van ons" },
  { t:63,  x:"Wakker, wakker — we laten het maar gaan" },
  { t:74,  x:"Neonlicht kleurt de hemel boven het asfalt" },
  { t:85,  x:"Een kort moment dat eindeloos lijkt te duren" },
  { t:96,  x:"Hou vast, hou vast, voor het straks weer verdwijnt" },
  { t:107, x:"Wakker, wakker — de morgen is van ons" },
  { t:118, x:"Wakker, wakker — we laten het maar gaan" },
  { t:130, x:"♪" },
];
const SLOT = 72;

function LyricsScreen() {
  const saved = load();
  const TOTAL = 218;
  const [pos, setPos] = useState(saved.pos != null ? saved.pos : 74);
  const [playing] = useState(saved.playing !== undefined ? saved.playing : true);
  useEffect(() => {
    const t = setInterval(() => setPos(p => p >= TOTAL ? 0 : p + 1), 1000);
    return () => clearInterval(t);
  }, []);
  let active = 0;
  for (let i = 0; i < LYRICS.length; i++) if (pos >= LYRICS[i].t) active = i;
  const WIN = 480 - 58 - 54;
  const offset = WIN / 2 - (active + 0.5) * SLOT;
  return (
    <div className="scr">
      <div className="vc-bg" style={{"--g":"linear-gradient(160deg,oklch(0.58 0.15 285),oklch(0.42 0.13 255) 46%,#0a0b1a 92%)"}} />
      <div className="lyr-fade" />
      <div className="lyr-top">
        <span className="vc-pill"><Eq on={playing} /> songtekst</span>
        <span className="vc-pill ghost">{fmt(pos)}</span>
      </div>
      <div className="lyr-window">
        <div className="lyr-track" style={{transform:`translateY(${offset}px)`}}>
          {LYRICS.map((l,i) => (
            <div key={i} className={"lyr-line" + (i===active?" on": i<active?" past":"")}>
              {l.x}
            </div>
          ))}
        </div>
      </div>
      <div className="lyr-foot">
        <div className="lyr-meta"><span className="lyr-song">Midnight City</span> · M83</div>
        <span className="ph-tag">songtekst · live van provider</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SCHERM 3 — WIST JE DAT?
══════════════════════════════════════════════════ */
const FACTS = [
  "M83 is genoemd naar Messier 83 — een spiraalstelsel op zo'n 15 miljoen lichtjaar afstand van de aarde.",
  "Achter M83 zit de Franse muzikant Anthony Gonzalez. Begonnen als duo, nu zijn solo-project.",
  "'Midnight City' verscheen in 2011 op het dubbelalbum Hurry Up, We're Dreaming.",
  "Het nummer eindigt met een opvallende saxofoonsolo — ongewoon voor een synthpop-hit.",
];

function FactsScreen() {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(n => (n + 1) % FACTS.length), 7000);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="scr">
      <div className="vc-bg" style={{"--g":"linear-gradient(165deg,oklch(0.50 0.14 285) 0%,#10111f 52%,#08080a 100%)"}} />
      <div className="fact-scrim" />
      <div className="fact-inner">
        {/* left: artist info */}
        <div className="fact-left">
          <div className="fact-avatar"><span className="ph-tag" style={{fontSize:"8px"}}>artiest</span></div>
          <div className="fact-name">M83</div>
          <div className="fact-sub">Synth-pop · Frankrijk<br/>actief sinds 2001</div>
        </div>
        {/* separator */}
        <div className="fact-sep" />
        {/* right: fact */}
        <div className="fact-right">
          <div className="fact-eyebrow"><InfoIcon /> WIST JE DAT?</div>
          <div className="fact-text" key={i}>{FACTS[i]}</div>
          <div className="fact-foot">
            <div className="fdots">
              {FACTS.map((_,n) => <span key={n} className={"fdot" + (n===i?" on":"")} />)}
            </div>
            <span className="ph-tag">feiten · via provider</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════ */
function App() {
  const { DesignCanvas, DCSection, DCArtboard } = window;
  return (
    <DesignCanvas>
      <DCSection id="guition7" title='Spotify — Guition 7″ · 800×480' subtitle="Drie swipe-schermen · dezelfde ambient-stijl als de 4″ versie">
        <DCArtboard id="player"  label="Player — split layout" width={800} height={480}><PlayerScreen /></DCArtboard>
        <DCArtboard id="lyrics"  label="Songtekst — gesynchroniseerd" width={800} height={480}><LyricsScreen /></DCArtboard>
        <DCArtboard id="facts"   label="Wist je dat? — artiest &amp; nummer" width={800} height={480}><FactsScreen /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
