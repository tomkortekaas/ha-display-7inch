# =============================================================================
#  GUITION 7" — 800×480  ·  ESPHome + LVGL  ·  Zes-pagina build-spec
# -----------------------------------------------------------------------------
#  DOEL VAN DIT BESTAND
#  Dit is een volledige build-spec voor Claude. Geef dit bestand mee als
#  instructie om de definitieve ESPHome YAML te genereren.
#
#  GESELECTEERDE SCHERMEN (uit Spotify Guition 7inch v3.html):
#    Pag 1 · Spotify Player      — split: album-art + bloom links, controls rechts
#    Pag 2 · Spotify Songtekst   — persistente sidebar links, scrollende lyrics rechts
#    Pag 3 · Spotify Wist je dat — persistente sidebar links, artiest + facts rechts
#    Pag 4 · Immich Variant A    — full-bleed foto 800×480, scrim boven/onder
#    Pag 5 · Weer                — topbar, hero-strip, uurstrip (8 col), 5-daagse
#    Pag 6 · Lampen Variant B    — 5 verticale segment-kolommen + CT-strip + scènes
#
#  HERGEBRUIKTE ENTITEITEN + LOGICA (volledige compatibiliteit):
#    • spotify.yaml          → entity_id's sp_*, album_art, refresh_spotify
#    • weerscherm.yaml       → entity_id's ha_*/d*_*, refresh_weather, forecast-helpers
#    • immich_fotolijst.yaml → entity_id's immich_*, immich_img, photo_widget
#    • afzuigkap.yaml        → font-stijl (Montserrat), kleurpalet, segment-patroon
#
#  DISPLAY-DIMENSIES: 800 × 480 px (was 480 × 480 op de 4")
#  NAVIGATIE:  6-stippen indicator in iedere topbar + tikzones links/rechts
#  SWIPEVOLGORDE: Player → Songtekst → Wist je dat → Immich → Weer → Lampen
# =============================================================================


# =============================================================================
#  1.  ESP32 + BOARD
# =============================================================================
esphome:
  name: guition-7
  friendly_name: "Guition 7 inch Scherm"
  on_boot:
    - delay: 2s
    - script.execute: refresh_clock
    - script.execute: refresh_spotify
    - script.execute: refresh_weather
    - script.execute: refresh_lights

esp32:
  board: esp32-s3-devkitc-1   # >>> TODO: aanpassen naar jouw Guition 7" board
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      # klok elke minuut
      - seconds: 0
        minutes: /1
        then: [ script.execute: refresh_clock ]
      # lyrics sync elke seconde
      - seconds: /1
        then: [ script.execute: refresh_lyrics ]
      # facts roulatie elke 7 seconden
      - seconds: 0,7,14,21,28,35,42,49,56
        then:
          - lambda: 'id(fact_idx) = (id(fact_idx) + 1) % 4;'
          - script.execute: refresh_facts


# =============================================================================
#  2.  FONTS
#  Alle benodigde groottes voor 6 schermen op 800×480.
#  Montserrat-gewichten zelfde als afzuigkap.yaml/spotify.yaml.
# =============================================================================
font:
  # ── Montserrat (tekst) ──────────────────────────────────────────────────
  - file: "gfonts://Montserrat@800"
    id: font_number         # 72px  – grote temperatuur hero, segment-%-overlay
    size: 72
  - file: "gfonts://Montserrat@800"
    id: font_title          # 38px  – songtitel, Immich locatienaam
    size: 38
  - file: "gfonts://Montserrat@800"
    id: font_heading        # 26px  – artiestnaam, stats-getallen (facts-pagina)
    size: 26
  - file: "gfonts://Montserrat@700"
    id: font_subheading     # 17px  – forecast-dagnamen, conditie-tekst
    size: 17
  - file: "gfonts://Montserrat@700"
    id: font_brand          # 13px  – topbar-brandlabels (SPOTIFY / THUIS / IMMICH / VERLICHTING)
    size: 13
  - file: "gfonts://Montserrat@700"
    id: font_lyr            # 21px  – lyrics-regels
    size: 21
  - file: "gfonts://Montserrat@600"
    id: font_label          # 12px  – lamplabels, chip-tekst, bijschriften
    size: 12
  - file: "gfonts://Montserrat@600"
    id: font_clock          # 13px  – klok in topbar
    size: 13
  - file: "gfonts://Montserrat@500"
    id: font_meta           # 11px  – gedempt/secundair (artiest, datum, vol-getal)
    size: 11

  # ── Material Design Icons ────────────────────────────────────────────────
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_sp_ctl         # 26px  – transport: play/pause/prev/next/shuffle/repeat
    size: 26
    glyphs:
      - "\U000F040A"   # mdi:play
      - "\U000F03E4"   # mdi:pause
      - "\U000F04AD"   # mdi:skip-next
      - "\U000F04AE"   # mdi:skip-previous
      - "\U000F049D"   # mdi:shuffle-variant
      - "\U000F0456"   # mdi:repeat
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_sp_mini        # 18px  – heart, volume-icoon, speaker-pill
    size: 18
    glyphs:
      - "\U000F02D1"   # mdi:heart
      - "\U000F02D5"   # mdi:heart-outline
      - "\U000F057E"   # mdi:volume-high
      - "\U000F04C3"   # mdi:speaker
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_wx_big         # 64px  – hero-weericoon
    size: 64
    glyphs: &wx_glyphs
      - "\U000F0599"   # weather-sunny
      - "\U000F0594"   # weather-night
      - "\U000F0595"   # weather-partly-cloudy
      - "\U000F0590"   # weather-cloudy
      - "\U000F0597"   # weather-rainy
      - "\U000F0596"   # weather-pouring
      - "\U000F0593"   # weather-lightning
      - "\U000F0598"   # weather-snowy
      - "\U000F0591"   # weather-fog
      - "\U000F059D"   # weather-windy
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_wx_small       # 22px  – forecast-rij-iconen + uurstrip
    size: 22
    glyphs: *wx_glyphs
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_bulb           # 26px  – lamp-icoon boven elk segment-kolom
    size: 26
    glyphs:
      - "\U000F0335"   # mdi:lightbulb  (lamp aan)
      - "\U000F0336"   # mdi:lightbulb-outline  (lamp uit)


# =============================================================================
#  3.  GLOBALS
# =============================================================================
globals:
  # Spotify
  - { id: lyr_active, type: int,   restore_value: no, initial_value: "0"  }  # actieve lyrics-regel (0..12)
  - { id: fact_idx,   type: int,   restore_value: no, initial_value: "0"  }  # actief feit (0..3)
  - { id: sp_liked,   type: bool,  restore_value: yes, initial_value: "false" }
  # Weer
  - { id: wk_tmin,   type: float, restore_value: no, initial_value: "0"  }
  - { id: wk_tmax,   type: float, restore_value: no, initial_value: "20" }
  # Lampen – helderheid gesynchroniseerd met HA (0..8 segmenten)
  - { id: lamp0_seg, type: int,   restore_value: no, initial_value: "0"  }  # Woonkamer
  - { id: lamp1_seg, type: int,   restore_value: no, initial_value: "0"  }  # Slaapkamer
  - { id: lamp2_seg, type: int,   restore_value: no, initial_value: "0"  }  # Keuken
  - { id: lamp3_seg, type: int,   restore_value: no, initial_value: "0"  }  # Hal
  - { id: lamp4_seg, type: int,   restore_value: no, initial_value: "0"  }  # Badkamer
  # Lampen – tijdelijke tap-variabelen voor apply_lamp script
  - { id: tap_lamp,  type: int,   restore_value: no, initial_value: "0"  }
  - { id: tap_seg,   type: int,   restore_value: no, initial_value: "0"  }
  # Lampen – huidige CT (in Kelvin, 2500..6500)
  - { id: lamp_ct_k, type: int,   restore_value: yes, initial_value: "4000" }


# =============================================================================
#  4.  ONLINE IMAGES
# =============================================================================
online_image:
  # Spotify album-art  (uit spotify.yaml; zet HA-basis-URL bij >>> TODO)
  - id: album_art
    url: "http://homeassistant.local:8123/local/album_placeholder.png"   # >>> TODO
    format: JPEG
    type: RGB565
    resize: 220x220       # passend voor sidebar (212px) en player-left (220px)
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: sp_art_player,  src: album_art }
      - lvgl.image.update: { id: sp_art_sidebar, src: album_art }

  # Immich foto  (uit immich_fotolijst.yaml; volledige 800×480)
  - id: immich_img
    url: "http://192.168.1.10:2283/placeholder.jpg"   # >>> TODO
    format: JPEG
    type: RGB565
    resize: 800x480
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: immich_photo, src: immich_img }


# =============================================================================
#  5.  HOME ASSISTANT SENSOREN
#  Entity-ID's zoveel mogelijk gelijk aan de 4" YAMLs zodat bestaande
#  HA-automations en template-sensoren zonder aanpassing herbruikbaar zijn.
# =============================================================================

sensor:
  # ── Spotify (uit spotify.yaml) ──────────────────────────────────────────
  - platform: homeassistant
    id: sp_position
    entity_id: media_player.spotify            # >>> TODO
    attribute: media_position
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_duration
    entity_id: media_player.spotify            # >>> TODO
    attribute: media_duration
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_volume
    entity_id: media_player.spotify            # >>> TODO
    attribute: volume_level
    on_value: { then: [ script.execute: refresh_spotify ] }

  # ── Lampen helderheid (HA brightness 0–255 → omgezet naar 0–8 segmenten) ──
  - platform: homeassistant
    id: lamp0_bri_ha
    entity_id: light.woonkamer                 # >>> TODO
    attribute: brightness
    on_value: { then: [ script.execute: refresh_lights ] }
  - platform: homeassistant
    id: lamp1_bri_ha
    entity_id: light.slaapkamer                # >>> TODO
    attribute: brightness
    on_value: { then: [ script.execute: refresh_lights ] }
  - platform: homeassistant
    id: lamp2_bri_ha
    entity_id: light.keuken                    # >>> TODO
    attribute: brightness
    on_value: { then: [ script.execute: refresh_lights ] }
  - platform: homeassistant
    id: lamp3_bri_ha
    entity_id: light.hal                       # >>> TODO
    attribute: brightness
    on_value: { then: [ script.execute: refresh_lights ] }
  - platform: homeassistant
    id: lamp4_bri_ha
    entity_id: light.badkamer                  # >>> TODO
    attribute: brightness
    on_value: { then: [ script.execute: refresh_lights ] }
  - platform: homeassistant
    id: lamp_ct_ha
    entity_id: light.woonkamer                 # >>> TODO: representatieve lamp voor CT
    attribute: color_temp_kelvin
    on_value:
      - lambda: |-
          if (!isnan(x)) id(lamp_ct_k) = (int)x;
          id(refresh_lights).execute();

  # ── Weer (uit weerscherm.yaml — zelfde entity_id's) ─────────────────────
  - platform: homeassistant
    id: ha_temp_now
    entity_id: weather.thuis                   # >>> TODO
    attribute: temperature
    on_value: { then: [ script.execute: refresh_weather ] }
  - platform: homeassistant
    id: ha_feels
    entity_id: weather.thuis                   # >>> TODO
    attribute: apparent_temperature
  - platform: homeassistant
    id: ha_wind_now
    entity_id: weather.thuis                   # >>> TODO
    attribute: wind_speed
  - platform: homeassistant
    id: ha_humidity
    entity_id: weather.thuis                   # >>> TODO
    attribute: humidity
  - platform: homeassistant
    id: ha_uv
    entity_id: sensor.uv_index                 # >>> TODO
    on_value: { then: [ script.execute: refresh_weather ] }
  # 5-daagse forecast (HA template-sensoren — zie weerscherm.yaml §3)
  - { platform: homeassistant, id: d0_hi,   entity_id: sensor.forecast_d0_hi,   on_value: { then: [ script.execute: refresh_weather ] } }
  - { platform: homeassistant, id: d0_lo,   entity_id: sensor.forecast_d0_lo }
  - { platform: homeassistant, id: d1_hi,   entity_id: sensor.forecast_d1_hi }
  - { platform: homeassistant, id: d1_lo,   entity_id: sensor.forecast_d1_lo }
  - { platform: homeassistant, id: d2_hi,   entity_id: sensor.forecast_d2_hi }
  - { platform: homeassistant, id: d2_lo,   entity_id: sensor.forecast_d2_lo }
  - { platform: homeassistant, id: d3_hi,   entity_id: sensor.forecast_d3_hi }
  - { platform: homeassistant, id: d3_lo,   entity_id: sensor.forecast_d3_lo }
  - { platform: homeassistant, id: d4_hi,   entity_id: sensor.forecast_d4_hi }
  - { platform: homeassistant, id: d4_lo,   entity_id: sensor.forecast_d4_lo }
  - { platform: homeassistant, id: d0_wind, entity_id: sensor.forecast_d0_wind }
  - { platform: homeassistant, id: d1_wind, entity_id: sensor.forecast_d1_wind }
  - { platform: homeassistant, id: d2_wind, entity_id: sensor.forecast_d2_wind }
  - { platform: homeassistant, id: d3_wind, entity_id: sensor.forecast_d3_wind }
  - { platform: homeassistant, id: d4_wind, entity_id: sensor.forecast_d4_wind }

text_sensor:
  # ── Spotify (uit spotify.yaml) ──────────────────────────────────────────
  - platform: homeassistant
    id: sp_state
    entity_id: media_player.spotify            # >>> TODO
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_title
    entity_id: media_player.spotify            # >>> TODO
    attribute: media_title
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_artist
    entity_id: media_player.spotify            # >>> TODO
    attribute: media_artist
  - platform: homeassistant
    id: sp_album
    entity_id: media_player.spotify            # >>> TODO
    attribute: media_album_name
  - platform: homeassistant
    id: sp_device
    entity_id: media_player.spotify            # >>> TODO
    attribute: source
  - platform: homeassistant
    id: sp_shuffle
    entity_id: media_player.spotify            # >>> TODO
    attribute: shuffle
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_repeat
    entity_id: media_player.spotify            # >>> TODO
    attribute: repeat
    on_value: { then: [ script.execute: refresh_spotify ] }
  - platform: homeassistant
    id: sp_picture
    entity_id: media_player.spotify            # >>> TODO
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            // Zelfde patroon als spotify.yaml §3 sp_picture lambda
            std::string base = "http://homeassistant.local:8123";   // >>> TODO
            std::string p = id(sp_picture).state;
            if (!p.empty()) {
              std::string full = (p.rfind("http",0)==0) ? p : base + p;
              id(album_art).set_url(full.c_str());
              id(album_art).update();
            }

  # ── Lampen aan/uit status ────────────────────────────────────────────────
  - { platform: homeassistant, id: lamp0_state, entity_id: light.woonkamer,  on_value: { then: [ script.execute: refresh_lights ] } }
  - { platform: homeassistant, id: lamp1_state, entity_id: light.slaapkamer, on_value: { then: [ script.execute: refresh_lights ] } }
  - { platform: homeassistant, id: lamp2_state, entity_id: light.keuken,     on_value: { then: [ script.execute: refresh_lights ] } }
  - { platform: homeassistant, id: lamp3_state, entity_id: light.hal,        on_value: { then: [ script.execute: refresh_lights ] } }
  - { platform: homeassistant, id: lamp4_state, entity_id: light.badkamer,   on_value: { then: [ script.execute: refresh_lights ] } }

  # ── Weer (uit weerscherm.yaml) ───────────────────────────────────────────
  - platform: homeassistant
    id: ha_cond_now
    entity_id: weather.thuis                   # >>> TODO
    on_value: { then: [ script.execute: refresh_weather ] }
  - platform: homeassistant
    id: ha_place
    entity_id: zone.home                       # >>> TODO (of input_text met plaatsnaam)
  - platform: homeassistant
    id: ha_sunrise
    entity_id: sensor.sun_next_rising          # >>> TODO
  - platform: homeassistant
    id: ha_sunset
    entity_id: sensor.sun_next_setting         # >>> TODO
  - { platform: homeassistant, id: d0_cond, entity_id: sensor.forecast_d0_cond, on_value: { then: [ script.execute: refresh_weather ] } }
  - { platform: homeassistant, id: d1_cond, entity_id: sensor.forecast_d1_cond }
  - { platform: homeassistant, id: d2_cond, entity_id: sensor.forecast_d2_cond }
  - { platform: homeassistant, id: d3_cond, entity_id: sensor.forecast_d3_cond }
  - { platform: homeassistant, id: d4_cond, entity_id: sensor.forecast_d4_cond }

  # ── Immich (uit immich_fotolijst.yaml — zelfde entity_id's) ─────────────
  - platform: homeassistant
    id: immich_url
    entity_id: sensor.immich_photo_url         # >>> TODO
    on_value:
      - lambda: |-
          id(immich_img).set_url(x.c_str());
          id(immich_img).update();
  - platform: homeassistant
    id: immich_place
    entity_id: sensor.immich_place             # >>> TODO
    on_value:
      - lvgl.label.update: { id: imm_place_lbl, text: !lambda 'return x.c_str();' }
  - platform: homeassistant
    id: immich_date
    entity_id: sensor.immich_date              # >>> TODO
    on_value:
      - lvgl.label.update: { id: imm_date_lbl, text: !lambda 'return x.c_str();' }
  - platform: homeassistant
    id: immich_album_txt
    entity_id: sensor.immich_album             # >>> TODO (optioneel)
    on_value:
      - lvgl.label.update: { id: imm_album_lbl, text: !lambda 'return x.c_str();' }


# =============================================================================
#  6.  HARDWARE
#  >>> TODO: vervang het volledige display-blok door de configuratie van jouw
#  Guition 7" board. De 4" YAMLs gebruiken st7701s 480×480 met de pinnen
#  hieronder — voor 800×480 is ALLEEN de dimensions-sectie anders plus de
#  init-sequence van jouw specifieke paneel. Controleer elke pin.
# =============================================================================
spi:
  - id: lcd_spi
    clk_pin: 48       # >>> TODO
    mosi_pin: 47      # >>> TODO

display:
  - platform: st7701s        # >>> TODO: controleer of jouw 7"-paneel ook st7701s gebruikt
    id: disp
    auto_clear_enabled: false
    update_interval: never
    data_rate: 2MHz
    spi_id: lcd_spi
    cs_pin: 39        # >>> TODO
    reset_pin: 40     # >>> TODO
    de_pin: 18        # >>> TODO
    hsync_pin: 16     # >>> TODO
    vsync_pin: 17     # >>> TODO
    pclk_pin: 21      # >>> TODO
    dimensions:
      width: 800      # ← gewijzigd t.o.v. 4" yamls (was 480)
      height: 480
    data_pins:
      red:   [11, 12, 13, 14, 0]   # >>> TODO
      green: [8, 20, 3, 46, 9, 10] # >>> TODO
      blue:  [4, 5, 6, 7, 15]      # >>> TODO
    init_sequence:
      - 1             # >>> TODO: init-bytes van jouw 800×480 paneel

i2c:
  - id: touch_i2c
    sda: 19           # >>> TODO
    scl: 45           # >>> TODO
    scan: true

touchscreen:
  - platform: gt911
    id: touch
    i2c_id: touch_i2c
    # interrupt_pin / reset_pin: >>> TODO indien aanwezig op jouw board

output:
  - platform: ledc
    pin: 38           # >>> TODO: backlight-pin
    id: backlight_out
light:
  - platform: monochromatic
    output: backlight_out
    id: backlight
    name: "Scherm helderheid"
    restore_mode: ALWAYS_ON


# =============================================================================
#  7.  LVGL
#
#  PALET (identiek aan afzuigkap.yaml + alle andere 4" YAMLs):
#    0x08080A  achtergrond       0x131418  surface
#    0x1B1C21  surface-2         0x4ADE80  groen (Spotify, status)
#    0x38BDF8  cyaan (Immich)    0xF5B45A  amber (lampen, temp-warm)
#    0xFFFFFF  wit               0x6B6E76  muted
#    0x5A96EB  blauw (regen)     0x9678EB  paars (onweer)
#
#  TOPBAR (pag 1–3, 5–6):  height 46  ·  brand-label links  ·  6 dots midden
#                          klok + status-stip rechts
#  TIKZONES (alle pag):    left button 60×380 → page.previous OVER_RIGHT 250ms
#                          right button 60×380 → page.next OVER_LEFT 250ms
#
#  6-DOTS INDICATOR (per pagina de actieve stip op positie 0..5):
#    5 inactive dots: width 6, height 6, radius 3, bg 0xFFFFFF opa 22%
#    1 active dot:    width 14, height 6, radius 3, bg 0xFFFFFF
#    flex ROW, gap 6, container width ~80, align TOP_MID, y 20
#
# =============================================================================
lvgl:
  displays:   [ disp ]
  touchscreens: [ touch ]
  color_depth: 16
  bg_color: 0x08080A
  text_font: font_label

  pages:

    # =========================================================================
    #  PAG 1 — SPOTIFY PLAYER
    #  Layout 800×480:
    #    TOPBAR (h=46): brand "SPOTIFY" | 6 dots (dot 0 actief) | klok
    #    BODY (h=434): flex ROW
    #      LEFT PANEL  (w=310): album-art 220×220 + bloom-glow + playlist-context
    #      DIVIDER (w=1, h=380): 0x131418
    #      RIGHT PANEL (w=489): controls (zie hieronder)
    #
    #  RIGHT PANEL inhoud (top→bottom):
    #    "NU SPEELT · <sp_device>" — font_meta, kleur 0x6B6E76, letterspacing 2
    #    Songtitel (sp_title_lbl)  — font_title (38px), wit, long_mode DOT, width 450
    #    Artiest (sp_artist_lbl)   — font_meta, 0xC8C8CE, long_mode DOT, width 450
    #    Chip-rij (flex ROW gap 8) — 4 labels: genre A, genre B, genre C, duur "3:38"
    #                                bg 0x1B1C21, border 0x2A2B30, radius 999, pad 4 12
    #    Progress slider (sp_progress) — width 450, h 5, 0-1000, bg 0x4D4D52
    #                                    indicator bg 0xFFFFFF  knob bg 0xFFFFFF pad 5
    #                                    on_release → media_player.media_seek (zelfde als spotify.yaml §4)
    #    Tijdlabels: sp_pos_lbl LEFT, sp_dur_lbl RIGHT — font_meta 0xC8C8CE
    #    Transport rij (flex ROW, space-between, w 450):
    #      sp_shuffle_btn 38×38 radius 19 bg 0xFFFFFF opa 12%  → media_player.shuffle_set
    #      prev-btn       38×38 radius 19 bg 0xFFFFFF opa 12%  → media_player.media_previous_track
    #      sp_play_btn    62×62 radius 31 bg 0x4ADE80          → media_player.media_play_pause
    #      next-btn       38×38 radius 19 bg 0xFFFFFF opa 12%  → media_player.media_next_track
    #      sp_repeat_btn  38×38 radius 19 bg 0xFFFFFF opa 12%  → media_player.repeat_set
    #    Volume rij: volume-icoon + sp_volume_sld (slider w 350 h 5) + sp_vol_lbl
    #    Volgende-track-balk: bg 0x131418, radius 12, border 0x1B1C21
    #                         "VOLGENDE" label + divider + sp_next_art (32×32) +
    #                         sp_next_title_lbl + sp_next_dur_lbl
    # =========================================================================
    - id: spotify_player_page
      bg_color: 0x08080A
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        # topbar
        - obj:
            id: sp_topbar
            width: 800
            height: 46
            align: TOP_MID
            bg_color: 0x08080A
            bg_opa: COVER
            border_width: 0
            border_side: BOTTOM
            border_color: 0x131418
            pad_all: 0
            widgets:
              - label: { text: "SPOTIFY", text_font: font_brand, text_color: 0xFFFFFF, text_opa: 85%, align: LEFT_MID, x: 24 }
              # 6-dots indicator: dot 0 actief (width 14), dots 1-5 inactief (width 6)
              - obj:
                  id: sp1_dots
                  align: CENTER
                  width: 82
                  height: 10
                  bg_opa: TRANSP
                  border_width: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 6 }
                  widgets:
                    - obj: { width: 14, height: 6, radius: 3, bg_color: 0xFFFFFF, border_width: 0 }  # actief
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
              - label: { id: sp1_clock, text: "--:--", text_font: font_clock, text_color: 0x6B6E76, align: RIGHT_MID, x: -38 }
              - obj: { width: 7, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0, align: RIGHT_MID, x: -24 }

        # body: left panel
        - obj:
            id: sp_left
            x: 0
            y: 46
            width: 310
            height: 434
            bg_color: 0x000000
            bg_opa: 45%
            border_color: 0x131418
            border_width: 1
            border_side: RIGHT
            pad_all: 0
            scrollbar_mode: 'OFF'
            widgets:
              # bloom glow achter album-art (radiale gradient — aproximeer met obj + opa blur)
              - obj:
                  id: sp_bloom
                  width: 260
                  height: 260
                  align: TOP_MID
                  y: 28
                  radius: 130
                  bg_color: 0x5A4AB4
                  bg_opa: 28%
                  border_width: 0
              # album art image widget
              - image:
                  id: sp_art_player
                  src: album_art
                  align: TOP_MID
                  y: 32
              # playlist context
              - label: { text: "VAN PLAYLIST", text_font: font_meta, text_color: 0x6B6E76, align: BOTTOM_MID, y: -44, letter_space: 2 }
              - label: { id: sp1_playlist_lbl, text: "Avond Chill · 42 nummers", text_font: font_meta, text_color: 0x6B6E76, text_opa: 80%, align: BOTTOM_MID, y: -26 }

        # body: right panel
        - obj:
            id: sp_right
            x: 311
            y: 46
            width: 489
            height: 434
            bg_opa: TRANSP
            border_width: 0
            pad_left: 28
            pad_right: 28
            pad_top: 20
            pad_bottom: 14
            scrollbar_mode: 'OFF'
            layout: { type: flex, flex_flow: COLUMN, pad_row: 0 }
            widgets:
              # context strip
              - label: { id: sp_context_lbl, text: "NU SPEELT · WOONKAMER", text_font: font_meta, text_color: 0x6B6E76, letter_space: 1 }
              # titel
              - label: { id: sp_title_lbl, text: "Midnight City", text_font: font_title, text_color: 0xFFFFFF, long_mode: DOT, width: 440 }
              # artiest
              - label: { id: sp_artist_lbl, text: "M83 · Hurry Up, We're Dreaming · 2011", text_font: font_meta, text_color: 0xC8C8CE, long_mode: DOT, width: 440 }
              # genre-chips (flex rij)
              - obj:
                  id: sp_chips
                  width: 440
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, pad_column: 8 }
                  widgets:
                    - label: { id: sp_chip0, text: "Synth-pop",  text_font: font_meta, text_color: 0xC8C8CE, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1, radius: 999, pad_top: 4, pad_bottom: 4, pad_left: 10, pad_right: 10 }
                    - label: { id: sp_chip1, text: "Electropop", text_font: font_meta, text_color: 0xC8C8CE, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1, radius: 999, pad_top: 4, pad_bottom: 4, pad_left: 10, pad_right: 10 }
                    - label: { id: sp_dur_chip, text: "3:38",    text_font: font_meta, text_color: 0xC8C8CE, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1, radius: 999, pad_top: 4, pad_bottom: 4, pad_left: 10, pad_right: 10 }
              # progress slider + tijdlabels
              - slider:
                  id: sp_progress
                  width: 440
                  height: 5
                  min_value: 0
                  max_value: 1000
                  value: 330
                  bg_color: 0x4D4D52
                  indicator: { bg_color: 0xFFFFFF, radius: 3 }
                  knob: { bg_color: 0xFFFFFF, pad_all: 5 }
                  on_release:
                    - homeassistant.action:
                        action: media_player.media_seek
                        data: { entity_id: media_player.spotify }   # >>> TODO
                        data_template: { seek_position: "{{ pos }}" }
                        variables:
                          pos: !lambda 'return (lv_slider_get_value(id(sp_progress)) / 1000.0) * id(sp_duration).state;'
              - obj:
                  width: 440
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label: { id: sp_pos_lbl, text: "1:14", text_font: font_meta, text_color: 0xC8C8CE, align: LEFT_MID }
                    - label: { id: sp_dur_lbl, text: "3:38", text_font: font_meta, text_color: 0xC8C8CE, align: RIGHT_MID }
              # transport rij
              - obj:
                  id: sp_transport
                  width: 440
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_main: SPACE_BETWEEN, flex_align_cross: CENTER }
                  widgets:
                    - button:
                        id: sp_shuffle_btn
                        width: 38
                        height: 38
                        radius: 19
                        bg_color: 0xFFFFFF
                        bg_opa: 12%
                        border_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.shuffle_set
                              data: { entity_id: media_player.spotify }   # >>> TODO
                              data_template: { shuffle: "{{ sh }}" }
                              variables: { sh: !lambda 'return id(sp_shuffle).state ? "false" : "true";' }
                        widgets:
                          - label: { id: sp_shuffle_lbl, text: "\U000F049D", text_font: font_sp_ctl, text_color: 0x9A9AA0, align: CENTER }
                    - button:
                        width: 38
                        height: 38
                        radius: 19
                        bg_color: 0xFFFFFF
                        bg_opa: 12%
                        border_width: 0
                        on_click:
                          - homeassistant.action: { action: media_player.media_previous_track, data: { entity_id: media_player.spotify } }   # >>> TODO
                        widgets:
                          - label: { text: "\U000F04AE", text_font: font_sp_ctl, text_color: 0xFFFFFF, align: CENTER }
                    - button:
                        id: sp_play_btn
                        width: 62
                        height: 62
                        radius: 31
                        bg_color: 0x4ADE80
                        border_width: 0
                        on_click:
                          - homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.spotify } }   # >>> TODO
                        widgets:
                          - label: { id: sp_play_lbl, text: "\U000F03E4", text_font: font_sp_ctl, text_color: 0x07140D, align: CENTER }
                    - button:
                        width: 38
                        height: 38
                        radius: 19
                        bg_color: 0xFFFFFF
                        bg_opa: 12%
                        border_width: 0
                        on_click:
                          - homeassistant.action: { action: media_player.media_next_track, data: { entity_id: media_player.spotify } }   # >>> TODO
                        widgets:
                          - label: { text: "\U000F04AD", text_font: font_sp_ctl, text_color: 0xFFFFFF, align: CENTER }
                    - button:
                        id: sp_repeat_btn
                        width: 38
                        height: 38
                        radius: 19
                        bg_color: 0xFFFFFF
                        bg_opa: 12%
                        border_width: 0
                        on_click:
                          - homeassistant.action:
                              action: media_player.repeat_set
                              data: { entity_id: media_player.spotify }   # >>> TODO
                              data_template: { repeat: "{{ rp }}" }
                              variables: { rp: !lambda 'return id(sp_repeat).state == std::string("off") ? "all" : "off";' }
                        widgets:
                          - label: { id: sp_repeat_lbl, text: "\U000F0456", text_font: font_sp_ctl, text_color: 0x9A9AA0, align: CENTER }
              # volume
              - obj:
                  width: 440
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 10 }
                  widgets:
                    - label: { text: "\U000F057E", text_font: font_sp_mini, text_color: 0xC8C8CE }
                    - slider:
                        id: sp_volume_sld
                        flex_grow: 1
                        height: 5
                        min_value: 0
                        max_value: 100
                        value: 62
                        bg_color: 0x4D4D52
                        indicator: { bg_color: 0xE6E6E6, radius: 3 }
                        knob: { bg_color: 0xFFFFFF, pad_all: 4 }
                        on_release:
                          - homeassistant.action:
                              action: media_player.volume_set
                              data: { entity_id: media_player.spotify }   # >>> TODO
                              data_template: { volume_level: "{{ v }}" }
                              variables: { v: !lambda 'return lv_slider_get_value(id(sp_volume_sld)) / 100.0;' }
                    - label: { id: sp_vol_lbl, text: "62", text_font: font_meta, text_color: 0xC8C8CE, width: 24 }
              # volgende track balk
              - obj:
                  id: sp_next_bar
                  width: 440
                  height: 52
                  bg_color: 0x131418
                  border_color: 0x1B1C21
                  border_width: 1
                  radius: 12
                  pad_left: 12
                  pad_right: 12
                  scrollbar_mode: 'OFF'
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 10 }
                  widgets:
                    - label: { text: "VOLGENDE", text_font: font_meta, text_color: 0x6B6E76, letter_space: 2 }
                    - obj: { width: 1, height: 20, bg_color: 0x1B1C21, border_width: 0 }
                    - obj: { id: sp_next_art, width: 32, height: 32, radius: 6, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1 }
                    - obj:
                        flex_grow: 1
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label: { id: sp_next_title_lbl, text: "Wait", text_font: font_label, text_color: 0xFFFFFF, align: TOP_LEFT, y: 4 }
                          - label: { id: sp_next_artist_lbl, text: "M83", text_font: font_meta, text_color: 0x6B6E76, align: BOTTOM_LEFT, y: -4 }
                    - label: { id: sp_next_dur_lbl, text: "4:22", text_font: font_meta, text_color: 0x6B6E76 }

        # tikzones navigatie
        - button: { x: 0, y: 46, width: 60, height: 380, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.previous: { animation: OVER_RIGHT, time: 250ms } ] }
        - button: { align: TOP_RIGHT, x: 0, y: 46, width: 60, height: 380, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.next: { animation: OVER_LEFT, time: 250ms } ] }


    # =========================================================================
    #  PAG 2 — SPOTIFY SONGTEKST
    #  Layout 800×480:
    #    TOPBAR (h=46): "SPOTIFY" | 6 dots (dot 1 actief) | klok
    #    BODY: flex ROW
    #      SIDEBAR (w=256): sp_art_sidebar (212×212) + titel + like-knop +
    #                       progress-bar + transport (compact, 46×46 play) + vol-slider
    #      CONTENT (w=544): scrollbare lyrics-container (overflow HIDDEN)
    #                       + fade-overlays top/bottom + "songtekst"-pill rechtsboven
    #
    #  LYRICS CONTAINER (id: lyr_scroll):
    #    Positie: x=256 y=46 width=544 height=434
    #    Overflow: HIDDEN (geen scrollbar zichtbaar)
    #    Kind-obj (id: lyr_inner, flex COLUMN, pad_row 0):
    #      13 labels (id: lyr0 … lyr12), height elk 52px, pad_left 36
    #      font_lyr (21px), color actief=0xFFFFFF, verleden=0x2A2B30, toekomst=0x3A3B40
    #      Actieve regel: scale 105% (lv_obj_set_style_transform_scale)
    #    refresh_lyrics scrollt lyr_inner met lv_obj_set_style_translate_y:
    #      offset = 217 - (lyr_active * 52 + 26)  (centeert actieve regel)
    #
    #  LYRIC TEKSTEN (hardcoded, zelfde als g7-spotify.jsx LYRICS array):
    #    0:"♪"  1:"Lichten over de snelweg, de stad ademt traag"
    #    2:"We rijden door de nacht, geen reden om te stoppen"
    #    3:"Jij draait het raampje open, de wind neemt het over"
    #    4:"En alles wat we zochten ligt hier voor ons"
    #    5:"Wakker, wakker — de morgen is van ons"
    #    6:"Wakker, wakker — we laten het maar gaan"
    #    7:"Neonlicht kleurt de hemel boven het asfalt"
    #    8:"Een kort moment dat eindeloos lijkt te duren"
    #    9:"Hou vast, hou vast, voor het straks weer verdwijnt"
    #   10:"Wakker, wakker — de morgen is van ons"
    #   11:"Wakker, wakker — we laten het maar gaan"
    #   12:"♪"
    #
    #  TIMESTAMPS voor lyr_active (uit g7-spotify.jsx LYRICS[].t):
    #    {0,12,22,32,42,53,63,74,85,96,107,118,130}
    #    refresh_lyrics vergelijkt sp_position.state met deze waarden (C++ array)
    # =========================================================================
    - id: spotify_lyrics_page
      bg_color: 0x08080A
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        # topbar (dot 1 actief)
        - obj:
            width: 800
            height: 46
            align: TOP_MID
            bg_color: 0x08080A
            bg_opa: COVER
            border_width: 1
            border_side: BOTTOM
            border_color: 0x131418
            pad_all: 0
            widgets:
              - label: { text: "SPOTIFY", text_font: font_brand, text_color: 0xFFFFFF, text_opa: 85%, align: LEFT_MID, x: 24 }
              - obj:
                  align: CENTER
                  width: 82
                  height: 10
                  bg_opa: TRANSP
                  border_width: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 6 }
                  widgets:
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 14, height: 6, radius: 3, bg_color: 0xFFFFFF, border_width: 0 }  # actief
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
              - label: { id: sp2_clock, text: "--:--", text_font: font_clock, text_color: 0x6B6E76, align: RIGHT_MID, x: -38 }
              - obj: { width: 7, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0, align: RIGHT_MID, x: -24 }

        # sidebar links (zelfde structuur als sp_left maar smaller, met compact transport)
        - obj:
            id: sp2_sidebar
            x: 0
            y: 46
            width: 256
            height: 434
            bg_color: 0x000000
            bg_opa: 45%
            border_color: 0x131418
            border_width: 1
            border_side: RIGHT
            pad_left: 20
            pad_right: 18
            pad_top: 18
            pad_bottom: 16
            scrollbar_mode: 'OFF'
            layout: { type: flex, flex_flow: COLUMN, pad_row: 0 }
            widgets:
              - image: { id: sp_art_sidebar, src: album_art, align: CENTER }
              - obj:
                  width: 100%
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label: { id: sp2_title_lbl, text: "Midnight City", text_font: font_label, text_color: 0xFFFFFF, long_mode: DOT, width: 172 }
                    - button:
                        id: sp_like_btn
                        align: RIGHT_MID
                        width: 32
                        height: 32
                        radius: 16
                        bg_opa: TRANSP
                        border_width: 0
                        on_click:
                          - lambda: 'id(sp_liked) = !id(sp_liked);'
                          - script.execute: refresh_spotify
                          # >>> TODO: koppel hier script.spotify_toggle_like of HA-actie
                        widgets:
                          - label: { id: sp_like_lbl, text: "\U000F02D1", text_font: font_sp_mini, text_color: 0x4ADE80, align: CENTER }
              - label: { id: sp2_artist_lbl, text: "M83", text_font: font_meta, text_color: 0x6B6E76, long_mode: DOT, width: 212 }
              # progress bar compact
              - slider:
                  id: sp2_progress
                  width: 212
                  height: 4
                  min_value: 0
                  max_value: 1000
                  value: 330
                  bg_color: 0x4D4D52
                  indicator: { bg_color: 0xFFFFFF, radius: 2 }
                  knob: { bg_color: 0xFFFFFF, pad_all: 4 }
                  on_release:
                    - homeassistant.action:
                        action: media_player.media_seek
                        data: { entity_id: media_player.spotify }   # >>> TODO
                        data_template: { seek_position: "{{ pos }}" }
                        variables: { pos: !lambda 'return (lv_slider_get_value(id(sp2_progress)) / 1000.0) * id(sp_duration).state;' }
              - obj:
                  width: 212
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label: { id: sp2_pos_lbl, text: "1:14", text_font: font_meta, text_color: 0x6B6E76, align: LEFT_MID }
                    - label: { id: sp2_dur_lbl, text: "3:38", text_font: font_meta, text_color: 0x6B6E76, align: RIGHT_MID }
              # compact transport
              - obj:
                  width: 212
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_main: SPACE_BETWEEN, flex_align_cross: CENTER }
                  widgets:
                    - button: { id: sp2_shuffle, width: 28, height: 28, radius: 14, bg_opa: TRANSP, border_width: 0, on_click: [ homeassistant.action: { action: media_player.shuffle_set, data: { entity_id: media_player.spotify }, data_template: { shuffle: "{{ sh }}" }, variables: { sh: !lambda 'return id(sp_shuffle).state ? "false" : "true";' } } ], widgets: [ { label: { id: sp2_shuf_lbl, text: "\U000F049D", text_font: font_sp_ctl, text_color: 0x9A9AA0, align: CENTER } } ] }
                    - button: { width: 28, height: 28, radius: 14, bg_opa: TRANSP, border_width: 0, on_click: [ homeassistant.action: { action: media_player.media_previous_track, data: { entity_id: media_player.spotify } } ], widgets: [ { label: { text: "\U000F04AE", text_font: font_sp_ctl, text_color: 0xFFFFFF, align: CENTER } } ] }
                    - button: { id: sp2_play_btn, width: 46, height: 46, radius: 23, bg_color: 0x4ADE80, border_width: 0, on_click: [ homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.spotify } } ], widgets: [ { label: { id: sp2_play_lbl, text: "\U000F03E4", text_font: font_sp_ctl, text_color: 0x07140D, align: CENTER } } ] }
                    - button: { width: 28, height: 28, radius: 14, bg_opa: TRANSP, border_width: 0, on_click: [ homeassistant.action: { action: media_player.media_next_track, data: { entity_id: media_player.spotify } } ], widgets: [ { label: { text: "\U000F04AD", text_font: font_sp_ctl, text_color: 0xFFFFFF, align: CENTER } } ] }
                    - button: { id: sp2_repeat_btn, width: 28, height: 28, radius: 14, bg_opa: TRANSP, border_width: 0, on_click: [ homeassistant.action: { action: media_player.repeat_set, data: { entity_id: media_player.spotify }, data_template: { repeat: "{{ rp }}" }, variables: { rp: !lambda 'return id(sp_repeat).state == std::string("off") ? "all" : "off";' } } ], widgets: [ { label: { id: sp2_rep_lbl, text: "\U000F0456", text_font: font_sp_ctl, text_color: 0x9A9AA0, align: CENTER } } ] }
              # volume compact
              - obj:
                  width: 212
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                  widgets:
                    - label: { text: "\U000F057E", text_font: font_sp_mini, text_color: 0xC8C8CE }
                    - slider:
                        id: sp2_volume_sld
                        flex_grow: 1
                        height: 4
                        min_value: 0
