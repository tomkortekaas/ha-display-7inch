                    - homeassistant.action:
                        action: light.turn_on
                        data: { entity_id: light.woonkamer }   # >>> TODO: alle actieve lampen
                        data_template: { color_temp_kelvin: "{{ ct }}" }
                        variables: { ct: !lambda 'return lv_slider_get_value(id(lamp_ct_sld));' }
              - label: { id: lamp_ct_lbl, text: "4000K", text_font: font_label, text_color: 0x6B6E76, width: 48 }
              # divider
              - obj: { width: 1, height: 30, bg_color: 0x131418, border_width: 0 }
              # 6 scène-knoppen
              - button: { id: scene_avond, width: 70, height: 50, radius: 12, bg_color: 0x2A1E0A, border_color: 0xF5B45A, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.avond } } ], widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0xF5B45A, border_width: 0 } }, { label: { text: "Avond", text_font: font_meta, text_color: 0xF5B45A } } ] } } ] }
              - button: { id: scene_werk,  width: 70, height: 50, radius: 12, bg_color: 0x0A1825, border_color: 0x78B4EB, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.werk } } ],  widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0x78B4EB, border_width: 0 } }, { label: { text: "Werk", text_font: font_meta, text_color: 0x78B4EB } } ] } } ] }
              - button: { id: scene_film,  width: 70, height: 50, radius: 12, bg_color: 0x180E25, border_color: 0x9678EB, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.film } } ],  widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0x9678EB, border_width: 0 } }, { label: { text: "Film", text_font: font_meta, text_color: 0x9678EB } } ] } } ] }
              - button: { id: scene_nacht, width: 70, height: 50, radius: 12, bg_color: 0x0A0E1C, border_color: 0x5A6EB4, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.nacht } } ], widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0x5A6EB4, border_width: 0 } }, { label: { text: "Nacht", text_font: font_meta, text_color: 0x5A6EB4 } } ] } } ] }
              - button: { id: scene_lees,  width: 70, height: 50, radius: 12, bg_color: 0x111C15, border_color: 0xAAEABB, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.lees } } ],  widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0xAAEABB, border_width: 0 } }, { label: { text: "Lees", text_font: font_meta, text_color: 0xAAEABB } } ] } } ] }
              - button: { id: scene_feest, width: 70, height: 50, radius: 12, bg_color: 0x25091A, border_color: 0xEB5A96, border_width: 1, on_click: [ homeassistant.action: { action: scene.turn_on, data: { entity_id: scene.feest } } ], widgets: [ { obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, layout: { type: flex, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 4 }, widgets: [ { obj: { width: 8, height: 8, radius: 4, bg_color: 0xEB5A96, border_width: 0 } }, { label: { text: "Feest", text_font: font_meta, text_color: 0xEB5A96 } } ] } } ] }

        # tikzones (laatste pagina → page.next wrapt naar eerste)
        - button: { x: 0, y: 46, width: 60, height: 340, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.previous: { animation: OVER_RIGHT, time: 250ms } ] }
        - button: { align: TOP_RIGHT, x: 0, y: 46, width: 60, height: 340, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.next: { animation: OVER_LEFT, time: 250ms } ] }


# =============================================================================
#  8.  SCRIPTS
#  Gebaseerd op de lambdas uit spotify.yaml §5 en weerscherm.yaml §5.
#  Klok + refresh_lights zijn nieuw; de helpers (glyph/accent/tcol/uvlab) zijn
#  identiek aan weerscherm.yaml refresh_weather.
# =============================================================================
script:

  # ── Klok (alle topbars) ────────────────────────────────────────────────
  - id: refresh_clock
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) return;
          char buf[16];
          snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
          lv_label_set_text(id(sp1_clock), buf);
          lv_label_set_text(id(sp2_clock), buf);
          lv_label_set_text(id(sp3_clock), buf);
          lv_label_set_text(id(imm_clock_lbl), buf);
          // wx_status: "di 3 jun · 14:32"
          static const char* dagen[7]={"zo","ma","di","wo","do","vr","za"};
          static const char* mnd[12]={"jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"};
          char wx[48];
          snprintf(wx, sizeof(wx), "%s %d %s \u00b7 %02d:%02d",
                   dagen[t.day_of_week-1], t.day_of_month, mnd[t.month-1],
                   t.hour, t.minute);
          lv_label_set_text(id(wx_status), wx);
          lv_label_set_text(id(lt_clock), buf);

  # ── Spotify (uit spotify.yaml refresh_spotify; uitgebreid met sidebar + pag2/3) ──
  - id: refresh_spotify
    then:
      - lambda: |-
          char buf[64];
          // tekst
          lv_label_set_text(id(sp_title_lbl),  id(sp_title).state.c_str());
          lv_label_set_text(id(sp2_title_lbl), id(sp_title).state.c_str());
          // >>> sp3_title_lbl: zelfde
          lv_label_set_text(id(sp_artist_lbl), id(sp_artist).state.c_str());
          lv_label_set_text(id(sp2_artist_lbl),id(sp_artist).state.c_str());
          if (!id(sp_device).state.empty()) {
            std::string ctx = "NU SPEELT \u00b7 " + id(sp_device).state;
            lv_label_set_text(id(sp_context_lbl), ctx.c_str());
          }
          // play/pause lbl (alle 3 schermen)
          bool playing = (id(sp_state).state == std::string("playing"));
          const char* play_g = playing ? "\U000F03E4" : "\U000F040A";
          lv_label_set_text(id(sp_play_lbl),  play_g);
          lv_label_set_text(id(sp2_play_lbl), play_g);
          // >>> sp3_play_lbl
          // voortgang → slider 0..1000 + tijdlabels
          float pos = id(sp_position).state, dur = id(sp_duration).state;
          if (dur < 1) dur = 1;
          int sv = (int)(pos / dur * 1000.0f); sv = sv<0?0:sv>1000?1000:sv;
          lv_slider_set_value(id(sp_progress),  sv, LV_ANIM_OFF);
          lv_slider_set_value(id(sp2_progress), sv, LV_ANIM_OFF);
          // >>> sp3_progress
          snprintf(buf, sizeof(buf), "%d:%02d", (int)pos/60, (int)pos%60);
          lv_label_set_text(id(sp_pos_lbl),  buf);
          lv_label_set_text(id(sp2_pos_lbl), buf);
          snprintf(buf, sizeof(buf), "%d:%02d", (int)dur/60, (int)dur%60);
          lv_label_set_text(id(sp_dur_lbl),  buf);
          lv_label_set_text(id(sp2_dur_lbl), buf);
          // volume
          int v = (int)(id(sp_volume).state * 100.0f);
          lv_slider_set_value(id(sp_volume_sld),  v, LV_ANIM_OFF);
          lv_slider_set_value(id(sp2_volume_sld), v, LV_ANIM_OFF);
          snprintf(buf, sizeof(buf), "%d", v);
          lv_label_set_text(id(sp_vol_lbl), buf);
          // shuffle kleur (groen=aan, grijs=uit)
          bool sh = id(sp_shuffle).state;
          lv_color_t scol = sh ? lv_color_hex(0x4ADE80) : lv_color_hex(0x9A9AA0);
          lv_obj_set_style_text_color(id(sp_shuffle_lbl),  scol, 0);
          lv_obj_set_style_text_color(id(sp2_shuf_lbl),    scol, 0);
          // repeat kleur
          bool rp = (id(sp_repeat).state != std::string("off"));
          lv_color_t rcol = rp ? lv_color_hex(0x4ADE80) : lv_color_hex(0x9A9AA0);
          lv_obj_set_style_text_color(id(sp_repeat_lbl),   rcol, 0);
          lv_obj_set_style_text_color(id(sp2_rep_lbl),     rcol, 0);
          // like-hart (groen=geliked)
          lv_label_set_text(id(sp_like_lbl), id(sp_liked) ? "\U000F02D1" : "\U000F02D5");
          lv_color_t lcol = id(sp_liked) ? lv_color_hex(0x4ADE80) : lv_color_hex(0x6B6E76);
          lv_obj_set_style_text_color(id(sp_like_lbl), lcol, 0);

  # ── Lyrics (elke seconde via time on_time) ──────────────────────────────
  - id: refresh_lyrics
    then:
      - lambda: |-
          static const int ts[13] = {0,12,22,32,42,53,63,74,85,96,107,118,130};
          float pos = id(sp_position).state;
          int act = 0;
          for (int i=0; i<13; i++) if (pos >= ts[i]) act = i;
          if (act == id(lyr_active)) return;
          id(lyr_active) = act;
          // Kleuren van alle 13 labels bijwerken
          lv_obj_t* lbls[13] = {
            id(lyr0),id(lyr1),id(lyr2),id(lyr3),id(lyr4),id(lyr5),id(lyr6),
            id(lyr7),id(lyr8),id(lyr9),id(lyr10),id(lyr11),id(lyr12)
          };
          for (int i=0; i<13; i++) {
            lv_color_t col;
            if      (i == act) col = lv_color_hex(0xFFFFFF);
            else if (i <  act) col = lv_color_hex(0x2A2B30);
            else               col = lv_color_hex(0x3A3B40);
            lv_obj_set_style_text_color(lbls[i], col, 0);
          }
          // Verticale positie: scrol lyr_inner zodat actieve regel gecentreerd staat
          // Container hoogte = 434px, regelHoogte = 52px, helft = 217
          int offset_y = 217 - (act * 52 + 26);
          lv_obj_set_style_translate_y(id(lyr_inner), offset_y, 0);
          lv_obj_mark_layout_as_dirty(id(lyr_inner));

  # ── Facts (elke 7s via time on_time) ────────────────────────────────────
  - id: refresh_facts
    then:
      - lambda: |-
          static const char* facts[4] = {
            "M83 is genoemd naar Messier 83 \u2014 een spiraalstelsel op 15 miljoen lichtjaar afstand.",
            "Achter M83 zit de Franse muzikant Anthony Gonzalez. Begonnen als duo, nu soloproject.",
            "'Midnight City' verscheen in 2011 op het dubbelalbum Hurry Up, We're Dreaming.",
            "Het nummer eindigt met een saxofoonsolo \u2014 ongewoon voor een synthpop-hit."
          };
          lv_label_set_text(id(fact_lbl), facts[id(fact_idx)]);
          // dots bijwerken
          lv_obj_t* dots[4] = { id(fact_dot_0), id(fact_dot_1), id(fact_dot_2), id(fact_dot_3) };
          for (int i=0; i<4; i++) {
            bool active = (i == id(fact_idx));
            lv_obj_set_width(dots[i], active ? 20 : 7);
            lv_obj_set_style_bg_color(dots[i], active ? lv_color_hex(0x4ADE80) : lv_color_hex(0x3A3B40), 0);
          }

  # ── Weer (identiek aan weerscherm.yaml refresh_weather; glyph/accent/tcol helpers) ──
  - id: refresh_weather
    then:
      - lambda: |-
          // ── helpers (zelfde als weerscherm.yaml §5) ──
          auto glyph = [](std::string c) -> std::string {
            if (c=="sunny"||c=="clear")          return "\U000F0599";
            if (c=="clear-night")                return "\U000F0594";
            if (c=="partlycloudy")               return "\U000F0595";
            if (c=="cloudy")                     return "\U000F0590";
            if (c=="rainy"||c=="snowy-rainy")    return "\U000F0597";
            if (c=="pouring")                    return "\U000F0596";
            if (c=="lightning"||c=="lightning-rainy") return "\U000F0593";
            if (c=="snowy")                      return "\U000F0598";
            if (c=="fog")                        return "\U000F0591";
            return "\U000F059D";
          };
          auto accent = [](std::string c) -> lv_color_t {
            if (c=="sunny"||c=="clear")          return lv_color_hex(0xF5B45A);
            if (c=="rainy"||c=="pouring")        return lv_color_hex(0x5A96EB);
            if (c=="lightning"||c=="lightning-rainy") return lv_color_hex(0x9678EB);
            if (c=="cloudy")                     return lv_color_hex(0x96AAC3);
            return lv_color_hex(0x78B4EB);
          };
          auto tcol = [](float t) -> lv_color_t {
            float x = (t + 5.0f) / 40.0f; if(x<0)x=0; if(x>1)x=1;
            uint8_t r=(uint8_t)(0x3A+x*(0xF5-0x3A));
            uint8_t g=(uint8_t)(0x78+x*(0x9E-0x78));
            uint8_t b=(uint8_t)(0xD2+x*(0x42-0xD2));
            return lv_color_make(r,g,b);
          };
          char buf[48];
          // HERO
          std::string cnow = id(ha_cond_now).state;
          lv_label_set_text(id(wx_icon), glyph(cnow).c_str());
          lv_obj_set_style_text_color(id(wx_icon), accent(cnow), 0);
          snprintf(buf,sizeof(buf),"%.0f\u00b0",id(ha_temp_now).state);
          lv_label_set_text(id(wx_temp),buf);
          snprintf(buf,sizeof(buf),"%.0f\u00b0C",id(ha_feels).state);
          lv_label_set_text(id(chip_feel),buf);
          snprintf(buf,sizeof(buf),"%.0f%%",id(ha_humidity).state);
          lv_label_set_text(id(chip_humi),buf);
          snprintf(buf,sizeof(buf),"%.0f km/h",id(ha_wind_now).state);
          lv_label_set_text(id(chip_wind),buf);
          float uv = id(ha_uv).state;
          const char* uvlab = uv<=2?"Laag":uv<=5?"Matig":uv<=7?"Hoog":"Zeer hoog";
          snprintf(buf,sizeof(buf),"%.0f \u00b7 %s",uv,uvlab);
          lv_label_set_text(id(chip_uv),buf);
          // 5-DAAGSE (zelfde logica als weerscherm.yaml)
          float los[5]={id(d0_lo).state,id(d1_lo).state,id(d2_lo).state,id(d3_lo).state,id(d4_lo).state};
          float his[5]={id(d0_hi).state,id(d1_hi).state,id(d2_hi).state,id(d3_hi).state,id(d4_hi).state};
          float wmin=los[0],wmax=his[0];
          for(int i=1;i<5;i++){if(los[i]<wmin)wmin=los[i];if(his[i]>wmax)wmax=his[i];}
          float span=(wmax-wmin);if(span<1)span=1;
          id(wk_tmin)=wmin;id(wk_tmax)=wmax;
          lv_obj_t* bars[5]={id(r0_bar),id(r1_bar),id(r2_bar),id(r3_bar),id(r4_bar)};
          lv_obj_t* icons[5]={id(r0_icon),id(r1_icon),id(r2_icon),id(r3_icon),id(r4_icon)};
          lv_obj_t* lo_l[5]={id(r0_lo),id(r1_lo),id(r2_lo),id(r3_lo),id(r4_lo)};
          lv_obj_t* hi_l[5]={id(r0_hi),id(r1_hi),id(r2_hi),id(r3_hi),id(r4_hi)};
          std::string conds[5]={id(d0_cond).state,id(d1_cond).state,id(d2_cond).state,id(d3_cond).state,id(d4_cond).state};
          for(int i=0;i<5;i++){
            int sv=(int)((los[i]-wmin)/span*100.0f);
            int vv=(int)((his[i]-wmin)/span*100.0f);
            if(vv<=sv)vv=sv+2;
            lv_bar_set_start_value(bars[i],sv,LV_ANIM_OFF);
            lv_bar_set_value(bars[i],vv,LV_ANIM_OFF);
            lv_obj_set_style_bg_color(bars[i],tcol(los[i]),LV_PART_INDICATOR);
            lv_obj_set_style_bg_grad_color(bars[i],tcol(his[i]),LV_PART_INDICATOR);
            lv_obj_set_style_bg_grad_dir(bars[i],LV_GRAD_DIR_HOR,LV_PART_INDICATOR);
            lv_label_set_text(icons[i],glyph(conds[i]).c_str());
            lv_obj_set_style_text_color(icons[i],accent(conds[i]),0);
            snprintf(buf,sizeof(buf),"%.0f\u00b0",los[i]);lv_label_set_text(lo_l[i],buf);
            snprintf(buf,sizeof(buf),"%.0f\u00b0",his[i]);lv_label_set_text(hi_l[i],buf);
          }

  # ── Lampen (gesynchroniseerd vanuit HA via lamp*_bri_ha + lamp*_state) ──
  - id: refresh_lights
    then:
      - lambda: |-
          // Helper: HA brightness (0-255) → segmenten (0-8)
          auto to_seg = [](float bri_ha, bool on) -> int {
            if (!on) return 0;
            return (int)(bri_ha / 255.0f * 8.0f + 0.5f);
          };
          struct LampData {
            int*     seg_g;
            float    bri_ha;
            bool     on;
            lv_obj_t* bulb;
            lv_obj_t* name;
            lv_obj_t* pct_lbl;
            lv_obj_t* segs[8];
          };
          LampData lamps[5] = {
            { &id(lamp0_seg), id(lamp0_bri_ha).state, id(lamp0_state).state=="on",
              id(lamp0_bulb), id(lamp0_name), id(lamp0_pct),
              { id(lamp0_seg0),id(lamp0_seg1),id(lamp0_seg2),id(lamp0_seg3),
                id(lamp0_seg4),id(lamp0_seg5),id(lamp0_seg6),id(lamp0_seg7) } },
            // >>> lamp1..lamp4: zelfde structuur wanneer alle kolommen gebouwd zijn
          };
          for (int i=0; i<1; i++) {   // >>> verander naar i<5 zodra alle kolommen bestaan
            auto& l = lamps[i];
            int seg = to_seg(l.bri_ha, l.on);
            *l.seg_g = seg;
            // bulb-icoon: aan = \U000F0335 amber / uit = \U000F0336 grijs
            lv_label_set_text(l.bulb, l.on ? "\U000F0335" : "\U000F0336");
            lv_color_t ic = l.on ? lv_color_hex(0xF5B45A) : lv_color_hex(0x6B6E76);
            lv_obj_set_style_text_color(l.bulb, ic, 0);
            lv_obj_set_style_text_color(l.name, ic, 0);
            // %-getal overlay
            char buf[8];
            snprintf(buf, sizeof(buf), "%d", (int)(seg * 100 / 8));
            lv_label_set_text(l.pct_lbl, buf);
            lv_obj_set_style_text_color(l.pct_lbl, l.on ? lv_color_hex(0xF5B45A) : lv_color_hex(0x1B1C21), 0);
            // segment-kleuren (amber met oplopende alpha; zelfde patroon als afzuigkap.yaml)
            for (int j=0; j<8; j++) {
              if (j < seg) {
                float alpha = 0.35f + (j / 7.0f) * 0.65f;
                uint8_t a = (uint8_t)(alpha * 255);
                // amber 0xF5B45A met alpha — blend op bg 0x131418
                uint8_t r = (uint8_t)(0x13 + a/255.0f * (0xF5-0x13));
                uint8_t g = (uint8_t)(0x14 + a/255.0f * (0xB4-0x14));
                uint8_t b = (uint8_t)(0x18 + a/255.0f * (0x5A-0x18));
                lv_obj_set_style_bg_color(l.segs[j], lv_color_make(r,g,b), 0);
              } else {
                lv_obj_set_style_bg_color(l.segs[j], lv_color_hex(0x1B1C21), 0);
              }
            }
          }
          // CT slider sync vanuit HA
          int ct = id(lamp_ct_k);
          lv_slider_set_value(id(lamp_ct_sld), ct, LV_ANIM_OFF);
          char ct_buf[8];
          snprintf(ct_buf, sizeof(ct_buf), "%dK", ct);
          lv_label_set_text(id(lamp_ct_lbl), ct_buf);

  # ── Lamp aanzetten via tap op segment ────────────────────────────────────
  - id: apply_lamp
    then:
      - lambda: |-
          // tap_lamp = kolomindex (0..4), tap_seg = gewenst segment (1..8)
          int lamp = id(tap_lamp);
          int seg  = id(tap_seg);
          float bri_pct = seg / 8.0f;   // 0.125 … 1.0
          // entity-array
          static const char* entities[5] = {
            "light.woonkamer",    // >>> TODO
            "light.slaapkamer",   // >>> TODO
            "light.keuken",       // >>> TODO
            "light.hal",          // >>> TODO
            "light.badkamer",     // >>> TODO
          };
          if (lamp < 0 || lamp > 4) return;
          // Zet helderheid via HA-actie
          // (directe homeassistant.action met data_template kan niet vanuit lambda;
          //  gebruik één van de opties hieronder)
          //
          // OPTIE A – via HA-script met input:
          //   homeassistant.action: script.zet_lamp_helderheid
          //   data: { lamp: entities[lamp], bri_pct: bri_pct }
          //
          // OPTIE B – aparte scripts per lamp (5×):
          //   if (lamp==0) { auto c=id(lamp0_light).turn_on(); c.set_brightness(bri_pct); c.perform(); }
          //
          // OPTIE C – fire-and-forget via HTTP naar HA-webhook
          //
          ESP_LOGI("lamp", "lamp %d -> seg %d (%.0f%%)", lamp, seg, bri_pct*100);


