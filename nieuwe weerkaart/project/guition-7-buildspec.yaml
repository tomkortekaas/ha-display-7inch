    # =========================================================================
    #  PAG 6 — LAMPEN VARIANT B: SEGMENT-KOLOMMEN  (800×480)
    #  (Gebaseerd op LightsHoodB uit g7-lights-hood.jsx + afzuigkap.yaml segment-patroon)
    #
    #  TOPBAR (h=46): "VERLICHTING" | 6 dots (dot 5 actief) | klok + status-stip
    #
    #  5 SEGMENT-KOLOMMEN (y=46, height=366):
    #    flex ROW, pad 14, gap 10  →  elke kolom = 146px breed
    #    Per kolom (lamp i, namen: Woonkamer/Slaapkamer/Keuken/Hal/Badkamer):
    #      KOPTEKST (flexShrink, h≈50):
    #        button id=lamp{i}_hdr: bg TRANSP, flex COL center, on_click → toggle_lamp(i)
    #          label id=lamp{i}_bulb: font_bulb, kleur 0xF5B45A (aan) / 0x6B6E76 (uit)
    #            glyph: aan → \U000F0335 (lightbulb), uit → \U000F0336 (lightbulb-outline)
    #          label id=lamp{i}_name: font_meta letter_space 2 UPPERCASE  kleur idem
    #      TUBE (flex_grow 1):
    #        bg 0x131418, border 0x1B1C21, radius 22, pad 10
    #        layout flex COL-REVERSE gap 5  (segment 0=onderaan)
    #        8× obj id=lamp{i}_seg{j}  (j=0 onderaan .. j=7 bovenaan):
    #          flex_grow 1, width 100%, radius 10, bg 0x1B1C21 (leeg) / 0xF5B45A met opa (vol)
    #          on_click: zet tap_lamp=i, tap_seg=j+1, script.execute: apply_lamp
    #        label id=lamp{i}_pct overlay: font_number (72px), align CENTER
    #          kleur aan=0xF5B45A / uit=0x1B1C21
    #
    #  ONDERSTRIP (h=68, border TOP 0x131418):
    #    flex ROW, pad 16, gap 14, align BOTTOM_MID
    #    CT-sectie:
    #      "KLEURTEMP"  label font_meta 0x6B6E76 letterspace 2
    #      slider id=lamp_ct_sld: width 160 height 8
    #        bg: linear gradient koel→warm (approximeer met bg_color 0x38BDF8 + bg_grad_color 0xF5B45A HOR)
    #        knob bg 0xFFFFFF, indicator transparant
    #        min=2500 max=6500 step 100
    #        on_release → homeassistant.action: light.turn_on entity_id=light.woonkamer
    #                      data_template: { color_temp_kelvin: "{{ ct }}" }
    #                      variables: { ct: !lambda return lv_slider_get_value(id(lamp_ct_sld)); }
    #      label id=lamp_ct_lbl: font_label 0x6B6E76  toont "{K}K"
    #    Divider (1px h=30)
    #    SCÈNES grid (6 knoppen, flex ROW gap 7):
    #      Scènes (naam · kleur · CT-Kelvin):
    #        Avond #F5B45A 2700K · Werk #78B4EB 6000K · Film #9678EB 2200K
    #        Nacht #5A6EB4 2000K · Lees #AAEABB 4000K · Feest #EB5A96 3000K
    #      Per knop id=scene_{id}:
    #        w=68 h=50, radius 12, bg color-mix(scenecolor 20%, 0x131418)
    #        border scenecolor opa 40%
    #        inner dot 8×8 (scenecolor) + naam label (font_meta)
    #        on_click: homeassistant.action: scene.turn_on entity_id=scene.{id}  >>> TODO
    #                  + lambda: id(lamp_ct_k) = {ct}; id(refresh_lights).execute();
    # =========================================================================
    - id: lights_page
      bg_color: 0x08080A
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        # topbar (dot 5 actief = laatste)
        - obj:
            id: lt_topbar
            width: 800
            height: 46
            align: TOP_MID
            bg_color: 0x08080A
            bg_opa: COVER
            border_width: 1
            border_side: BOTTOM
            border_color: 0x131418
            pad_all: 0
            widgets:
              - label: { text: "VERLICHTING", text_font: font_brand, text_color: 0xFFFFFF, text_opa: 85%, align: LEFT_MID, x: 24 }
              - obj:
                  id: lt_dots
                  align: CENTER
                  width: 82
                  height: 10
                  bg_opa: TRANSP
                  border_width: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 6 }
                  widgets:
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 14, height: 6, radius: 3, bg_color: 0xFFFFFF, border_width: 0 }  # actief
              - label: { id: lt_clock, text: "--:--", text_font: font_clock, text_color: 0x6B6E76, align: RIGHT_MID, x: -38 }
              - obj: { width: 7, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0, align: RIGHT_MID, x: -24 }

        # 5 segment-kolommen
        - obj:
            id: lt_cols
