                        indicator: { bg_color: 0xE6E6E6, radius: 2 }
                        knob: { bg_color: 0xFFFFFF, pad_all: 3 }
                        on_release:
                          - homeassistant.action: { action: media_player.volume_set, data: { entity_id: media_player.spotify }, data_template: { volume_level: "{{ v }}" }, variables: { v: !lambda 'return lv_slider_get_value(id(sp2_volume_sld)) / 100.0;' } }

        # lyrics container (overflow hidden, translateY gestuurd via refresh_lyrics)
        - obj:
            id: lyr_scroll
            x: 256
            y: 46
            width: 544
            height: 434
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            scrollbar_mode: 'OFF'
            # lyr_inner: verticale kolom van 13 labels; y-positie via lv_obj_set_style_translate_y
            widgets:
              - obj:
                  id: lyr_inner
                  width: 544
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: COLUMN, pad_row: 0 }
                  widgets:
                    - label: { id: lyr0,  text: "\u266A",                                             text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }
