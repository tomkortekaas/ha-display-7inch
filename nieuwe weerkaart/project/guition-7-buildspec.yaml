                          - obj: { id: lamp0_seg7, flex_grow: 1, width: 100%, radius: 8, bg_color: 0x1B1C21, border_width: 0, on_click: [ lambda: "id(tap_lamp)=0; id(tap_seg)=8;", script.execute: apply_lamp ] }
