        - obj: { x: 256, y: 408, width: 544, height: 72,  bg_color: 0x08080A, bg_grad_color: 0x08080A, bg_grad_dir: VER, bg_main_stop: 200, bg_grad_stop: 0, bg_opa: 90%, border_width: 0, radius: 0 }
