                    - label: { id: lyr9,  text: "Hou vast, hou vast, voor het straks weer verdwijnt",text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36, long_mode: DOT, width: 500 }
                    - label: { id: lyr10, text: "Wakker, wakker \u2014 de morgen is van ons",        text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }
                    - label: { id: lyr11, text: "Wakker, wakker \u2014 we laten het maar gaan",      text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }
                    - label: { id: lyr12, text: "\u266A",                                             text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }

