    # =========================================================================
    #  PAG 3 — SPOTIFY WIST JE DAT
    #  Layout 800×480:
    #    TOPBAR (h=46): "SPOTIFY" | 6 dots (dot 2 actief) | klok
    #    BODY: flex ROW
    #      SIDEBAR (w=256): zelfde als pag 2 — sp_art_sidebar + controls
    #                       (widget-IDs: sp3_* om conflict te vermijden)
    #      CONTENT (w=544): artiest-header + stats + divider + "WIST JE DAT?" +
    #                       fact-tekst + dots-indicator + album-strip
    #
    #  ARTIEST-HEADER:
    #    Artiest-avatar obj 56×56 (radius 28, bg 0x1B1C21, border, JetBrains Mono "foto")
    #    Naam-label: "M83"  font_heading (26px)
    #    Sub-label: "Synth-pop · Antibes, FR · 2001"  font_meta
    #    Stats (flex ROW, gap 16, margin-left auto):
    #      3× obj: getal (font_heading) + label (font_meta, letterspace 2)
    #      Getallen: "12.4M" / "847" / "#3"   Labels: "LUISTERAARS"/"NUMMERS"/"TREND NL"
    #
    #  FACT-TEKST (id: fact_lbl):
    #    font_subheading (17px), wit, lineheight 1.45, width 480
    #    Geroteerd via refresh_facts: 4 teksten (hardcoded in C++)
    #    Inhoud zelfde als g7-spotify.jsx FACTS array:
    #      0: "M83 is genoemd naar Messier 83 — een spiraalstelsel op 15 miljoen lichtjaar afstand."
    #      1: "Achter M83 zit de Franse muzikant Anthony Gonzalez. Begonnen als duo, nu soloproject."
    #      2: "'Midnight City' verscheen in 2011 op het dubbelalbum Hurry Up, We're Dreaming."
    #      3: "Het nummer eindigt met een saxofoonsolo — ongewoon voor een synthpop-hit."
    #
    #  FACT-DOTS (id: fact_dot_0..3): 4 obj, actief=width 20 bg 0x4ADE80, inactief=width 7 bg 0x3A3B40
    #  ALBUM-STRIP: 3 obj 44×44 radius 8 (bg 0x1B1C21) + label (9px)
    #    Titels: "Hurry Up…" / "Saturdays=Youth" / "Dead Cities…"
    # =========================================================================
    - id: spotify_facts_page
      bg_color: 0x08080A
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        # topbar (dot 2 actief)
        - obj:
            width: 800
            height: 46
            align: TOP_MID
            bg_color: 0x08080A
            bg_opa: COVER
            border_width: 1
            border_side: BOTTOM
            border_color: 0x131418
            pad_all: 0
            widgets:
              - label: { text: "SPOTIFY", text_font: font_brand, text_color: 0xFFFFFF, text_opa: 85%, align: LEFT_MID, x: 24 }
              - obj:
                  align: CENTER
                  width: 82
                  height: 10
                  bg_opa: TRANSP
                  border_width: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 6 }
                  widgets:
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 14, height: 6, radius: 3, bg_color: 0xFFFFFF, border_width: 0 }  # actief
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
              - label: { id: sp3_clock, text: "--:--", text_font: font_clock, text_color: 0x6B6E76, align: RIGHT_MID, x: -38 }
              - obj: { width: 7, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0, align: RIGHT_MID, x: -24 }

        # sidebar (zelfde layout als pag 2 — gebruik aparte widget-IDs sp3_*)
        # >>> Bouw op basis van sp2_sidebar maar met IDs: sp3_title_lbl, sp3_play_btn, sp3_progress, etc.
        - obj:
            id: sp3_sidebar
            x: 0
            y: 46
            width: 256
            height: 434
            bg_color: 0x000000
            bg_opa: 45%
            border_color: 0x131418
            border_width: 1
            border_side: RIGHT
            pad_left: 20
            pad_right: 18
            pad_top: 18
            pad_bottom: 16
            scrollbar_mode: 'OFF'
            # >>> TODO: zelfde widget-tree als sp2_sidebar maar met IDs sp3_*
            #           sp3_title_lbl, sp3_artist_lbl, sp3_progress (slider),
            #           sp3_pos_lbl, sp3_dur_lbl, sp3_play_btn, sp3_play_lbl,
            #           sp3_shuf_btn, sp3_rep_btn, sp3_volume_sld

        # content rechts
        - obj:
            id: sp3_content
            x: 256
            y: 46
            width: 544
            height: 434
            bg_opa: TRANSP
            border_width: 0
            pad_left: 24
            pad_right: 28
            pad_top: 20
            pad_bottom: 16
            scrollbar_mode: 'OFF'
            layout: { type: flex, flex_flow: COLUMN, pad_row: 0 }
            widgets:
              # artiest-header rij
              - obj:
                  width: 100%
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 14 }
                  widgets:
                    - obj: { id: sp3_avatar, width: 56, height: 56, radius: 28, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1 }
                    - obj:
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label: { text: "M83", text_font: font_heading, text_color: 0xFFFFFF }
                          - label: { text: "Synth-pop \u00b7 Antibes, FR \u00b7 2001", text_font: font_meta, text_color: 0x6B6E76, align: BOTTOM_LEFT }
                    - obj:
                        flex_grow: 1
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout: { type: flex, flex_flow: ROW, flex_align_main: END, pad_column: 16 }
                        widgets:
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { label: { text: "12.4M", text_font: font_heading, text_color: 0xFFFFFF, align: TOP_MID } }, { label: { text: "LUISTERAARS", text_font: font_meta, text_color: 0x6B6E76, letter_space: 1, align: BOTTOM_MID } } ] }
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { label: { text: "847",   text_font: font_heading, text_color: 0xFFFFFF, align: TOP_MID } }, { label: { text: "NUMMERS",    text_font: font_meta, text_color: 0x6B6E76, letter_space: 1, align: BOTTOM_MID } } ] }
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { label: { text: "#3",    text_font: font_heading, text_color: 0xFFFFFF, align: TOP_MID } }, { label: { text: "TREND NL",  text_font: font_meta, text_color: 0x6B6E76, letter_space: 1, align: BOTTOM_MID } } ] }
              # divider
              - obj: { width: 100%, height: 1, bg_color: 0x131418, border_width: 0 }
              # eyebrow
              - label: { text: "WIST JE DAT?", text_font: font_brand, text_color: 0x4ADE80, letter_space: 2 }
              # fact-tekst
              - label:
                  id: fact_lbl
                  text: "M83 is genoemd naar Messier 83 \u2014 een spiraalstelsel op 15 miljoen lichtjaar afstand."
                  text_font: font_subheading
                  text_color: 0xFFFFFF
                  long_mode: WRAP
                  width: 480
                  flex_grow: 1
              # fact-dots + album-strip (bottom)
              - obj:
                  width: 100%
                  height: LV_SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_main: SPACE_BETWEEN, flex_align_cross: CENTER }
                  widgets:
                    - obj:
                        id: fact_dots_container
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 7 }
                        widgets:
                          - obj: { id: fact_dot_0, width: 20, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0 }
                          - obj: { id: fact_dot_1, width: 7,  height: 7, radius: 4, bg_color: 0x3A3B40, border_width: 0 }
                          - obj: { id: fact_dot_2, width: 7,  height: 7, radius: 4, bg_color: 0x3A3B40, border_width: 0 }
                          - obj: { id: fact_dot_3, width: 7,  height: 7, radius: 4, bg_color: 0x3A3B40, border_width: 0 }
                    - obj:
                        id: album_strip
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                        widgets:
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { obj: { width: 44, height: 44, radius: 8, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1 } }, { label: { text: "Hurry Up\u2026",    text_font: font_meta, text_color: 0x6B6E76, long_mode: DOT, width: 44, align: BOTTOM_MID } } ] }
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { obj: { width: 44, height: 44, radius: 8, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1 } }, { label: { text: "Saturdays\u2026", text_font: font_meta, text_color: 0x6B6E76, long_mode: DOT, width: 44, align: BOTTOM_MID } } ] }
                          - obj: { bg_opa: TRANSP, border_width: 0, pad_all: 0, widgets: [ { obj: { width: 44, height: 44, radius: 8, bg_color: 0x1B1C21, border_color: 0x2A2B30, border_width: 1 } }, { label: { text: "Dead Cities\u2026", text_font: font_meta, text_color: 0x6B6E76, long_mode: DOT, width: 44, align: BOTTOM_MID } } ] }

        # tikzones
        - button: { x: 0, y: 46, width: 60, height: 380, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.previous: { animation: OVER_RIGHT, time: 250ms } ] }
        - button: { align: TOP_RIGHT, x: 0, y: 46, width: 60, height: 380, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.next: { animation: OVER_LEFT, time: 250ms } ] }


    # =========================================================================
    #  PAG 4 — IMMICH FULL-BLEED  (Variant A, 800×480)
    #  (Gebaseerd op ImmichFullbleedWide uit g7-immich.jsx)
    #
    #  Geen topbar — alle UI zit IN de foto-scrims.
    #
    #  FOTO:
    #    image widget id=immich_photo, src=immich_img, 800×480, align CENTER
    #
    #  SCRIM BOVEN (h=120, TOP_MID, y=0):
    #    bg 0x000000 bg_opa 60% → transparant (gradient via bg_grad_dir VER main_stop 200)
    #    Inhoud:
    #      "IMMICH"      LEFT x=30, y=22  font_brand 0xFFFFFF opa 90%
    #      sync-stip     obj 7×7 radius 4 bg 0x4ADE80  RIGHT x=-90 y=26
    #      "SYNCHROON"   label font_meta 0x6B6E76 RIGHT x=-100 y=26
    #      imm_clock_lbl RIGHT x=-30 y=22  font_clock 0x6B6E76
    #
    #  SCRIM ONDER (h=190, BOTTOM_MID, y=0):
    #    bg 0x000000 bg_opa 80% → transparant (gradient VER main_stop 0 stop 200)
    #    Inhoud:
    #      imm_place_lbl BOTTOM_LEFT x=30 y=-52  font_title (38px) 0xFFFFFF
    #      imm_date_lbl  BOTTOM_LEFT x=30 y=-26  font_label 0xC8C8CE
    #      imm_album_lbl BOTTOM_RIGHT x=-30 y=-26 font_meta 0x38BDF8
    #                    bg color-mix(0x38BDF8 16%), border 0x38BDF8 border_width 1 radius 999 pad 4 10
    #      5 segment-voortgangsbars:
    #        id imm_seg_0..4  BOTTOM_LEFT x=30+(n*80) y=-14  width 64 height 3
    #        radius 2 bg 0xFFFFFF opa 30% → actieve seg overwritten via refresh_immich (opa 100%)
    #        (alternatief: gebruik bar widgets ipv obj)
    #
    #  NAVIGATIE DOTS (6, dot 3 actief):
    #    align TOP_MID y=22  — dezelfde structuur als andere pagina's
    #    6 dots in flex ROW boven in de scrim, zodat ze leesbaar zijn over de foto
    #
    #  REFRESH:
    #    immich_url text_sensor → set_url + update (zie §5 text_sensor)
    #    immich_place / immich_date / immich_album → directe lvgl.label.update
    #    Geen aparte refresh_immich script nodig — alles via on_value callbacks
    # =========================================================================
    - id: immich_page
      bg_color: 0x000000
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        # foto full-bleed
        - image:
            id: immich_photo
            src: immich_img
            align: CENTER
            x: 0
            y: 0
        # scrim boven
        - obj:
            align: TOP_MID
            x: 0
            y: 0
            width: 800
            height: 120
            bg_color: 0x000000
            bg_grad_color: 0x000000
            bg_grad_dir: VER
            bg_main_stop: 200
            bg_grad_stop: 0
            bg_opa: 62%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollbar_mode: 'OFF'
            widgets:
              - label: { text: "IMMICH", text_font: font_brand, text_color: 0xFFFFFF, text_opa: 90%, align: TOP_LEFT, x: 30, y: 22 }
              # 6-dots (dot 3 actief)
              - obj:
                  align: TOP_MID
                  y: 22
                  width: 82
                  height: 10
                  bg_opa: TRANSP
                  border_width: 0
                  layout: { type: flex, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 6 }
                  widgets:
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 14, height: 6, radius: 3, bg_color: 0xFFFFFF, border_width: 0 }  # actief
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
                    - obj: { width: 6,  height: 6, radius: 3, bg_color: 0xFFFFFF, bg_opa: 22%, border_width: 0 }
              - label: { id: imm_clock_lbl, text: "--:--", text_font: font_clock, text_color: 0x6B6E76, align: TOP_RIGHT, x: -30, y: 22 }
              # sync stip
              - obj: { width: 7, height: 7, radius: 4, bg_color: 0x4ADE80, border_width: 0, align: TOP_RIGHT, x: -100, y: 26 }
              - label: { text: "SYNCHROON", text_font: font_meta, text_color: 0x6B6E76, letter_space: 1, align: TOP_RIGHT, x: -112, y: 26 }

        # scrim onder
        - obj:
            align: BOTTOM_MID
            x: 0
            y: 0
            width: 800
            height: 190
            bg_color: 0x000000
            bg_grad_color: 0x000000
            bg_grad_dir: VER
            bg_main_stop: 0
            bg_grad_stop: 200
            bg_opa: 80%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollbar_mode: 'OFF'
            widgets:
              - label: { id: imm_place_lbl, text: "\u2014", text_font: font_title, text_color: 0xFFFFFF, long_mode: DOT, width: 500, align: BOTTOM_LEFT, x: 30, y: -52 }
              - label: { id: imm_date_lbl,  text: "\u2014", text_font: font_label, text_color: 0xC8C8CE, align: BOTTOM_LEFT,  x: 30,  y: -26 }
              - label: { id: imm_album_lbl, text: "\u2014", text_font: font_meta,  text_color: 0x38BDF8, bg_color: 0x0A2A3A, border_color: 0x38BDF8, border_width: 1, radius: 999, pad_top: 4, pad_bottom: 4, pad_left: 10, pad_right: 10, align: BOTTOM_RIGHT, x: -30, y: -22 }
              # voortgangs-segmenten (5 stuks)
              - obj: { id: imm_seg_0, x: 30,  y: -14, align: BOTTOM_LEFT, width: 120, height: 3, radius: 2, bg_color: 0xFFFFFF, bg_opa: 100%, border_width: 0 }
              - obj: { id: imm_seg_1, x: 158, y: -14, align: BOTTOM_LEFT, width: 120, height: 3, radius: 2, bg_color: 0xFFFFFF, bg_opa: 25%,  border_width: 0 }
              - obj: { id: imm_seg_2, x: 286, y: -14, align: BOTTOM_LEFT, width: 120, height: 3, radius: 2, bg_color: 0xFFFFFF, bg_opa: 25%,  border_width: 0 }
              - obj: { id: imm_seg_3, x: 414, y: -14, align: BOTTOM_LEFT, width: 120, height: 3, radius: 2, bg_color: 0xFFFFFF, bg_opa: 25%,  border_width: 0 }
              - obj: { id: imm_seg_4, x: 542, y: -14, align: BOTTOM_LEFT, width: 120, height: 3, radius: 2, bg_color: 0xFFFFFF, bg_opa: 25%,  border_width: 0 }

        # tikzones
        - button: { x: 0, y: 60, width: 60, height: 360, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.previous: { animation: OVER_RIGHT, time: 250ms } ] }
        - button: { align: TOP_RIGHT, x: 0, y: 60, width: 60, height: 360, bg_opa: TRANSP, border_width: 0, shadow_width: 0, on_click: [ lvgl.page.next: { animation: OVER_LEFT, time: 250ms } ] }


    # =========================================================================
    #  PAG 5 — WEERSCHERM  (Variant "hero + uurstrip + 5-daagse", 800×480)
    #  (Gebaseerd op WeatherScreen uit g7-home.jsx + weerscherm.yaml)
    #
    #  TOPBAR (h=46):  "THUIS" | 6 dots (dot 4 actief) | "Maastricht · klok"
    #
    #  HERO-STRIP (h=104, border BOTTOM 0x131418):
    #    Weericoon (wx_icon): font_wx_big (64px), kleur via accent(), TOP_LEFT x=24 y=8
    #    Grote temp (wx_temp): font_number (72px), wit, TOP_LEFT x=108 y=0
    #    Conditie (wx_cond): font_subheading, wit, TOP_LEFT x=110 y=76
    #    Stat-chips (flex ROW gap 8, x=240 y=12):
    #      6 chips: WIND / VOCHTIG / GEVOELS / UV-INDEX / ZICHT / NEERSLAG
    #      bg 0x131418, border 0x1B1C21, radius 10, pad 5 10
    #      Elk chip: label boven (font_meta 0x6B6E76 letterspace 2) + waarde onder (font_label 0xFFFFFF)
    #
    #  UURSTRIP (h=66, border BOTTOM 0x131418):
    #    8 kolommen flex ROW, border RIGHT 0x0F0F12 per kolom
    #    Elk cel: uur-label (font_meta) + wx-icon (font_wx_small) + temp (font_label, kleur=temp_color())
    #    Actieve cel (Nu): bg 0x131418
    #    Uur-labels: Nu, 13h, 14h, 15h, 16h, 17h, 18h, 19h
    #    Widget-IDs: wx_h0_lbl…wx_h7_lbl, wx_h0_icon…wx_h7_icon, wx_h0_temp…wx_h7_temp
    #    Refresh via ha_temp_now on_value → refresh_weather
    #
    #  5-DAAGSE (flex COLUMN, flex 1, pad 6 28):
    #    5 rijen (id: r0..r4), zelfde structuur als weerscherm.yaml §4 fc_list:
    #      dagnaam · weericoon · lo-temp · RANGE-bar (temp-kleur) · hi-temp
