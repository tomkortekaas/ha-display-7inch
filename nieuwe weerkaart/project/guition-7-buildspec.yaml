                    - label: { id: lyr6,  text: "Wakker, wakker \u2014 we laten het maar gaan",      text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }
                    - label: { id: lyr7,  text: "Neonlicht kleurt de hemel boven het asfalt",        text_font: font_lyr, text_color: 0x3A3B40, height: 52, pad_left: 36 }
