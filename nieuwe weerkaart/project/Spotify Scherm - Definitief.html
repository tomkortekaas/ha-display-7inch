<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify Scherm — 4&quot; 480×480 · Ambient</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: oklch(0.74 0.16 152);
    --muted: oklch(0.62 0.012 250);
    --bg: #08080a;
    --surface-2: #1f2025;
  }
  body { margin: 0; }

  .scr { width: 480px; height: 480px; color: #fff; font-family: "Montserrat", sans-serif; box-sizing: border-box; overflow: hidden; position: relative; user-select: none; }

  /* full-bleed album-art (gradient placeholder + mono-tag, conform stijlgids) */
  .vc-bg { position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 11px),
      var(--g); }
  .ph-tag { position: absolute; left: 18px; top: 64px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .3px;
    color: rgba(255,255,255,.6); background: rgba(0,0,0,.32); padding: 3px 7px; border-radius: 6px; white-space: nowrap; }
  .vc-scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 24%, rgba(0,0,0,0) 38%, rgba(0,0,0,.9) 100%); }

  /* topbar pills */
  .vc-top { position: absolute; top: 24px; left: 26px; right: 26px; z-index: 2; display: flex; align-items: center; justify-content: space-between; }
  .vc-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; letter-spacing: .3px; color: #fff;
    background: rgba(0,0,0,.36); backdrop-filter: blur(8px); padding: 7px 12px; border-radius: 999px; }
  .vc-pill.ghost { color: rgba(255,255,255,.9); }
  .eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .eq i { width: 3px; height: 40%; background: var(--green); border-radius: 1px; }
  .eq[data-on="true"] i { animation: eq 900ms ease-in-out infinite; }
  .eq i:nth-child(2) { animation-delay: .2s; } .eq i:nth-child(3) { animation-delay: .4s; } .eq i:nth-child(4) { animation-delay: .1s; }
  @keyframes eq { 0%,100% { height: 30%; } 50% { height: 100%; } }

  /* bottom control surface */
  .vc-bottom { position: absolute; left: 26px; right: 26px; bottom: 24px; z-index: 2; }
  .vc-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; }
  .vc-meta { min-width: 0; }
  .vc-title { font-size: 33px; font-weight: 800; letter-spacing: -1px; line-height: 1.02; }
  .vc-artist { font-size: 15px; font-weight: 600; color: rgba(255,255,255,.78); margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vc-like { flex: none; border: none; background: transparent; cursor: pointer; padding: 4px; display: grid; place-items: center; }

  .prog { margin-top: 16px; }
  .prog-track { position: relative; height: 6px; border-radius: 3px; background: rgba(255,255,255,.22); cursor: pointer; }
  .prog-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: #fff; }
  .prog-knob { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .prog-times { display: flex; justify-content: space-between; margin-top: 9px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,.7); font-variant-numeric: tabular-nums; }

  .transport { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 14px; }
  .tbtn { width: 48px; height: 48px; border-radius: 50%; border: none; color: #fff; background: rgba(255,255,255,.12); backdrop-filter: blur(8px); cursor: pointer; display: grid; place-items: center; transition: background .15s, color .15s; }
  .tbtn:hover { background: rgba(255,255,255,.2); }
  .tbtn.act { color: var(--green); }
  .tplay { width: 66px; height: 66px; border-radius: 50%; border: none; background: var(--green); color: #07140d; cursor: pointer; display: grid; place-items: center;
    box-shadow: 0 10px 28px color-mix(in oklch, var(--green) 42%, transparent); transition: transform .12s; }
  .tplay:active { transform: scale(0.94); }

  .vol { display: flex; align-items: center; gap: 13px; margin-top: 16px; }
  .vol-ic { color: rgba(255,255,255,.8); display: flex; }
  .vol-track { position: relative; flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,.2); cursor: pointer; }
  .vol-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: rgba(255,255,255,.9); }
  .vol-knob { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .vol-pct { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.7); width: 26px; text-align: right; font-variant-numeric: tabular-nums; }

  html, body { height: 100%; background: #000; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden; }
  #screen-wrap { width: 480px; height: 480px; border-radius: 14px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,.6); transform-origin: center center; }
</style>
</head>
<body><div id="stage"><div id="screen-wrap"><div id="root"></div></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ic = { fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
function PlayIcon({ s = 28 }) { return (<svg width={s} height={s} viewBox="0 0 24 24"><path d="M7 4.5 L19 12 L7 19.5 Z" fill="currentColor" /></svg>); }
function PauseIcon({ s = 28 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.3" /><rect x="14" y="5" width="4" height="14" rx="1.3" /></svg>); }
function NextIcon({ s = 22 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M5 5 L15 12 L5 19 Z" /><rect x="16" y="5" width="3" height="14" rx="1.2" /></svg>); }
function PrevIcon({ s = 22 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M19 5 L9 12 L19 19 Z" /><rect x="5" y="5" width="3" height="14" rx="1.2" /></svg>); }
function ShuffleIcon({ s = 20 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M3 6 h4 l10 12 h4" /><path d="M3 18 h4 l3.5 -4.2" /><path d="M14.5 8.2 L17 6 h4" /><path d="M18.5 3.5 L21 6 L18.5 8.5" /><path d="M18.5 15.5 L21 18 L18.5 20.5" /></svg>); }
function RepeatIcon({ s = 20 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M6 7 h10 a3 3 0 0 1 3 3 v1" /><path d="M18 4.5 L20.5 7 L18 9.5" /><path d="M18 17 H8 a3 3 0 0 1 -3 -3 v-1" /><path d="M6 19.5 L3.5 17 L6 14.5" /></svg>); }
function VolIcon({ s = 22 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" {...ic}><path d="M4 9 h3 l4 -3.5 v13 l-4 -3.5 H4 Z" fill="currentColor" stroke="none" /><path d="M15.5 9 a4 4 0 0 1 0 6" /><path d="M18 6.5 a7.5 7.5 0 0 1 0 11" /></svg>); }
function DeviceIcon({ s = 15 }) { return (<svg width={s} height={s} viewBox="0 0 24 24" {...ic}><rect x="4" y="3" width="16" height="18" rx="3" /><circle cx="12" cy="15" r="3.2" /><circle cx="12" cy="7" r="1" fill="currentColor" /></svg>); }
function HeartIcon({ s = 22, fill = false }) { return (<svg width={s} height={s} viewBox="0 0 24 24" {...ic} fill={fill ? "currentColor" : "none"}><path d="M12 20 C12 20 4 14.5 4 8.8 A4.2 4.2 0 0 1 12 6.4 A4.2 4.2 0 0 1 20 8.8 C20 14.5 12 20 12 20 Z" /></svg>); }

const fmt = (sec) => { const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return m + ":" + String(s).padStart(2, "0"); };
const LS = "spotify_ambient_state";
const load = () => { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch (e) { return {}; } };

function SpotAmbient() {
  const saved = load();
  const total = 218;
  const [playing, setPlaying] = useState(saved.playing !== undefined ? saved.playing : true);
  const [pos, setPos] = useState(saved.pos != null ? saved.pos : 74);
  const [vol, setVol] = useState(saved.vol != null ? saved.vol : 0.62);
  const [shuffle, setShuffle] = useState(saved.shuffle !== undefined ? saved.shuffle : true);
  const [repeat, setRepeat] = useState(saved.repeat || false);
  const [liked, setLiked] = useState(saved.liked !== undefined ? saved.liked : true);
  const barRef = useRef(null), volRef = useRef(null);

  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => setPos((p) => (p >= total ? 0 : p + 1)), 1000);
    return () => clearInterval(t);
  }, [playing]);
  useEffect(() => {
    localStorage.setItem(LS, JSON.stringify({ playing, pos, vol, shuffle, repeat, liked }));
  }, [playing, pos, vol, shuffle, repeat, liked]);

  const seek = (e) => { const r = barRef.current.getBoundingClientRect(); setPos(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * total); };
  const setVolume = (e) => { const r = volRef.current.getBoundingClientRect(); setVol(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width))); };
  const pct = (pos / total) * 100;

  return (
    <div className="scr">
      <div className="vc-bg" style={{ "--g": "linear-gradient(160deg,oklch(0.58 0.15 285),oklch(0.42 0.13 255) 46%,#0a0b1a 92%)" }}>
        <span className="ph-tag">album art · full-bleed</span>
      </div>
      <div className="vc-scrim" />
      <div className="vc-top">
        <span className="vc-pill"><DeviceIcon /> Woonkamer</span>
        <span className="vc-pill ghost"><span className="eq" data-on={playing}><i /><i /><i /><i /></span> nu afgespeeld</span>
      </div>
      <div className="vc-bottom">
        <div className="vc-head">
          <div className="vc-meta">
            <div className="vc-title">Midnight City</div>
            <div className="vc-artist">M83 · Hurry Up, We're Dreaming</div>
          </div>
          <button className="vc-like" onClick={() => setLiked(!liked)} style={{ color: liked ? "var(--green)" : "#fff" }}>
            <HeartIcon fill={liked} />
          </button>
        </div>
        <div className="prog">
          <div className="prog-track" ref={barRef} onClick={seek}>
            <span className="prog-fill" style={{ width: pct + "%" }} />
            <span className="prog-knob" style={{ left: pct + "%" }} />
          </div>
          <div className="prog-times"><span>{fmt(pos)}</span><span>{fmt(total)}</span></div>
        </div>
        <div className="transport">
          <button className={"tbtn" + (shuffle ? " act" : "")} onClick={() => setShuffle(!shuffle)}><ShuffleIcon /></button>
          <button className="tbtn" onClick={() => setPos(0)}><PrevIcon /></button>
          <button className="tplay" onClick={() => setPlaying(!playing)}>{playing ? <PauseIcon /> : <PlayIcon />}</button>
          <button className="tbtn" onClick={() => setPos(0)}><NextIcon /></button>
          <button className={"tbtn" + (repeat ? " act" : "")} onClick={() => setRepeat(!repeat)}><RepeatIcon /></button>
        </div>
        <div className="vol">
          <span className="vol-ic"><VolIcon /></span>
          <div className="vol-track" ref={volRef} onClick={setVolume}>
            <span className="vol-fill" style={{ width: vol * 100 + "%" }} />
            <span className="vol-knob" style={{ left: vol * 100 + "%" }} />
          </div>
          <span className="vol-pct">{Math.round(vol * 100)}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SpotAmbient />);
function fit(){const pad=24;const s=Math.min((window.innerWidth-pad)/480,(window.innerHeight-pad)/480);document.getElementById("screen-wrap").style.transform="scale("+Math.max(0.2,s)+")";}
window.addEventListener("resize",fit);fit();
</script>
</body>
</html>
