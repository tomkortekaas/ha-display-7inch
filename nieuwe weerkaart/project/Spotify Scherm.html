<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify Scherm — 4&quot; 480×480 · 3 varianten</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: oklch(0.74 0.16 152);
    --muted: oklch(0.58 0.012 250);
    --bg: #08080a;
    --surface: #16171b;
    --surface-2: #1f2025;
    --line: rgba(255,255,255,0.08);
    --line2: rgba(255,255,255,0.16);
  }
  body { margin: 0; }

  /* ---- gedeelde 480×480 schermbasis ---- */
  .scr {
    width: 480px; height: 480px;
    color: #fff;
    font-family: "Montserrat", sans-serif;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
    user-select: none;
    border-radius: 22px;
  }

  /* topbar */
  .topbar { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; opacity: .88; }
  .status { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; letter-spacing: .5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* equalizer-animatie */
  .eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 13px; }
  .eq i { width: 3px; height: 40%; background: var(--green); border-radius: 1px; }
  .eq[data-on="true"] i { animation: eq 900ms ease-in-out infinite; }
  .eq i:nth-child(2) { animation-delay: .2s; } .eq i:nth-child(3) { animation-delay: .4s; } .eq i:nth-child(4) { animation-delay: .1s; }
  @keyframes eq { 0%,100% { height: 30%; } 50% { height: 100%; } }

  /* album-art placeholder */
  .cover { position: relative; overflow: hidden;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 2px, transparent 2px 10px),
      var(--g);
    box-shadow: 0 24px 60px rgba(0,0,0,.55), inset 0 0 0 1px var(--line); }
  .ph-tag { position: absolute; left: 10px; bottom: 9px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .3px;
    color: rgba(255,255,255,.62); background: rgba(0,0,0,.32); padding: 3px 7px; border-radius: 6px; }

  /* gedeelde titels */
  .va-title, .vb-title, .vc-title { font-weight: 800; letter-spacing: -1px; line-height: 1.04; text-wrap: balance; }

  /* gedeeld voortgangsbalkje */
  .prog-track { position: relative; height: 6px; border-radius: 3px; background: var(--surface-2); cursor: pointer; }
  .prog-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: var(--green); }
  .prog-knob { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .prog-times { display: flex; justify-content: space-between; margin-top: 9px; font-size: 12px; font-weight: 500; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* gedeelde transport */
  .transport { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .tbtn { width: 50px; height: 50px; border-radius: 50%; border: none; background: transparent; color: var(--muted); cursor: pointer; display: grid; place-items: center; transition: color .15s, background .15s; }
  .tbtn:hover { color: #fff; }
  .tbtn.big { color: #fff; }
  .tbtn.act { color: var(--green); }
  .tplay { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--green); color: #07140d; cursor: pointer; display: grid; place-items: center;
    box-shadow: 0 10px 28px color-mix(in oklch, var(--green) 42%, transparent); transition: transform .12s; }
  .tplay:active { transform: scale(0.94); }

  /* gedeelde volume */
  .vol { display: flex; align-items: center; gap: 14px; }
  .vol-ic { color: var(--muted); display: flex; }
  .vol-track { position: relative; flex: 1; height: 6px; border-radius: 3px; background: var(--surface-2); cursor: pointer; }
  .vol-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: rgba(255,255,255,.85); }
  .vol-knob { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .vol-pct { font-size: 13px; font-weight: 600; color: var(--muted); width: 26px; text-align: right; font-variant-numeric: tabular-nums; }

  /* ===== VARIANT A — COVER ===== */
  .va { background: radial-gradient(120% 90% at 50% -10%, #16171c 0%, var(--bg) 60%); padding: 26px 30px 24px; display: flex; flex-direction: column; }
  .va-cover { width: 178px; height: 178px; border-radius: 22px; margin: 20px auto 0; }
  .va-meta { text-align: center; margin-top: 18px; }
  .va-title { font-size: 30px; }
  .va-artist { font-size: 18px; font-weight: 600; color: #fff; opacity: .8; margin-top: 6px; }
  .va .prog { margin-top: auto; }
  .va-transport { margin-top: 18px; }

  /* ===== VARIANT B — COMPACT ===== */
  .vb { background: radial-gradient(130% 100% at 16% 26%, #141519 0%, var(--bg) 62%); padding: 26px 28px 22px; display: flex; flex-direction: column; }
  .vb-hero { display: flex; align-items: center; gap: 18px; margin-top: 24px; }
  .vb-cover { width: 116px; height: 116px; border-radius: 16px; flex: none; }
  .vb-info { min-width: 0; flex: 1; }
  .vb-title { font-size: 26px; }
  .vb-artist { font-size: 17px; font-weight: 600; color: #fff; opacity: .8; margin-top: 6px; }
  .vb-album { font-size: 13px; font-weight: 500; color: var(--muted); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vb-like { flex: none; align-self: flex-start; border: none; background: transparent; cursor: pointer; padding: 4px; display: grid; place-items: center; }
  .vb .prog { margin-top: 26px; }
  .vb-transport { margin-top: 22px; }
  .vb .vol { margin-top: auto; }

  /* ===== VARIANT C — AMBIENT ===== */
  .vc { padding: 0; }
  .vc-bg { position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 11px),
      var(--g); }
  .vc-bg .ph-tag { left: 18px; bottom: auto; top: 64px; white-space: nowrap; }
  .vc-scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 26%, rgba(0,0,0,0) 42%, rgba(0,0,0,.86) 100%); }
  .vc-top { position: absolute; top: 24px; left: 26px; right: 26px; z-index: 2; display: flex; align-items: center; justify-content: space-between; }
  .vc-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; letter-spacing: .3px; color: #fff;
    background: rgba(0,0,0,.34); backdrop-filter: blur(8px); padding: 7px 12px; border-radius: 999px; }
  .vc-pill.ghost { color: rgba(255,255,255,.9); }
  .vc-bottom { position: absolute; left: 26px; right: 26px; bottom: 26px; z-index: 2; }
  .vc-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; }
  .vc-meta { min-width: 0; }
  .vc-title { font-size: 33px; }
  .vc-artist { font-size: 15px; font-weight: 600; color: rgba(255,255,255,.78); margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vc-like { flex: none; border: none; background: transparent; cursor: pointer; padding: 4px; display: grid; place-items: center; }
  .vc-prog { margin-top: 18px; }
  .vc-prog .prog-track { background: rgba(255,255,255,.22); }
  .vc-prog .prog-fill { background: #fff; }
  .vc-prog .prog-times { color: rgba(255,255,255,.7); }
  .vc-transport { margin-top: 16px; gap: 14px; }
  .vc .tbtn { width: 48px; height: 48px; color: #fff; background: rgba(255,255,255,.12); backdrop-filter: blur(8px); }
  .vc .tbtn.act { color: var(--green); }
  .vc .tplay { width: 66px; height: 66px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  (function(){
    var SRC = "// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)\n\n/* BEGIN USAGE */\n// DesignCanvas.jsx — Figma-ish design canvas wrapper\n// Warm gray grid bg + Sections + Artboards + PostIt notes.\n// Exports (to window): DesignCanvas, DCSection, DCArtboard, DCPostIt.\n// Artboards are reorderable (grip-drag), deletable, labels/titles are\n// inline-editable, and any artboard can be opened in a fullscreen focus\n// overlay (←/→/Esc). State persists to a .design-canvas.state.json sidecar\n// via the host bridge. No assets, no deps.\n//\n// Usage:\n//   <DesignCanvas>\n//     <DCSection id=\"onboarding\" title=\"Onboarding\" subtitle=\"First-run variants\">\n//       <DCArtboard id=\"a\" label=\"A · Dusk\" width={260} height={480}>…<\/DCArtboard>\n//       <DCArtboard id=\"b\" label=\"B · Minimal\" width={260} height={480}>…<\/DCArtboard>\n//     <\/DCSection>\n//   <\/DesignCanvas>\n//\n// Artboards are static design frames, not scroll regions — never use\n// height: 100% + overflow: auto/scroll on inner elements; size each artboard\n// to fit its content (explicit pixel height, or let it grow).\n/* END USAGE */\n\nconst DC = {\n  bg: '#f0eee9',\n  grid: 'rgba(0,0,0,0.06)',\n  label: 'rgba(60,50,40,0.7)',\n  title: 'rgba(40,30,20,0.85)',\n  subtitle: 'rgba(60,50,40,0.6)',\n  postitBg: '#fef4a8',\n  postitText: '#5a4a2a',\n  font: '-apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif',\n};\n\n// One-time CSS injection (classes are dc-prefixed so they don't collide with\n// the hosted design's own styles).\nif (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {\n  const s = document.createElement('style');\n  s.id = 'dc-styles';\n  s.textContent = [\n    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',\n    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',\n    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',\n    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',\n    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',\n    // isolation:isolate contains artboard content's z-indexes so a\n    // z-indexed child (sticky navbar etc.) can't paint over .dc-header or\n    // the .dc-menu popover that drops into the top of the card.\n    '.dc-card{isolation:isolate;transition:box-shadow .15s,transform .15s}',\n    '.dc-card *{scrollbar-width:none}',\n    '.dc-card *::-webkit-scrollbar{display:none}',\n    // Per-artboard header: grip + label on the left, delete/expand on the\n    // right. Single flex row; when the artboard's on-screen width is too\n    // narrow for both the label yields (ellipsis, then hidden entirely below\n    // ~4ch via the container query) and the buttons stay on the row.\n    '.dc-header{position:absolute;bottom:100%;left:-4px;margin-bottom:calc(4px * var(--dc-inv-zoom,1));z-index:2;',\n    '  display:flex;align-items:center;container-type:inline-size}',\n    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px;flex:1 1 auto;min-width:0}',\n    '.dc-grip{flex:0 0 auto;cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s,opacity .12s}',\n    '.dc-grip:hover{background:rgba(0,0,0,.08)}',\n    '.dc-grip:active{cursor:grabbing}',\n    '.dc-labeltext{flex:1 1 auto;min-width:0;cursor:pointer;border-radius:4px;padding:3px 6px;',\n    '  display:flex;align-items:center;transition:background .12s;overflow:hidden}',\n    // Below ~4ch of label room: hide the label entirely, and drop the grip to\n    // hover-only (same reveal rule as .dc-btns) so a narrow header is clean\n    // until the card is moused.\n    '@container (max-width: 110px){',\n    '  .dc-labeltext{display:none}',\n    '  .dc-grip{opacity:0}',\n    '  [data-dc-slot]:hover .dc-grip{opacity:1}',\n    '}',\n    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',\n    '.dc-labeltext .dc-editable{overflow:hidden;text-overflow:ellipsis;max-width:100%}',\n    '.dc-labeltext .dc-editable:focus{overflow:visible;text-overflow:clip}',\n    '.dc-btns{flex:0 0 auto;margin-left:auto;display:flex;gap:2px;opacity:0;transition:opacity .12s}',\n    '[data-dc-slot]:hover .dc-btns,.dc-btns:has(.dc-menu){opacity:1}',\n    '.dc-expand,.dc-kebab{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',\n    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center;',\n    '  font:inherit;transition:background .12s,color .12s}',\n    '.dc-expand:hover,.dc-kebab:hover{background:rgba(0,0,0,.06);color:#2a251f}',\n    // Slot hosting an open menu floats above later siblings (which otherwise\n    // paint on top — same z-index:auto, later DOM order) so the popup isn't\n    // clipped by the next card.\n    '[data-dc-slot]:has(.dc-menu){z-index:10}',\n    '.dc-menu{position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border-radius:8px;',\n    '  box-shadow:0 8px 28px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);padding:4px;min-width:160px;z-index:10}',\n    '.dc-menu button{display:block;width:100%;padding:7px 10px;border:0;background:transparent;',\n    '  border-radius:5px;font-family:inherit;font-size:13px;font-weight:500;line-height:1.2;',\n    '  color:#29261b;cursor:pointer;text-align:left;transition:background .12s;white-space:nowrap}',\n    '.dc-menu button:hover{background:rgba(0,0,0,.05)}',\n    '.dc-menu hr{border:0;border-top:1px solid rgba(0,0,0,.08);margin:4px 2px}',\n    '.dc-menu .dc-danger{color:#c96442}',\n    '.dc-menu .dc-danger:hover{background:rgba(201,100,66,.1)}',\n    // Chrome (titles / labels / buttons) counter-scales against the viewport\n    // zoom so it stays a constant on-screen size. --dc-inv-zoom is set by\n    // DCViewport on every transform update and inherits to all descendants —\n    // any overlay inside the world (e.g. a TweaksPanel on an artboard) can use\n    // it the same way.\n    //\n    // The header uses transform:scale (out-of-flow, so layout impact doesn't\n    // matter) with its world-space width set to card-width / inv-zoom so that\n    // after counter-scaling its on-screen width exactly matches the card's —\n    // that's what lets the container query + text-overflow behave against the\n    // card's visible edge at every zoom level.\n    //\n    // The section head uses CSS zoom instead of transform so its layout box\n    // grows with the counter-scale, pushing the card row down — otherwise the\n    // constant-screen-size title would overflow into the (shrinking) world-\n    // space gap and overlap the artboard headers at low zoom.\n    '.dc-header{width:calc((100% + 4px) / var(--dc-inv-zoom,1));',\n    '  transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom left}',\n    '.dc-sectionhead{zoom:var(--dc-inv-zoom,1)}',\n  ].join('\\n');\n  document.head.appendChild(s);\n}\n\nconst DCCtx = React.createContext(null);\n\n// Recursively unwrap React.Fragment so <>…<\/> grouping doesn't hide\n// DCSection/DCArtboard children from the type-based walks below.\nfunction dcFlatten(children) {\n  const out = [];\n  React.Children.forEach(children, (c) => {\n    if (c && c.type === React.Fragment) out.push(...dcFlatten(c.props.children));\n    else out.push(c);\n  });\n  return out;\n}\n\n// ─────────────────────────────────────────────────────────────\n// DesignCanvas — stateful wrapper around the pan/zoom viewport.\n// Owns runtime state (per-section order, renamed titles/labels, hidden\n// artboards, focused artboard). Order/titles/labels/hidden persist to a\n// .design-canvas.state.json\n// sidecar next to the HTML. Reads go via plain fetch() so the saved\n// arrangement is visible anywhere the HTML + sidecar are served together\n// (omelette preview, direct link, downloaded zip). Writes go through the\n// host's window.omelette bridge — editing requires the omelette runtime.\n// Focus is ephemeral.\n// ─────────────────────────────────────────────────────────────\nconst DC_STATE_FILE = '.design-canvas.state.json';\n\nfunction DesignCanvas({ children, minScale, maxScale, style }) {\n  const [state, setState] = React.useState({ sections: {}, focus: null });\n  // Hold rendering until the sidecar read settles so the saved order/titles\n  // appear on first paint (no source-order flash). didRead gates writes until\n  // the read settles so the empty initial state can't clobber a slow read;\n  // skipNextWrite suppresses the one echo-write that would otherwise follow\n  // hydration.\n  const [ready, setReady] = React.useState(false);\n  const didRead = React.useRef(false);\n  const skipNextWrite = React.useRef(false);\n\n  React.useEffect(() => {\n    let off = false;\n    fetch('./' + DC_STATE_FILE)\n      .then((r) => (r.ok ? r.json() : null))\n      .then((saved) => {\n        if (off || !saved || !saved.sections) return;\n        skipNextWrite.current = true;\n        setState((s) => ({ ...s, sections: saved.sections }));\n      })\n      .catch(() => {})\n      .finally(() => { didRead.current = true; if (!off) setReady(true); });\n    const t = setTimeout(() => { if (!off) setReady(true); }, 150);\n    return () => { off = true; clearTimeout(t); };\n  }, []);\n\n  React.useEffect(() => {\n    if (!didRead.current) return;\n    if (skipNextWrite.current) { skipNextWrite.current = false; return; }\n    const t = setTimeout(() => {\n      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});\n    }, 250);\n    return () => clearTimeout(t);\n  }, [state.sections]);\n\n  // Build registries synchronously from children so FocusOverlay can read\n  // them in the same render. Fragments are flattened; wrapping in other\n  // elements still opts out of focus/reorder.\n  const registry = {};     // slotId -> { sectionId, artboard }\n  const sectionMeta = der (gestreepte gradient + mono-tag, conform stijlgids) */\nfunction Cover({ className, g, tag = \"album art\" }) {\n  return (\n    <div className={\"cover \" + className} style={{ \"--g\": g }}>\n      <span className=\"ph-tag\">{tag}<\/span>\n    <\/div>\n  );\n}\n\nconst Eq = ({ on }) => (\n  <span className=\"eq\" data-on={on}><i /><i /><i /><i /><\/span>\n);\n\nfunction Topbar({ playing, place = \"KEUKEN\", time = \"14:32\" }) {\n  return (\n    <div className=\"topbar\">\n      <span className=\"brand\"><Eq on={playing} /> {place}<\/span>\n      <span className=\"status\"><i className=\"dot\" /> {time}<\/span>\n    <\/div>\n  );\n}\n\n/* gedeeld voortgangsbalkje */\nfunction Progress({ p }) {\n  const pct = (p.pos / p.total) * 100;\n  return (\n    <div className=\"prog\">\n      <div className=\"prog-track\" ref={p.barRef} onClick={p.seek}>\n        <span className=\"prog-fill\" style={{ width: pct + \"%\" }} />\n        <span className=\"prog-knob\" style={{ left: pct + \"%\" }} />\n      <\/div>\n      <div className=\"prog-times\"><span>{fmt(p.pos)}<\/span><span>-{fmt(p.total - p.pos)}<\/span><\/div>\n    <\/div>\n  );\n}\n\n/* ===================================================================== */\n/* VARIANT A — COVER (album-forward, gecentreerd)                        */\n/* ===================================================================== */\nfunction SpotCover() {\n  const p = usePlayer();\n  return (\n    <div className=\"scr va\">\n      <Topbar playing={p.playing} />\n      <Cover className=\"va-cover\" g=\"linear-gradient(145deg,#2a8f5a,#11633a 52%,#0c2b1e)\" />\n      <div className=\"va-meta\">\n        <div className=\"va-title\">Midnight City<\/div>\n        <div className=\"va-artist\">M83<\/div>\n      <\/div>\n      <Progress p={p} />\n      <div className=\"transport va-transport\">\n        <button className={\"tbtn\" + (p.shuffle ? \" act\" : \"\")} onClick={() => p.setShuffle(!p.shuffle)}><ShuffleIcon /><\/button>\n        <button className=\"tbtn big\"><PrevIcon /><\/button>\n        <button className=\"tplay\" onClick={() => p.setPlaying(!p.playing)}>{p.playing ? <PauseIcon /> : <PlayIcon />}<\/button>\n        <button className=\"tbtn big\"><NextIcon /><\/button>\n        <button className={\"tbtn\" + (p.repeat ? \" act\" : \"\")} onClick={() => p.setRepeat(!p.repeat)}><RepeatIcon /><\/button>\n      <\/div>\n    <\/div>\n  );\n}\n\n/* ===================================================================== */\n/* VARIANT B — COMPACT (alles bedienbaar: hero-rij + volume)             */\n/* ===================================================================== */\nfunction SpotCompact() {\n  const p = usePlayer();\n  return (\n    <div className=\"scr vb\">\n      <Topbar playing={p.playing} />\n      <div className=\"vb-hero\">\n        <Cover className=\"vb-cover\" g=\"linear-gradient(150deg,oklch(0.62 0.15 30),oklch(0.42 0.13 18) 55%,#2a1013)\" />\n        <div className=\"vb-info\">\n          <div className=\"vb-title\">Midnight City<\/div>\n          <div className=\"vb-artist\">M83<\/div>\n          <div className=\"vb-album\">Hurry Up, We're Dreaming<\/div>\n        <\/div>\n        <button className=\"vb-like\" onClick={() => p.setLiked(!p.liked)} style={{ color: p.liked ? \"var(--green)\" : \"var(--muted)\" }}>\n          <HeartIcon fill={p.liked} />\n        <\/button>\n      <\/div>\n      <Progress p={p} />\n      <div className=\"transport vb-transport\">\n        <button className={\"tbtn\" + (p.shuffle ? \" act\" : \"\")} onClick={() => p.setShuffle(!p.shuffle)}><ShuffleIcon /><\/button>\n        <button className=\"tbtn big\"><PrevIcon /><\/button>\n        <button className=\"tplay\" onClick={() => p.setPlaying(!p.playing)}>{p.playing ? <PauseIcon /> : <PlayIcon />}<\/button>\n        <button className=\"tbtn big\"><NextIcon /><\/button>\n        <button className={\"tbtn\" + (p.repeat ? \" act\" : \"\")} onClick={() => p.setRepeat(!p.repeat)}><RepeatIcon /><\/button>\n      <\/div>\n      <div className=\"vol\">\n        <span className=\"vol-ic\"><VolIcon /><\/span>\n        <div className=\"vol-track\" ref={p.volRef} onClick={p.setVolume}>\n          <span className=\"vol-fill\" style={{ width: p.vol * 100 + \"%\" }} />\n          <span className=\"vol-knob\" style={{ left: p.vol * 100 + \"%\" }} />\n        <\/div>\n        <span className=\"vol-pct\">{Math.round(p.vol * 100)}<\/span>\n      <\/div>\n    <\/div>\n  );\n}\n\n/* ===================================================================== */\n/* VARIANT C — AMBIENT (full-bleed cover + frosted bediening)            */\n/* ===================================================================== */\nfunction SpotAmbient() {\n  const p = usePlayer();\n  const pct = (p.pos / p.total) * 100;\n  return (\n    <div className=\"scr vc\">\n      <div className=\"vc-bg\" style={{ \"--g\": \"linear-gradient(160deg,oklch(0.58 0.15 285),oklch(0.42 0.13 255) 46%,#0a0b1a 92%)\" }}>\n        <span className=\"ph-tag\">album art<\/span>\n      <\/div>\n      <div className=\"vc-scrim\" />\n      <div className=\"vc-top\">\n        <span className=\"vc-pill\"><DeviceIcon /> Woonkamer<\/span>\n        <span className=\"vc-pill ghost\"><Eq on={p.playing} /> nu afgespeeld<\/span>\n      <\/div>\n      <div className=\"vc-bottom\">\n        <div className=\"vc-head\">\n          <div className=\"vc-meta\">\n            <div className=\"vc-title\">Midnight City<\/div>\n            <div className=\"vc-artist\">M83 · Hurry Up, We're Dreaming<\/div>\n          <\/div>\n          <button className=\"vc-like\" onClick={() => p.setLiked(!p.liked)} style={{ color: p.liked ? \"var(--green)\" : \"#fff\" }}>\n            <HeartIcon fill={p.liked} s={22} />\n          <\/button>\n        <\/div>\n        <div className=\"prog vc-prog\">\n          <div className=\"prog-track\" ref={p.barRef} onClick={p.seek}>\n            <span className=\"prog-fill\" style={{ width: pct + \"%\" }} />\n            <span className=\"prog-knob\" style={{ left: pct + \"%\" }} />\n          <\/div>\n          <div className=\"prog-times\"><span>{fmt(p.pos)}<\/span><span>{fmt(p.total)}<\/span><\/div>\n        <\/div>\n        <div className=\"transport vc-transport\">\n          <button className={\"tbtn\" + (p.shuffle ? \" act\" : \"\")} onClick={() => p.setShuffle(!p.shuffle)}><ShuffleIcon /><\/button>\n          <button className=\"tbtn\"><PrevIcon /><\/button>\n          <button className=\"tplay\" onClick={() => p.setPlaying(!p.playing)}>{p.playing ? <PauseIcon /> : <PlayIcon />}<\/button>\n          <button className=\"tbtn\"><NextIcon /><\/button>\n          <button className={\"tbtn\" + (p.repeat ? \" act\" : \"\")} onClick={() => p.setRepeat(!p.repeat)}><RepeatIcon /><\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  );\n}\n\nObject.assign(window, { SpotCover, SpotCompact, SpotAmbient });\n\n\n\n/* ===== app ===== */\nfunction App() {\n  return (\n    <DesignCanvas>\n      <DCSection id=\"spotify4\" title={'Spotify \\u2014 4\\u2033 480\\u00d7480 \\u00b7 drie varianten'} subtitle={'Zelfde huisdisplay-stijl \\u00b7 groen muziek-accent \\u00b7 tikbaar: play/pause, voortgang, volume, like'}>\n        <DCArtboard id=\"cover\" label={'A \\u00b7 Cover (album-forward)'} width={480} height={480}><SpotCover /><\/DCArtboard>\n        <DCArtboard id=\"compact\" label={'B \\u00b7 Compact (volledig bedienbaar)'} width={480} height={480}><SpotCompact /><\/DCArtboard>\n        <DCArtboard id=\"ambient\" label={'C \\u00b7 Ambient (full-bleed)'} width={480} height={480}><SpotAmbient /><\/DCArtboard>\n      <\/DCSection>\n    <\/DesignCanvas>\n  );\n}\nReactDOM.createRoot(document.getElementById(\"root\")).render(<App />);\n";
