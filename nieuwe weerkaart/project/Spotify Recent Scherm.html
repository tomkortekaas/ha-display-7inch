<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify — Recent · 4" 480×480</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: oklch(0.74 0.16 152);
    --muted: oklch(0.62 0.012 250);
    --bg: #08080a;
    --surface: #131418;
    --surface-2: #1b1c21;
    --line: rgba(255,255,255,0.07);
    --line2: rgba(255,255,255,0.13);
  }
  body { margin: 0; }

  .scr {
    width: 480px; height: 480px;
    background: radial-gradient(120% 90% at 50% -10%, #16171c 0%, var(--bg) 60%);
    color: #fff;
    font-family: "Montserrat", sans-serif;
    display: flex; flex-direction: column;
    box-sizing: border-box;
    padding: 26px 28px 22px;
    user-select: none;
    overflow: hidden;
  }

  /* topbar */
  .topbar { display: flex; align-items: center; justify-content: space-between; }
  .brand  { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #fff; opacity: .85; }
  .info-btn {
    width: 27px; height: 27px; border-radius: 50%;
    background: var(--green); border: none; cursor: pointer;
    display: grid; place-items: center; flex: none;
    box-shadow: 0 0 10px oklch(0.74 0.16 152 / .5);
    transition: transform .14s;
  }
  .info-btn:active { transform: scale(0.92); }

  /* section label */
  .sect-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
    color: var(--muted); margin: 16px 0 10px;
  }

  /* recent card */
  .recent-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    overflow: hidden;
  }
  .recent-row {
    display: flex; align-items: center; gap: 13px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background .15s;
  }
  .recent-row:active { background: var(--surface-2); }
  .recent-row + .recent-row { border-top: 1px solid var(--line); }

  /* art thumbnail */
  .recent-art {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface-2);
    border: 1px solid var(--line2);
    flex: none;
    display: flex; align-items: center; justify-content: center;
  }
  .recent-art.playing { background: oklch(0.18 0.05 152); border-color: oklch(0.36 0.10 152 / .5); }

  /* eq animation */
  @keyframes eq-pulse { 0%,100% { height: 30%; } 50% { height: 100%; } }
  .eq-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 16px; }
  .eq-bar  { width: 3px; background: var(--green); border-radius: 1px; animation: eq-pulse 900ms ease-in-out infinite; }

  /* meta */
  .recent-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .recent-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-sub  { font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-row.playing .recent-name { color: var(--green); }

  .recent-time      { font-size: 12px; font-weight: 600; color: var(--muted); flex: none; }
  .recent-time.now  { color: var(--green); font-size: 11px; font-weight: 700; letter-spacing: .3px; }

  /* playlist grid */
  .pl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pl-btn  {
    background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
    padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; text-align: left;
    transition: background .15s, transform .12s;
  }
  .pl-btn:active { background: var(--surface-2); transform: scale(0.97); }
  .pl-plus {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--green); display: grid; place-items: center; flex: none;
    box-shadow: 0 0 10px oklch(0.74 0.16 152 / .4);
  }
  .pl-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .pl-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-sub  { font-size: 10.5px; font-weight: 500; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  html, body { height: 100%; background: #000; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden; }
  #screen-wrap {
    width: 480px; height: 480px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    transform-origin: center center;
  }
</style>
</head>
<body>
<div id="stage"><div id="screen-wrap"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState } = React;
const sv = { fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };

function MusicIcon({ s = 17 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" {...sv} style={{ opacity: .55 }}>
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
    </svg>
  );
}
function ListIcon({ s = 17 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" {...sv} style={{ opacity: .55 }}>
      <line x1="8" y1="6"  x2="21" y2="6"  />
      <line x1="8" y1="12" x2="21" y2="12" />
      <line x1="8" y1="18" x2="21" y2="18" />
      <line x1="3" y1="6"  x2="3.01" y2="6"  strokeWidth="3" />
      <line x1="3" y1="12" x2="3.01" y2="12" strokeWidth="3" />
      <line x1="3" y1="18" x2="3.01" y2="18" strokeWidth="3" />
    </svg>
  );
}
function InfoIcon({ s = 14 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="#07140d" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 11v5" />
      <circle cx="12" cy="7.5" r=".7" fill="#07140d" stroke="none" />
    </svg>
  );
}
function PlusIcon({ s = 15 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="#07140d" strokeWidth="2.8" strokeLinecap="round">
      <line x1="12" y1="5"  x2="12" y2="19" />
      <line x1="5"  y1="12" x2="19" y2="12" />
    </svg>
  );
}

const EQ = () => (
  <span className="eq-bars">
    {[0,1,2,3].map(i => (
      <span key={i} className="eq-bar" style={{ animationDelay: `${i * 0.18}s` }} />
    ))}
  </span>
);

/* ---- data ---- */
const RECENT = [
  { id: 1, name: "Suzan & Freek",   sub: "Lichtje Branden",        time: "nu",  type: "artist",   playing: true  },
  { id: 2, name: "The Weeknd",       sub: "Blinding Lights",         time: "14m", type: "artist",   playing: false },
  { id: 3, name: "Avond Flow",       sub: "Afspeellijst · 23 nrs",   time: "2u",  type: "playlist", playing: false },
];

const PLAYLISTS = [
  { id: 1, name: "Focus",      sub: "Concentratie & flow"  },
  { id: 2, name: "Koken",      sub: "Muziek bij het koken" },
  { id: 3, name: "Avond",      sub: "Rustige avondmuziek"  },
  { id: 4, name: "Ontdekken",  sub: "Nieuwe muziek"        },
];

function ArtThumbnail({ type, playing }) {
  return (
    <div className={"recent-art" + (playing ? " playing" : "")}>
      {playing ? <EQ /> : type === "playlist" ? <ListIcon /> : <MusicIcon />}
    </div>
  );
}

function SpotRecent() {
  const [active, setActive] = useState(null);
  return (
    <div className="scr">
      <div className="topbar">
        <span className="brand">RECENT</span>
        <button className="info-btn"><InfoIcon /></button>
      </div>

      <div className="sect-label">LAATST AFGESPEELD</div>

      <div className="recent-card">
        {RECENT.map((r) => (
          <div key={r.id}
            className={"recent-row" + (r.playing ? " playing" : "")}
            onClick={() => setActive(active === r.id ? null : r.id)}>
            <ArtThumbnail type={r.type} playing={r.playing} />
            <div className="recent-meta">
              <div className="recent-name">{r.name}</div>
              <div className="recent-sub">{r.sub}</div>
            </div>
            <span className={"recent-time" + (r.time === "nu" ? " now" : "")}>{r.time}</span>
          </div>
        ))}
      </div>

      <div className="sect-label">AFSPEELLIJSTEN</div>

      <div className="pl-grid">
        {PLAYLISTS.map((p) => (
          <button key={p.id} className="pl-btn">
            <div className="pl-plus"><PlusIcon /></div>
            <div className="pl-meta">
              <div className="pl-name">{p.name}</div>
              <div className="pl-sub">{p.sub}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SpotRecent />);
function fit() {
  const pad = 24;
  const s = Math.min((window.innerWidth - pad) / 480, (window.innerHeight - pad) / 480);
  document.getElementById("screen-wrap").style.transform = "scale(" + Math.max(0.2, s) + ")";
}
window.addEventListener("resize", fit);
fit();
</script>
</body>
</html>
