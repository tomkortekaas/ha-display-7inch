# =============================================================================
#  AFZUIGKAP — 4" 480x480 touchscreen  ·  Variant B (segment-kolommen)
#  ESPHome + LVGL
# -----------------------------------------------------------------------------
#  Wat dit bestand bevat:
#   - De VOLLEDIGE LVGL-UI van scherm B (twee gevulde kolommen, vent 0-3 + licht 0-3)
#   - Kleuren: zwart, ventilatie = cyaan, verlichting = amber, font = Montserrat
#   - Twee globals (vent_level / light_level) die de stand bewaren
#   - Tikbare segmenten + een refresh-script dat de UI bijwerkt
#
#  WAT JIJ NOG MOET INVULLEN (duidelijk gemarkeerd met >>> TODO):
#   1. esphome / wifi / api gegevens
#   2. Het DISPLAY + TOUCHSCREEN blok voor JOUW paneel (pinnen verschillen!)
#   3. De apply_vent / apply_light scripts: stuur hier je relais/uitgangen aan
# =============================================================================

esphome:
  name: afzuigkap
  friendly_name: Afzuigkap
  on_boot:
    - script.execute: refresh_ui      # zet de UI gelijk aan de bewaarde standen

esp32:
  board: esp32-s3-devkitc-1           # >>> TODO: pas aan naar jouw board
  framework:
    type: esp-idf

psram:
  mode: octal                          # 480x480 RGB-panelen hebben PSRAM nodig
  speed: 80MHz

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid              # >>> TODO: zet in secrets.yaml
  password: !secret wifi_password

# =============================================================================
#  KLEUREN  (centraal, zodat je makkelijk kunt afstemmen)
# =============================================================================
# 0x08080A  achtergrond (bijna zwart)
# 0x131418  surface (tube)
# 0x1B1C21  surface-2 (leeg segment)
# 0x38BDF8  ventilatie  (koel cyaan)
# 0xF5B45A  verlichting (warm amber)
# 0xFFFFFF  tekst wit
# 0x6B6E76  tekst muted

# =============================================================================
#  FONTS  (Montserrat via Google Fonts + Material Design Icons voor de glyphs)
# =============================================================================
font:
  - file: "gfonts://Montserrat@800"
    id: font_num
    size: 44
  - file: "gfonts://Montserrat@700"
    id: font_brand
    size: 16
  - file: "gfonts://Montserrat@600"
    id: font_label
    size: 14
  - file: "gfonts://Montserrat@500"
    id: font_status
    size: 13
  # Material Design Icons — alleen de twee glyphs die we nodig hebben
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 40
    glyphs:
      - "\U000F0210"   # mdi-fan
      - "\U000F0335"   # mdi-lightbulb

# =============================================================================
#  STAND-OPSLAG
# =============================================================================
globals:
  - id: vent_level
    type: int
    restore_value: yes
    initial_value: "0"
  - id: light_level
    type: int
    restore_value: yes
    initial_value: "0"

# =============================================================================
#  >>> TODO: DISPLAY + TOUCHSCREEN  —  VERVANG MET JOUW PANEEL
# -----------------------------------------------------------------------------
#  Onderstaand is een TEMPLATE voor een ST7701S RGB 480x480 paneel met GT911
#  touch (zoals de Guition JC4848W540 / 4848S040). CONTROLEER elke pin tegen de
#  documentatie van jouw board — verkeerde pinnen = wit/zwart scherm.
# =============================================================================
spi:
  - id: lcd_spi
    clk_pin: 48
    mosi_pin: 47

display:
  - platform: st7701s
    id: disp
    auto_clear_enabled: false
    update_interval: never
    data_rate: 2MHz
    spi_id: lcd_spi
    cs_pin: 39
    reset_pin: 40
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    dimensions:
      width: 480
      height: 480
    # >>> TODO: de data-pins hieronder zijn voorbeeldwaarden — verifieer ze!
    data_pins:
      red:   [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue:  [4, 5, 6, 7, 15]
    init_sequence:
      - 1   # >>> TODO: gebruik de init-sequence van jouw paneel

i2c:
  - id: touch_i2c
    sda: 19          # >>> TODO
    scl: 45          # >>> TODO
    scan: true

touchscreen:
  - platform: gt911
    id: touch
    i2c_id: touch_i2c
    # interrupt_pin / reset_pin: >>> TODO indien jouw board die gebruikt

# Achtergrondverlichting (vaak nodig om iets te zien)
output:
  - platform: ledc
    pin: 38          # >>> TODO: backlight pin
    id: backlight_out
light:
  - platform: monochromatic
    output: backlight_out
    id: backlight
    name: "Scherm helderheid"
    restore_mode: ALWAYS_ON

# =============================================================================
#  LVGL  —  DE UI VAN SCHERM B
# =============================================================================
lvgl:
  displays:
    - disp
  touchscreens:
    - touch
  color_depth: 16
  bg_color: 0x08080A
  # globale tekstkleur default
  text_font: font_label

  pages:
    - id: main_page
      bg_color: 0x08080A
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:

        # ---------- TOPBAR ----------
        - label:
            id: brand_lbl
            text: "AFZUIGKAP"
            text_font: font_brand
            text_color: 0xFFFFFF
            text_opa: 85%
            align: TOP_LEFT
            x: 30
            y: 26
        - label:
            id: status_lbl
            text: "verbonden"
            text_font: font_status
            text_color: 0x6B6E76
            align: TOP_RIGHT
            x: -30
            y: 30
        - obj:                         # status-stipje
            width: 8
            height: 8
            radius: 4
            bg_color: 0x4ADE80
            border_width: 0
            align: TOP_RIGHT
            x: -98
            y: 32

        # ---------- RIJ MET TWEE KOLOMMEN ----------
        - obj:
            id: cols
            width: 420
            height: 380
            x: 0
            y: 18
            align: CENTER
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: ROW
              pad_column: 22
              pad_row: 0

            widgets:

              # ============ KOLOM: VENTILATIE ============
              - obj:
                  flex_grow: 1
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_cross: CENTER
                    pad_row: 6
                  widgets:
                    - label:
                        id: vent_icon
                        text: "\U000F0210"
                        text_font: font_icon
                        text_color: 0x38BDF8
                    # ---- de "tube" met 3 segmenten ----
                    - obj:
                        flex_grow: 1
                        width: 100%
                        bg_color: 0x131418
                        border_color: 0x2A2B30
                        border_width: 1
                        radius: 26
                        pad_all: 10
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          pad_row: 10
                        widgets:
                          - obj:                # stand 3 (boven)
                              id: vent_seg3
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(vent_level) = (id(vent_level) == 3) ? 2 : 3;"
                                - script.execute: refresh_ui
                                - script.execute: apply_vent
                          - obj:                # stand 2 (midden)
                              id: vent_seg2
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(vent_level) = (id(vent_level) == 2) ? 1 : 2;"
                                - script.execute: refresh_ui
                                - script.execute: apply_vent
                          - obj:                # stand 1 (onder)
                              id: vent_seg1
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(vent_level) = (id(vent_level) == 1) ? 0 : 1;"
                                - script.execute: refresh_ui
                                - script.execute: apply_vent
                    - label:
                        id: vent_num
                        text: "0"
                        text_font: font_num
                        text_color: 0xFFFFFF
                    - label:
                        text: "VENTILATIE"
                        text_font: font_label
                        text_color: 0x6B6E76

              # ============ KOLOM: VERLICHTING ============
              - obj:
                  flex_grow: 1
                  height: 100%
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_cross: CENTER
                    pad_row: 6
                  widgets:
                    - label:
                        id: light_icon
                        text: "\U000F0335"
                        text_font: font_icon
                        text_color: 0xF5B45A
                    - obj:
                        flex_grow: 1
                        width: 100%
                        bg_color: 0x131418
                        border_color: 0x2A2B30
                        border_width: 1
                        radius: 26
                        pad_all: 10
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          pad_row: 10
                        widgets:
                          - obj:
                              id: light_seg3
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(light_level) = (id(light_level) == 3) ? 2 : 3;"
                                - script.execute: refresh_ui
                                - script.execute: apply_light
                          - obj:
                              id: light_seg2
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(light_level) = (id(light_level) == 2) ? 1 : 2;"
                                - script.execute: refresh_ui
                                - script.execute: apply_light
                          - obj:
                              id: light_seg1
                              flex_grow: 1
                              width: 100%
                              radius: 16
                              bg_color: 0x1B1C21
                              border_width: 0
                              on_click:
                                - lambda: "id(light_level) = (id(light_level) == 1) ? 0 : 1;"
                                - script.execute: refresh_ui
                                - script.execute: apply_light
                    - label:
                        id: light_num
                        text: "0"
                        text_font: font_num
                        text_color: 0xFFFFFF
                    - label:
                        text: "VERLICHTING"
                        text_font: font_label
                        text_color: 0x6B6E76

# =============================================================================
#  SCRIPTS
# =============================================================================
script:
  # ---- UI bijwerken zodat segmenten/cijfers de stand tonen ----
  - id: refresh_ui
    then:
      # --- ventilatie segmenten (cyaan) ---
      - lvgl.widget.update:
          id: vent_seg1
          bg_color: !lambda "return id(vent_level) >= 1 ? lv_color_hex(0x38BDF8) : lv_color_hex(0x1B1C21);"
      - lvgl.widget.update:
          id: vent_seg2
          bg_color: !lambda "return id(vent_level) >= 2 ? lv_color_hex(0x38BDF8) : lv_color_hex(0x1B1C21);"
      - lvgl.widget.update:
          id: vent_seg3
          bg_color: !lambda "return id(vent_level) >= 3 ? lv_color_hex(0x38BDF8) : lv_color_hex(0x1B1C21);"
      - lvgl.label.update:
          id: vent_num
          text: !lambda "return std::to_string(id(vent_level));"
      - lvgl.widget.update:
          id: vent_icon
          text_color: !lambda "return id(vent_level) > 0 ? lv_color_hex(0x38BDF8) : lv_color_hex(0x6B6E76);"
      # --- verlichting segmenten (amber) ---
      - lvgl.widget.update:
          id: light_seg1
          bg_color: !lambda "return id(light_level) >= 1 ? lv_color_hex(0xF5B45A) : lv_color_hex(0x1B1C21);"
      - lvgl.widget.update:
          id: light_seg2
          bg_color: !lambda "return id(light_level) >= 2 ? lv_color_hex(0xF5B45A) : lv_color_hex(0x1B1C21);"
      - lvgl.widget.update:
          id: light_seg3
          bg_color: !lambda "return id(light_level) >= 3 ? lv_color_hex(0xF5B45A) : lv_color_hex(0x1B1C21);"
      - lvgl.label.update:
          id: light_num
          text: !lambda "return std::to_string(id(light_level));"
      - lvgl.widget.update:
          id: light_icon
          text_color: !lambda "return id(light_level) > 0 ? lv_color_hex(0xF5B45A) : lv_color_hex(0x6B6E76);"

  # ---- >>> TODO: stuur je VENTILATIE-hardware aan op basis van id(vent_level) ----
  - id: apply_vent
    then:
      - lambda: |-
          // Voorbeeld met drie relais (laag/midden/hoog). Vervang door jouw uitgangen.
          // switch.turn_off al je standen, daarna de juiste aanzetten:
          //   int lvl = id(vent_level);
          //   id(relay_vent_1).turn_off(); id(relay_vent_2).turn_off(); id(relay_vent_3).turn_off();
          //   if (lvl == 1) id(relay_vent_1).turn_on();
          //   if (lvl == 2) id(relay_vent_2).turn_on();
          //   if (lvl == 3) id(relay_vent_3).turn_on();
          ESP_LOGI("afzuigkap", "Ventilatie -> stand %d", id(vent_level));

  # ---- >>> TODO: stuur je VERLICHTING-hardware aan op basis van id(light_level) ----
  - id: apply_light
    then:
      - lambda: |-
          // Voorbeeld: dimbaar licht (0..3 -> 0/33/66/100%). Vervang door jouw uitgang.
          //   float b = id(light_level) / 3.0f;
          //   auto call = id(keuken_licht).turn_on(); call.set_brightness(b); call.perform();
          //   if (id(light_level) == 0) id(keuken_licht).turn_off();
          ESP_LOGI("afzuigkap", "Verlichting -> stand %d", id(light_level));
