# Home Assistant package voor HA Display 7.
# Zet dit bestand bijvoorbeeld op:
#   /config/packages/ha-display-7.yaml
#
# En laad packages in /config/configuration.yaml met:
#
# homeassistant:
#   packages: !include_dir_named packages

# Buienradar-kaart voor het ESPHome weerscherm
# ------------------------------------------------------------
# Het display verwacht 9 lokale JPG frames:
#   /config/www/ha-display-radar/radar_0.jpg  -> nu
#   /config/www/ha-display-radar/radar_1.jpg  -> +15 min
#   ...
#   /config/www/ha-display-radar/radar_8.jpg  -> +120 min
#
# Deze zijn via Home Assistant bereikbaar als:
#   /local/ha-display-radar/radar_0.jpg ... radar_8.jpg
#
# De Buienradar integratie is aanwezig. De entity registry bevat
# camera.buienradar, maar die staat standaard disabled_by=integration.
# Schakel deze camera in via Settings > Devices & services > Entities
# als je een actuele Buienradar still als bron of fallback wilt gebruiken.
# De bewegende 2-uurs radar gebruikt de lokale framebestanden hierboven.

rest:
  - resource: !secret photo_swipe_today_url
    scan_interval: 300
    sensor:
      - name: "Immich review vandaag count"
        unique_id: immich_review_vandaag_count
        value_template: "{{ value_json.count | int(0) }}"
        unit_of_measurement: "foto's"
        icon: "mdi:image-check"
  - resource: "http://192.168.1.237:3002/api/ah/recipes?list=cart"
    scan_interval: 21600
    sensor:
      - name: "ah_cart_raw"
        value_template: "{{ value_json.recipes | length }} recepten"
        json_attributes:
          - recipes
          - list
          - source
          - error
  - resource: "http://192.168.1.237:3002/api/ah/favorites"
    scan_interval: 21600
    sensor:
      - name: "ah_favorites_raw"
        value_template: "{{ value_json.favorites | length }} recepten"
        json_attributes:
          - favorites
          - source
          - error
  - resource: "http://192.168.1.237:3002/api/ah/recipes?list=custom"
    scan_interval: 21600
    sensor:
      - name: "ah_custom_raw"
        value_template: "{{ value_json.recipes | length }} recepten"
        json_attributes:
          - recipes
          - list
          - source
          - error

input_select:
  ah_recipe_tab:
    name: AH receptentab
    options:
      - Eerder toegevoegd aan mandje
      - Favorieten
      - Eigen recepten
    initial: Eerder toegevoegd aan mandje

template:
  # Familie-agenda voor het 7" display.
  # Voeg in Home Assistant eerst de Remote Calendar integratie toe met deze ICS:
  # https://calendar.google.com/calendar/ical/rrb72ssis661svh204h0c9ovlk%40group.calendar.google.com/public/basic.ics
  # Verwachte entity_id na hernoemen: calendar.thuisagenda
  - trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/15"
    action:
      - action: calendar.get_events
        target:
          entity_id: calendar.thuisagenda
        data:
          start_date_time: "{{ today_at('00:00').strftime('%Y-%m-%d %H:%M:%S') }}"
          duration:
            hours: 168
        response_variable: familie_agenda
    sensor:
      - name: "Familie agenda d0 title"
        unique_id: familie_agenda_d0_title
        state: "Vandaag"
      - name: "Familie agenda d0 date"
        unique_id: familie_agenda_d0_date
        state: "{{ (now() + timedelta(days=0)).strftime('%d-%m') }}"
      - name: "Familie agenda d0 count"
        unique_id: familie_agenda_d0_count
        state: >
          {% set day = (now().date() + timedelta(days=0)).isoformat() %}
          {% set events = familie_agenda.get('calendar.thuisagenda', {}).get('events', []) %}
          {% set ns = namespace(count=0) %}
          {% for e in events %}
            {% if e.start[:10] == day %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% endfor %}
          {% if ns.count == 0 %}geen afspraken{% elif ns.count == 1 %}1 afspraak{% else %}{{ ns.count }} afspraken{% endif %}
      - name: "Familie agenda d0 event 1"
        unique_id: familie_agenda_d0_event_1
        state: >
          {% set day = (now().date() + timedelta(days=0)).isoformat() %}
          {% set events = familie_agenda.get('calendar.thuisagenda', {}).get('events', []) %}
          {% set ns = namespace(rows=[]) %}
          {% for e in events %}
            {% if e.start[:10] == day %}
              {% set when = 'hele dag' if e.start|length == 10 else as_datetime(e.start).strftime('%H:%M') %}
              {% set ns.rows = ns.rows + [when ~ ' ' ~ e.summary] %}
            {% endif %}
          {% endfor %}
          {{ ns.rows[0] if ns.rows|length > 0 else '' }}
      - name: "Familie agenda d0 event 2"
        unique_id: familie_agenda_d0_event_2
