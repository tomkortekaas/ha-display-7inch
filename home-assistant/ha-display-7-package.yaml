shell_command:
  immich_rotate_7inch: "python3 /config/www/idotmatrix/immich_rotate_7inch.py"
  immich_photo_next: "python3 /config/www/idotmatrix/immich_rotate_7inch.py next"
  immich_photo_prev: "python3 /config/www/idotmatrix/immich_rotate_7inch.py prev"
  immich_photo_zoom: "python3 /config/www/idotmatrix/immich_rotate_7inch.py zoom"
  immich_photo_trash: "python3 /config/www/idotmatrix/immich_rotate_7inch.py trash"
  immich_photo_confirm_trash: "python3 /config/www/idotmatrix/immich_rotate_7inch.py confirm-trash"
  immich_photo_keep: "python3 /config/www/idotmatrix/immich_rotate_7inch.py keep"
  immich_photo_skip: "python3 /config/www/idotmatrix/immich_rotate_7inch.py skip"
  immich_photo_undo: "python3 /config/www/idotmatrix/immich_rotate_7inch.py undo"
  immich_photo_rotate: "python3 /config/www/idotmatrix/immich_rotate_7inch.py rotate"
  immich_review_today: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-today"
  immich_review_next: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-next"
  immich_review_prev: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-prev"
  immich_review_keep: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-keep"
  immich_review_trash: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-trash"
  immich_review_tom: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-tom"
  immich_review_chanel: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-chanel"
  immich_review_rotate: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-rotate"
  immich_review_count: "python3 /config/www/idotmatrix/immich_rotate_7inch.py review-count"
  buienradar_update_7inch: "python3 /config/www/idotmatrix/buienradar_radar_7inch.py"

input_boolean:
  ha_display_deurbel_actief:
    name: "HA Display 7 deurbel actief"
    icon: mdi:doorbell-video
    initial: false

automation:
  # Reolink Voordeur entities uit Home Assistant:
  # - trigger: binary_sensor.voordeur_bezoeker
  # - snapshotbron: camera.voordeur_vloeiend
  - alias: "HA Display 7 - Deurbel tonen"
    id: ha_display_7_deurbel_tonen
    mode: restart
    trigger:
      - trigger: state
        entity_id: binary_sensor.voordeur_bezoeker
        to: "on"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ha_display_deurbel_actief
      - repeat:
          count: 50
          sequence:
            - condition: state
              entity_id: input_boolean.ha_display_deurbel_actief
              state: "on"
            - action: camera.snapshot
              target:
                entity_id: camera.voordeur_vloeiend
              data:
                filename: /config/www/ha-display-doorbell.jpg
            - delay: "00:00:01"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ha_display_deurbel_actief

  - alias: "HA Display 7 - Review badge count"
    id: ha_display_7_review_badge
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/5"
    action:
      - action: shell_command.immich_review_count

  - alias: "HA Display 7 - Buienradar frames verversen"
    id: ha_display_7_buienradar_frames_verversen
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/10"
    action:
      - action: shell_command.buienradar_update_7inch

  - alias: "HA Display 7 - Immich foto roteren"
    id: ha_display_7_immich_foto_roteren
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/1"
    action:
      - action: shell_command.immich_rotate_7inch
